<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Simple lab notebook / flask favicon. Green accent matches the app's
       primary colour (#5b7a5e). Uses fillRule so it works at favicon scale. -->
  <rect x="2" y="2" width="28" height="28" rx="5" fill="#faf8f4"/>
  <path d="M 11 6 L 11 13 L 7 25 Q 7 27 9 27 L 23 27 Q 25 27 25 25 L 21 13 L 21 6 Z"
        fill="none" stroke="#4a4139" stroke-width="2" stroke-linejoin="round"/>
  <!-- Liquid level — green fill from y=18 down -->
  <path d="M 8.5 18 L 23.5 18 L 25 25 Q 25 27 23 27 L 9 27 Q 7 27 7 25 Z"
        fill="#5b7a5e" opacity="0.85"/>
  <!-- Top neck cap -->
  <rect x="10" y="5" width="12" height="2.5" rx="1" fill="#4a4139"/>
  <!-- Two bubbles in the liquid -->
  <circle cx="13" cy="22" r="1.2" fill="#faf8f4" opacity="0.7"/>
  <circle cx="18" cy="24" r="0.8" fill="#faf8f4" opacity="0.7"/>
</svg>
