/* ── state ─────────────────────────────────────────────────── */
var _cl = {
  sequences: [],
  selected: null,      // { type, id }
  parsed: null,        // parsed SeqViz data
  loading: false,
  tab: 'viewer',       // 'viewer' | 'opencloning'
  seqvizReady: false,
  ocUrl: '',
  viewerInstance: null,
  viewMode: 'both',    // 'both' | 'circular' | 'linear'
  filter: '',
  ocFilter: '',
};

/* ── script loader ─────────────────────────────────────────── */
var _scriptsLoaded = false;
var _scriptsLoading = false;

function _loadScript(src) {
  return new Promise(function(resolve, reject) {
    // check if already loaded
    var existing = document.querySelector('script[src="' + src + '"]');
    if (existing) { resolve(); return; }
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Failed to load: ' + src)); };
    document.head.appendChild(s);
  });
}

function _loadSeqVizDeps() {
  if (_scriptsLoaded) return Promise.resolve();
  if (_scriptsLoading) {
    return new Promise(function(resolve) {
      var iv = setInterval(function() { if (_scriptsLoaded) { clearInterval(iv); resolve(); } }, 100);
    });
  }
  _scriptsLoading = true;
  return _loadScript('https://unpkg.com/react@18/umd/react.production.min.js')
    .then(function() { return _loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'); })
    .then(function() { return _loadScript('https://unpkg.com/seqviz'); })
    .then(function() { _scriptsLoaded = true; _cl.seqvizReady = true; })
    .catch(function(err) {
      console.error('SeqViz loading failed:', err);
      toast('Could not load SeqViz viewer — check internet connection', true);
    });
}

/* ── data loading ──────────────────────────────────────────── */
function _clLoadSequences() {
  return api('GET', '/api/cloning/sequences').then(function(d) { _cl.sequences = d.items || []; });
}

function _clLoadConfig() {
  return api('GET', '/api/cloning/config').then(function(d) { _cl.ocUrl = d.opencloning_url || ''; });
}

function _clSelectSequence(type, id) {
  _cl.selected = { type: type, id: id };
  _cl.parsed = null;
  _cl.loading = true;
  _clRender();

  api('GET', '/api/cloning/sequences/' + type + '/' + id + '/parse')
    .then(function(data) {
      _cl.parsed = data;
      _cl.loading = false;
      _clRender();
      setTimeout(function() { _clRenderSeqViz(); }, 50);
    })
    .catch(function(err) {
      _cl.loading = false;
      toast('Failed to parse GenBank file: ' + (err.message || err), true);
      _clRender();
    });
}

/* ── SeqViz renderer ───────────────────────────────────────── */
function _clRenderSeqViz() {
  if (!_cl.parsed || !_cl.seqvizReady) return;
  if (typeof window.seqviz === 'undefined') return;

  var el = document.getElementById('cl-seqviz-mount');
  if (!el) return;

  // Clear previous
  el.innerHTML = '';

  var showLinear = _cl.viewMode === 'linear' || _cl.viewMode === 'both';
  var showCircular = _cl.viewMode === 'circular' || _cl.viewMode === 'both';

  // Determine topology
  var isCircular = (_cl.parsed.topology || '').toLowerCase() === 'circular';

  try {
    var viewerProps = {
      name: _cl.parsed.name || 'Sequence',
      seq: _cl.parsed.seq,
      annotations: (_cl.parsed.annotations || []).map(function(a) {
        return {
          name: a.name,
          start: a.start,
          end: a.end,
          direction: a.direction || 1,
          color: a.color || '#95A5A6',
        };
      }),
      style: { height: '100%', width: '100%' },
      viewer: _cl.viewMode === 'both' ? 'both' :
              _cl.viewMode === 'circular' ? 'circular' : 'linear',
      showComplement: true,
      showIndex: true,
      zoom: { linear: 50 },
    };

    // SeqViz vanilla JS API
    if (window.seqviz.Viewer && typeof window.seqviz.Viewer === 'function') {
      // Try the vanilla Viewer(element, props).render() API
      try {
        window.seqviz.Viewer(el, viewerProps).render();
        return;
      } catch (e) { /* fall through to React approach */ }
    }

    // React approach fallback
    if (window.React && window.ReactDOM) {
      var SeqVizComp = window.seqviz.SeqViz || window.seqviz.default || window.seqviz;
      if (SeqVizComp) {
        var root;
        if (window.ReactDOM.createRoot) {
          root = window.ReactDOM.createRoot(el);
          root.render(window.React.createElement(SeqVizComp, viewerProps));
        } else {
          window.ReactDOM.render(window.React.createElement(SeqVizComp, viewerProps), el);
        }
      }
    }
  } catch (err) {
    console.error('SeqViz render error:', err);
    el.innerHTML = '<div style="padding:2rem;color:#8a7f72;">Viewer failed to render. Try refreshing the page.</div>';
  }
}

  if (primers.length > 0) {

      h += '</div>';

  if (plasmids.length === 0 && primers.length === 0) {

    h += _cl.ocFilter ? 'No matches.' : 'No .gb files found.';

       'title="OpenCloning">' +
       '</iframe>';
  h += '</div>';

  h += '</div>'; // flex container

  return h;
}

function _clSetTab(tab) {

  _clRender();
}

function _clSetViewMode(mode) {

  _clRender();
}

function _clFilterChange(val) {
  _cl.filter = val;
  _clRender();
}

function _clOcFilterChange(val) {
  _cl.ocFilter = val;
  _clRender();
}

function _clOpenInOC() {
  if (!_cl.ocUrl) return;
  window.open(_cl.ocUrl, '_blank');
}

function _clSendToOC() {
  if (!_cl.selected || !_cl.parsed) {
    toast('Select and load a sequence first', true);
    return;
  }

  var seqName = _cl.parsed.name || 'Sequence';
  fetch('/api/cloning/export/' + _cl.selected.type + '/' + _cl.selected.id)
    .then(function(r) { if (!r.ok) throw new Error('Export failed'); return r.json(); })
    .then(function(strategy) {
      var blob = new Blob([JSON.stringify(strategy, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = seqName + '_opencloning.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('JSON exported — in OpenCloning click ☰ menu → Load file');
    })
    .catch(function(err) {
      toast('Failed to export: ' + (err.message || err), true);
    });
}

// ── sanger.js ──
/* Sanger Sequencing — AB1 trace alignment and chromatogram viewer */

/* ── state ────────────────────────────────────────────────── */
var sangerState = {
  alignments: [],
  current: null,       // selected alignment row
  traceData: null,     // parsed AB1 trace JSON
  view: 'list',        // 'list' | 'new' | 'detail' | 'batch'
  batchItems: [],      // alignments in current batch
  batchId: null,
  batchIdx: 0,         // index within batch for nav
  plasmids: [],
  refMode: 'plasmid',  // 'plasmid' | 'upload' | 'raw'
  traceZoom: 1,
  traceScroll: 0,
  dragging: false,
  dragStart: 0,
  scrollStart: 0,
};

/* ── colours (from style guide + bio convention) ──────────── */
var TRACE_COLORS = { A: '#2e8b40', C: '#2266cc', G: '#222', T: '#cc2222' };
var QUAL_GOOD = '#5b7a5e';
var QUAL_MED  = '#c9a84c';
var QUAL_BAD  = '#c25a4a';

/* ── helpers ──────────────────────────────────────────────── */
function sangerFmt(d) { return d ? formatDate(d.split('T')[0]) : '—'; }

function qualColor(q) {
  if (q >= 30) return QUAL_GOOD;
  if (q >= 20) return QUAL_MED;
  return QUAL_BAD;
}

function identityBadge(pct) {
  var c = pct >= 98 ? QUAL_GOOD : pct >= 90 ? QUAL_MED : QUAL_BAD;
  return '<span style="background:' + c + ';color:#fff;padding:2px 8px;border-radius:4px;font-size:.78rem;font-weight:600">' + pct.toFixed(1) + '%</span>';
}

/* ── internal navigation (forces re-render even if already on sanger) ── */
function sangerNav(subview) {
  sangerState.view = subview || 'list';
  S.view = '';
  setView('sanger');
}

/* ── main render ─────────────────────────────────────────── */
async function renderSanger(el) {
  if (sangerState.view === 'new')    return renderNewAlignment(el);
  if (sangerState.view === 'detail') return renderDetail(el);
  if (sangerState.view === 'batch')  return renderBatch(el);
  return renderList(el);
}

/* ── LIST VIEW ───────────────────────────────────────────── */
async function renderList(el) {
  var data = await api('GET', '/api/sanger/alignments');
  sangerState.alignments = data.items || [];
  var items = sangerState.alignments;

  var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  h += '<div style="font-variant:small-caps;font-size:.72rem;letter-spacing:.12em;color:#8a7f72">sanger alignments</div>';
  h += '<button class="btn-sanger-primary" onclick="sangerNav(\'new\')">+ New Alignment</button>';
  h += '</div>';

  if (!items.length) {
    h += '<div class="sanger-empty">';
    h += '<div style="font-size:1.6rem;margin-bottom:8px">No alignments yet</div>';
    h += '<div style="color:#8a7f72">Upload one or more AB1 files and align them against a reference sequence.</div>';
    h += '</div>';
  } else {
    // Group by batch_id
    var batches = {};
    var singles = [];
    items.forEach(function(a) {
      if (a.batch_id) {
        if (!batches[a.batch_id]) batches[a.batch_id] = [];
        batches[a.batch_id].push(a);
      } else {
        singles.push(a);
      }
    });

    h += '<div class="sanger-table-wrap"><table class="sanger-table"><thead><tr>';
    h += '<th>Name</th><th>Reference</th><th>Identity</th><th>Mismatches</th><th>Gaps</th><th>Date</th><th></th>';
    h += '</tr></thead><tbody>';

    // Render batches first
    var batchKeys = Object.keys(batches);
    batchKeys.forEach(function(bid) {
      var group = batches[bid];
      var avgIdent = group.reduce(function(s, a) { return s + a.identity_pct; }, 0) / group.length;
      if (group.length > 1) {
        h += '<tr class="sanger-row sanger-batch-row" onclick="sangerOpenBatch(\'' + bid + '\')" style="cursor:pointer">';
        h += '<td style="font-weight:600"><span class="sanger-batch-badge">' + group.length + ' files</span> ' + esc(group[0].ref_name) + ' batch</td>';
        h += '<td><span style="font-family:\'SF Mono\',Monaco,Consolas,monospace;font-size:.8rem;background:#f0ebe3;padding:2px 6px;border-radius:3px">' + esc(group[0].ref_name) + '</span></td>';
        h += '<td>' + identityBadge(avgIdent) + ' <span style="font-size:.75rem;color:#8a7f72">avg</span></td>';
        h += '<td style="text-align:center">' + group.reduce(function(s, a) { return s + a.num_mismatches; }, 0) + '</td>';
        h += '<td style="text-align:center">' + group.reduce(function(s, a) { return s + a.num_gaps; }, 0) + '</td>';
        h += '<td style="color:#8a7f72;font-size:.85rem">' + relTime(group[0].created) + '</td>';
        h += '<td><button class="btn-sanger-icon" onclick="event.stopPropagation();sangerDeleteBatch(\'' + bid + '\')" title="Delete batch">✕</button></td>';
        h += '</tr>';
      } else {
        var a = group[0];
        h += sangerAlignmentRow(a);
      }
    });

    singles.forEach(function(a) {
      h += sangerAlignmentRow(a);
    });

    h += '</tbody></table></div>';
  }

  el.innerHTML = sangerStyles() + h;
}

function sangerAlignmentRow(a) {
  var h = '<tr class="sanger-row" onclick="sangerOpenDetail(' + a.id + ')" style="cursor:pointer">';
  h += '<td style="font-weight:600">' + esc(a.name) + '</td>';
  h += '<td><span style="font-family:\'SF Mono\',Monaco,Consolas,monospace;font-size:.8rem;background:#f0ebe3;padding:2px 6px;border-radius:3px">' + esc(a.ref_name) + '</span></td>';
  h += '<td>' + identityBadge(a.identity_pct) + '</td>';
  h += '<td style="text-align:center">' + a.num_mismatches + '</td>';
  h += '<td style="text-align:center">' + a.num_gaps + '</td>';
  h += '<td style="color:#8a7f72;font-size:.85rem">' + relTime(a.created) + '</td>';
  h += '<td><button class="btn-sanger-icon" onclick="event.stopPropagation();sangerDelete(' + a.id + ')" title="Delete">✕</button></td>';
  h += '</tr>';
  return h;
}

function sangerUpdateFileList() {
  var ab1Input = document.getElementById('sanger-ab1-input');
  var listEl = document.getElementById('sanger-file-list');
  var dropLabel = document.getElementById('sanger-ab1-label');
  var drop = document.getElementById('sanger-ab1-drop');
  if (!ab1Input || !listEl) return;
  var files = ab1Input.files;
  if (!files.length) {
    listEl.innerHTML = '';
    dropLabel.textContent = 'Drop .ab1 file(s) here or click to browse';
    drop.style.borderColor = '#d5cec0';
    return;
  }
  drop.style.borderColor = '#5b7a5e';
  if (files.length === 1) {
    dropLabel.textContent = files[0].name;
    listEl.innerHTML = '';
  } else {
    dropLabel.textContent = files.length + ' files selected';
    var h = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">';
    for (var i = 0; i < files.length; i++) {
      h += '<span style="font-size:.78rem;background:#f0ebe3;padding:2px 8px;border-radius:4px;color:#4a4139;font-family:\'SF Mono\',Monaco,Consolas,monospace">' + esc(files[i].name) + '</span>';
    }
    h += '</div>';
    listEl.innerHTML = h;
  }
}

/* ── run alignment ───────────────────────────────────────── */
async function sangerRunAlignment() {
  var btn = document.getElementById('sanger-run-btn');
  var status = document.getElementById('sanger-status');
  var ab1Input = document.getElementById('sanger-ab1-input');
  if (!ab1Input || !ab1Input.files.length) { toast('Please select at least one AB1 file', true); return; }

  var fd = new FormData();
  for (var i = 0; i < ab1Input.files.length; i++) {
    fd.append('ab1', ab1Input.files[i]);
  }
  var nameVal = (document.getElementById('sanger-name') || {}).value || '';
  if (nameVal) fd.append('name', nameVal);

  if (sangerState.refMode === 'plasmid') {
    var sel = document.getElementById('sanger-ref-plasmid');
    if (!sel || !sel.value) { toast('Select a plasmid reference', true); return; }
    fd.append('ref_source', 'plasmid');
    fd.append('ref_id', sel.value);
  } else if (sangerState.refMode === 'upload') {
    var refFile = document.getElementById('sanger-ref-file-input');
    if (!refFile || !refFile.files[0]) { toast('Select a reference file', true); return; }
    var refContent = await refFile.files[0].text();
    var ext = refFile.files[0].name.split('.').pop().toLowerCase();
    var src = (ext === 'gb' || ext === 'gbk' || ext === 'genbank') ? 'genbank' : 'fasta';
    fd.append('ref_source', src);
    fd.append('ref_text', refContent);
  } else {
    var raw = (document.getElementById('sanger-ref-raw') || {}).value;
    if (!raw || !raw.trim()) { toast('Paste a reference sequence', true); return; }
    if (raw.trim().startsWith('>')) {
      fd.append('ref_source', 'fasta');
    } else {
      fd.append('ref_source', 'raw');
    }
    fd.append('ref_text', raw.trim());
  }

  var fileCount = ab1Input.files.length;
  btn.disabled = true;
  btn.textContent = 'Aligning ' + fileCount + ' file' + (fileCount > 1 ? 's' : '') + '…';
  status.textContent = 'Uploading and aligning — this may take a moment…';

  try {
    var resp = await fetch('/api/sanger/align', { method: 'POST', body: fd });
    if (!resp.ok) {
      var err = await resp.json().catch(function() { return { detail: resp.statusText }; });
      throw new Error(err.detail || 'Alignment failed');
    }
    var result = await resp.json();
    var items = result.items || [];
    var errors = result.errors || [];

    if (errors.length && items.length) {
      toast(items.length + ' aligned, ' + errors.length + ' failed');
    } else if (errors.length && !items.length) {
      toast('All files failed: ' + errors[0].error, true);
      status.textContent = '';
      btn.disabled = false;
      btn.textContent = 'Align';
      return;
    } else {
      toast(items.length + ' alignment' + (items.length > 1 ? 's' : '') + ' complete');
    }

    if (items.length === 1) {
      sangerState.view = 'detail';
      sangerState.current = items[0];
      sangerState.traceData = null;
      sangerState.batchItems = items;
      sangerState.batchIdx = 0;
    } else {
      sangerState.view = 'batch';
      sangerState.batchItems = items;
      sangerState.batchId = result.batch_id;
      sangerState.batchIdx = 0;
    }
    sangerNav(sangerState.view);
  } catch(e) {
    toast(e.message, true);
    status.textContent = '';
    btn.disabled = false;
    btn.textContent = 'Align';
  }
}

/* ── BATCH VIEW — summary of multi-file results ─────────── */
async function renderBatch(el) {
  var items = sangerState.batchItems;
  if (!items.length) { sangerState.view = 'list'; return renderList(el); }

  var h = '<div>';
  h += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">';
  h += '<button class="btn-sanger-ghost" onclick="sangerState.batchItems=[];sangerNav(\'list\')">← Back</button>';

  h += '<div style="flex:1"></div>';
  h += '<span style="font-size:.85rem;color:#8a7f72">' + items.length + ' alignment' + (items.length > 1 ? 's' : '') + ' against <strong>' + esc(items[0].ref_name) + '</strong></span>';
  h += '</div>';

  h += '<div class="sanger-batch-grid">';
  items.forEach(function(a, idx) {
    var borderColor = a.identity_pct >= 98 ? QUAL_GOOD : a.identity_pct >= 90 ? QUAL_MED : QUAL_BAD;

    h += '</div>';

    h += '<span>' + a.num_mismatches + ' mismatch' + (a.num_mismatches !== 1 ? 'es' : '') + '</span>';

    h += '</div>';
    h += '</div>';

  h += '</div>';

  h += '</div>';

function sangerStat(label, val) {

/* ── quality bar chart (canvas) ──────────────────────────── */
function renderQualityChart() {
  var box = document.getElementById('sanger-qual-chart');
  if (!box || !sangerState.traceData) return;
  var quals = sangerState.traceData.quals;
  var n = quals.length;
  if (!n) return;
  var maxQ = 50;
  var barW = Math.max(1, Math.min(4, box.clientWidth / n));
  var canvas = document.createElement('canvas');
  canvas.width = Math.ceil(barW * n);
  canvas.height = 80;
  canvas.style.width = '100%';
  canvas.style.height = '80px';
  var ctx = canvas.getContext('2d');
  for (var i = 0; i < n; i++) {
    var q = quals[i];
    var bh = Math.round((q / maxQ) * 76);
    ctx.fillStyle = qualColor(q);
    ctx.fillRect(i * barW, 80 - bh, Math.max(1, barW - 0.5), bh);
  }
  box.innerHTML = '';
  box.appendChild(canvas);
}

/* ── trace canvas ────────────────────────────────────────── */
function renderTraceCanvas() {
  var canvas = document.getElementById('sanger-trace-canvas');
  var container = document.getElementById('sanger-trace-container');
  if (!canvas || !sangerState.traceData) return;
  var td = sangerState.traceData;
  var traces = td.traces;
  var peaks = td.peaks || [];
  var bases = td.bases || '';

  var traceLen = Math.max(
    traces.G.length, traces.A.length, traces.T.length, traces.C.length, 1
  );

  var pxPerSample = 1.2 * sangerState.traceZoom;
  var totalW = Math.ceil(traceLen * pxPerSample);
  var H = 260;
  canvas.width = totalW;
  canvas.height = H;
  canvas.style.width = totalW + 'px';
  canvas.style.height = H + 'px';
  container.style.height = H + 'px';

  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, totalW, H);

  var maxAmp = 0;
  ['G', 'A', 'T', 'C'].forEach(function(ch) {
    for (var i = 0; i < traces[ch].length; i++) {
      if (traces[ch][i] > maxAmp) maxAmp = traces[ch][i];
    }
  });
  if (maxAmp === 0) maxAmp = 1;
  var scaleY = (H - 40) / maxAmp;

  ['G', 'A', 'T', 'C'].forEach(function(ch) {
    var data = traces[ch];
    ctx.beginPath();
    ctx.strokeStyle = TRACE_COLORS[ch];
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.85;
    for (var i = 0; i < data.length; i++) {
      var x = i * pxPerSample;
      var y = H - 30 - data[i] * scaleY;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  ctx.font = '10px "SF Mono",Monaco,Consolas,monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < peaks.length && i < bases.length; i++) {
    var x = peaks[i] * pxPerSample;
    var base = bases[i];
    ctx.fillStyle = TRACE_COLORS[base] || '#999';
    ctx.fillText(base, x, H - 6);
    ctx.strokeStyle = '#d5cec0';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, H - 20);
    ctx.lineTo(x, H - 28);
    ctx.stroke();
  }

  container.scrollLeft = sangerState.traceScroll;
}

function wireTraceDrag() {
  var container = document.getElementById('sanger-trace-container');
  if (!container) return;
  container.onmousedown = function(e) {
    sangerState.dragging = true;
    sangerState.dragStart = e.clientX;
    sangerState.scrollStart = container.scrollLeft;
    container.style.cursor = 'grabbing';
    e.preventDefault();
  };
  document.addEventListener('mousemove', function(e) {
    if (!sangerState.dragging) return;
    var c = document.getElementById('sanger-trace-container');
    if (!c) return;
    c.scrollLeft = sangerState.scrollStart - (e.clientX - sangerState.dragStart);
  });
  document.addEventListener('mouseup', function() {
    if (!sangerState.dragging) return;
    sangerState.dragging = false;
    var c = document.getElementById('sanger-trace-container');
    if (c) {
      c.style.cursor = 'grab';
      sangerState.traceScroll = c.scrollLeft;
    }
  });
}

function sangerZoom(dir) {
  if (dir === 0) { sangerState.traceZoom = 1; sangerState.traceScroll = 0; }
  else if (dir > 0) sangerState.traceZoom = Math.min(8, sangerState.traceZoom * 1.3);
  else sangerState.traceZoom = Math.max(0.3, sangerState.traceZoom / 1.3);
  renderTraceCanvas();
  var label = document.getElementById('sanger-zoom-label');
  if (label) label.textContent = sangerState.traceZoom.toFixed(1) + 'x';
}

/* ── alignment HTML builder ──────────────────────────────── */
function buildAlignmentHTML(refAln, qryAln, refOffset) {
  var BLOCK = 80;
  var h = '';
  var len = Math.max(refAln.length, qryAln.length);
  for (var i = 0; i < len; i += BLOCK) {
    var rSlice = refAln.substring(i, i + BLOCK);
    var qSlice = qryAln.substring(i, i + BLOCK);
    var matchLine = '';
    var refLine = '';
    var qryLine = '';
    for (var j = 0; j < rSlice.length; j++) {
      var rb = rSlice[j] || ' ';
      var qb = qSlice[j] || ' ';
      if (rb === qb && rb !== '-') {
        matchLine += '|';
        refLine += rb;
        qryLine += qb;
      } else if (rb === '-' || qb === '-') {
        matchLine += ' ';
        refLine += '<span class="sanger-gap">' + rb + '</span>';
        qryLine += '<span class="sanger-gap">' + qb + '</span>';
      } else {
        matchLine += ' ';
        refLine += '<span class="sanger-mismatch">' + rb + '</span>';
        qryLine += '<span class="sanger-mismatch">' + qb + '</span>';
      }
    }
    var pos = refOffset + i + 1;
    h += '<div class="sanger-aln-block">';
    h += '<div class="sanger-aln-num">' + pos + '</div>';
    h += '<div class="sanger-aln-label">Ref</div><div class="sanger-aln-seq">' + refLine + '</div>';
    h += '<div class="sanger-aln-num"></div>';
    h += '<div class="sanger-aln-label"></div><div class="sanger-aln-seq sanger-aln-match">' + matchLine + '</div>';
    h += '<div class="sanger-aln-num"></div>';
    h += '<div class="sanger-aln-label">Qry</div><div class="sanger-aln-seq">' + qryLine + '</div>';
    h += '</div>';
  }
  return h;
}

  html+='<div class="dil-card">'+
    '<h3>Sequencing prep</h3>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">All concentrations in ng/\u00B5L, volumes in \u00B5L</div>'+
    '<div class="dil-row" style="margin-bottom:16px">'+
      '<div class="dil-field"><label>Target conc (ng/µL)</label><input type="number" id="seq-target-conc" step="any" value="100" oninput="calcSeqTable()"/></div>'+
      '<div class="dil-field"><label>Final vol (µL)</label><input type="number" id="seq-final-vol" step="any" value="15" oninput="calcSeqTable()"/></div>'+
    '</div>'+
    '<table class="dil-seq-table">'+
      '<thead><tr><th>Sample</th><th>Conc (ng/µL)</th><th>DNA (\u00B5L)</th><th>Water (\u00B5L)</th></tr></thead>'+
      '<tbody id="seq-tbody"></tbody>'+
    '</table>'+
    '<div style="margin-top:10px;display:flex;gap:8px">'+
      '<button class="btn" onclick="addSeqRow()">+ Add row</button>'+
      '<button class="btn" onclick="clearSeqTable()">Clear</button>'+
    '</div>'+
  '</div>';

  // Serial dilution with unit selector
  html+='<div class="dil-card">'+
    '<h3>Serial dilution</h3>'+
    '<div class="dil-row">'+
      '<div class="dil-field"><label>Stock conc</label><input type="number" id="ser-stock" step="any" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Unit</label><select id="ser-unit" onchange="calcSerial()">'+concOpts+'</select></div>'+
      '<div class="dil-field"><label>Dilution factor</label><input type="number" id="ser-factor" step="any" value="10" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label># steps</label><input type="number" id="ser-steps" value="5" min="1" max="12" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Vol/tube</label><input type="number" id="ser-vol" step="any" value="100" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Vol unit</label><select id="ser-vol-unit" onchange="calcSerial()">'+volOpts+'</select></div>'+
    '</div>'+
    '<div id="ser-result" style="margin-top:8px"></div>'+
  '</div>';

  el.innerHTML=html;
  setTimeout(function(){renderSeqRows();calcSeqTable();},0);
}

function calcDilution(){
  var c1=parseFloat(document.getElementById('dil-c1')?.value);
  var c2=parseFloat(document.getElementById('dil-c2')?.value);
  var v2=parseFloat(document.getElementById('dil-v2')?.value);
  var cUnit=document.getElementById('dil-c-unit')?.value||'';
  var vUnit=document.getElementById('dil-v-unit')?.value||'';
  var v1El=document.getElementById('dil-v1');
  var wEl=document.getElementById('dil-water');
  if(c1>0&&c2>0&&v2>0){
    var v1=(c2*v2)/c1;
    var water=v2-v1;
    v1El.value=v1.toFixed(2)+' '+vUnit;
    wEl.value=water>0?water.toFixed(2)+' '+vUnit:'\u2014';
    if(v1>v2){v1El.value='C1 too low!';v1El.style.color='var(--red)';wEl.value='\u2014';}
    else{v1El.style.color='var(--accent)';}
  } else {
    v1El.value='\u2014';wEl.value='\u2014';v1El.style.color='var(--accent)';
  }
}

function renderSeqRows(){
  var tbody=document.getElementById('seq-tbody');
  if(!tbody)return;
  tbody.innerHTML=_dilSeqRows.map(function(r,i){
    return '<tr>'+
      '<td><input type="text" id="seq-name-'+i+'" value="'+esc(r.name)+'" placeholder="Sample '+(i+1)+'" style="width:140px" oninput="_dilSeqRows['+i+'].name=this.value"/></td>'+
      '<td><input type="number" id="seq-conc-'+i+'" value="'+(r.conc||'')+'" step="any" placeholder="ng/&mu;L" oninput="_dilSeqRows['+i+'].conc=this.value;calcSeqTable()"/></td>'+
      '<td id="seq-dna-'+i+'" style="font-weight:500;color:var(--accent)">—</td>'+
      '<td id="seq-water-'+i+'" style="color:var(--muted)">—</td>'+
    '</tr>';
  }).join('');
}

function calcSeqTable(){
  var targetConc=parseFloat(document.getElementById('seq-target-conc')?.value)||100;
  var finalVol=parseFloat(document.getElementById('seq-final-vol')?.value)||15;
  _dilSeqRows.forEach(function(r,i){
    var conc=parseFloat(document.getElementById('seq-conc-'+i)?.value||r.conc);
    var dnaEl=document.getElementById('seq-dna-'+i);
    var waterEl=document.getElementById('seq-water-'+i);
    if(!dnaEl||!waterEl)return;
    if(conc>0&&targetConc>0&&finalVol>0){
      var dnaVol=(targetConc*finalVol)/conc;
      var water=finalVol-dnaVol;
      if(dnaVol>finalVol){
        dnaEl.textContent='too dilute';dnaEl.style.color='var(--red)';
        waterEl.textContent='—';
      } else {
        dnaEl.textContent=dnaVol.toFixed(2);dnaEl.style.color='var(--accent)';
        waterEl.textContent=water.toFixed(2);
      }
    } else {
      dnaEl.textContent='—';waterEl.textContent='—';
    }
  });
}

function addSeqRow(){
  _dilSeqRows.push({name:'',conc:'',vol:''});
  renderSeqRows();calcSeqTable();
  // Focus the new name input
  var inp=document.getElementById('seq-name-'+(_dilSeqRows.length-1));
  if(inp)inp.focus();
}

function clearSeqTable(){
  _dilSeqRows=[{name:'',conc:'',vol:''}];
  renderSeqRows();calcSeqTable();
}

function calcSerial(){
  var stock=parseFloat(document.getElementById('ser-stock')?.value);
  var factor=parseFloat(document.getElementById('ser-factor')?.value)||10;
  var steps=parseInt(document.getElementById('ser-steps')?.value)||5;
  var vol=parseFloat(document.getElementById('ser-vol')?.value)||100;
  var cUnit=document.getElementById('ser-unit')?.value||'';
  var vUnit=document.getElementById('ser-vol-unit')?.value||'\u00B5L';
  var el=document.getElementById('ser-result');
  if(!el||!stock||stock<=0){el.innerHTML='';return;}
  var transferVol=vol/factor;
  var diluent=vol-transferVol;
  var html='<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Transfer '+transferVol.toFixed(1)+' '+vUnit+' into '+diluent.toFixed(1)+' '+vUnit+' diluent per step</div>';
  html+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  var conc=stock;
  for(var i=0;i<=steps;i++){
    var label=conc>=1?conc.toFixed(1):conc.toExponential(1);
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 12px;text-align:center;min-width:70px">'+
      '<div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)">'+label+'</div>'+
      '<div style="font-size:10px;color:var(--dim)">'+esc(cUnit)+'</div>'+
    '</div>';
    if(i<steps) html+='<span style="color:var(--dim)">\u2192</span>';
    conc=conc/factor;
  }
  html+='</div>';
  el.innerHTML=html;
}
registerView('dilution', renderDilution);

function _dnaStyledSeqShort(seq) {
  var out = '';
  var count = 0;
  for (var i = 0; i < seq.length; i++) {
    var c = seq[i];
    if (!'ACGTacgt'.includes(c)) continue;
    if (count >= 40) { out += '...'; break; }
    if (c === c.toLowerCase() && c !== c.toUpperCase()) {
      out += '<span style="color:#c0a88a">' + esc(c) + '</span>';
    } else {
      out += esc(c);
    }
    count++;
  }
  return out;
}

function _dnaResistanceCell(p) {

  parts.forEach(function(r) {
    r = r.trim();
    if (r) html += '<span class="dna-resist-badge">' + esc(r) + '</span> ';

  return html;

function _dnaGbCell(type, item) {
  if (item.gb_file) {
    return '<a href="/api/' + type + 's/' + item.id + '/gb" class="dna-gb-link" title="Download ' + esc(item.gb_file) + '">\u2b07 ' + esc(item.gb_file) + '</a>' +

         '<input type="file" accept=".gb,.gbk,.genbank" style="display:none" onchange="_dnaUploadGb(\'' + type + '\',' + item.id + ',this)">' +
         '</label>';

async function _dnaUploadGb(type, id, input) {
  if (!input.files.length) return;
  var fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    var resp = await fetch('/api/' + type + 's/' + id + '/gb', { method: 'POST', body: fd });
    if (!resp.ok) { var e = await resp.json().catch(function(){return {};}); toast(e.detail || 'Upload failed'); return; }
    var result = await resp.json();
    // Show resistance info in toast if detected on a plasmid
    if (type === 'plasmid' && result.antibiotic_resistance) {
      toast('.gb file attached \u2014 resistance detected: ' + result.antibiotic_resistance);
    } else {
      toast('.gb file attached.');
    }
    _dnaRefresh();
  } catch(e) { toast('Upload error: ' + e.message); }
}

async function _dnaRemoveGb(type, id) {
  if (!confirm('Remove .gb file?')) return;
  try { await api('DELETE', '/api/' + type + 's/' + id + '/gb'); toast('Removed.'); _dnaRefresh(); }
  catch(e) { toast('Error: ' + e.message); }
}

function _dnaEditSeq(id) {
  var primer = null;
  for (var i = 0; i < _dna.primers.length; i++) {
    if (_dna.primers[i].id === id) { primer = _dna.primers[i]; break; }
  }
  if (!primer) return;

  var ov = document.getElementById('dna-import-overlay');
  if (!ov) return;

  var html =
    '<div class="dna-modal" style="max-width:540px">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
        '<h3 style="margin:0">Edit Sequence \u2014 ' + esc(primer.name) + '</h3>' +
        '<span class="dna-del" onclick="_dnaCloseSeqEdit()" style="font-size:1.4rem">\u00d7</span>' +
      '</div>' +
      '<p class="muted" style="font-size:.82rem;margin:.4rem 0 .8rem">' +
        'Select bases then click a button. <strong>UPPERCASE</strong> = annealing region, ' +
        '<span style="color:#c0a88a">lowercase</span> = overhang (ignored for Tm calculation).' +
      '</p>' +
      '<textarea id="dna-seq-editor" class="dna-seq-textarea" spellcheck="false">' + esc(primer.sequence || '') + '</textarea>' +
      '<div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap">' +
        '<button class="btn btn-sm" onclick="_dnaSeqSetCase(false)" style="background:#c0a88a;color:#fff">Make Overhang</button>' +
        '<button class="btn btn-sm" onclick="_dnaSeqSetCase(true)" style="background:#5b7a5e;color:#fff">Make Annealing</button>' +
        '<button class="btn btn-sm" onclick="_dnaSeqAllUpper()">All Annealing</button>' +
        '<button class="btn btn-sm" onclick="_dnaSeqAllLower()">All Overhang</button>' +
        '<div style="flex:1"></div>' +
        '<button class="btn btn-sm" onclick="_dnaSeqSave(' + id + ')" style="background:#4a4139;color:#fff">Save</button>' +
      '</div>' +
      '<div id="dna-seq-preview" style="margin-top:.8rem"></div>' +
    '</div>';

  ov.innerHTML = html;
  ov.style.display = '';

  _dnaSeqUpdatePreview();
  document.getElementById('dna-seq-editor').addEventListener('input', _dnaSeqUpdatePreview);
}

function _dnaCloseSeqEdit() {
  var ov = document.getElementById('dna-import-overlay');
  if (ov) { ov.innerHTML = ''; ov.style.display = 'none'; }
}

function _dnaSeqSetCase(upper) {
  var ta = document.getElementById('dna-seq-editor');
  if (!ta) return;
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  if (start === end) { toast('Select some bases first.'); return; }

  var before = ta.value.slice(0, start);
  var selected = ta.value.slice(start, end);
  var after = ta.value.slice(end);

  ta.value = before + (upper ? selected.toUpperCase() : selected.toLowerCase()) + after;
  ta.setSelectionRange(start, end);
  ta.focus();
  _dnaSeqUpdatePreview();
}

function _dnaSeqAllUpper() {
  var ta = document.getElementById('dna-seq-editor');
  if (!ta) return;
  ta.value = ta.value.toUpperCase();
  _dnaSeqUpdatePreview();
}

function _dnaSeqAllLower() {
  var ta = document.getElementById('dna-seq-editor');
  if (!ta) return;
  ta.value = ta.value.toLowerCase();
  _dnaSeqUpdatePreview();
}

function _dnaSeqUpdatePreview() {
  var ta = document.getElementById('dna-seq-editor');
  var prev = document.getElementById('dna-seq-preview');
  if (!ta || !prev) return;
  var seq = ta.value;

  var anneal = seq.replace(/[^ACGT]/g, '');
  var over = seq.replace(/[^acgt]/g, '');
  var total = anneal.length + over.length;
  var gc = anneal.length ? (anneal.replace(/[^GC]/g, '').length / anneal.length * 100).toFixed(1) : '0.0';

  var styled = '';
  for (var i = 0; i < seq.length; i++) {
    var c = seq[i];
    if (!'ACGTacgt'.includes(c)) continue;
    if (c === c.toLowerCase() && c !== c.toUpperCase()) {
      styled += '<span style="color:#c0a88a">' + esc(c) + '</span>';
    } else {
      styled += '<strong>' + esc(c) + '</strong>';
    }
  }

  prev.innerHTML =
    '<div class="dna-section-hdr" style="margin-top:0">PREVIEW</div>' +
    '<code style="font-family:\'SF Mono\',Monaco,Consolas,monospace;font-size:.85rem;word-break:break-all;line-height:1.6">' + styled + '</code>' +
    '<div class="muted" style="font-size:.78rem;margin-top:.4rem">' +
      total + ' bp total \u00b7 ' + anneal.length + ' bp annealing \u00b7 ' + over.length + ' bp overhang \u00b7 ' + gc + '% GC (annealing)' +
    '</div>';
}

async function _dnaSeqSave(id) {
  var ta = document.getElementById('dna-seq-editor');
  if (!ta) return;
  try {
    await api('PUT', '/api/primers/' + id, { sequence: ta.value });
    toast('Sequence updated.');
    _dnaCloseSeqEdit();
    _dnaRefresh();
  } catch(e) { toast('Error: ' + e.message); }
}

async function _dnaImportUpload() {

function _buildOpts(headers, selectedIdx) {
  var html = '<option value="-1"' + (selectedIdx === -1 ? ' selected' : '') + '>\u2014 skip \u2014</option>';
  for (var i = 0; i < headers.length; i++) {
    html += '<option value="' + i + '"' + (i === selectedIdx ? ' selected' : '') + '>' + esc(headers[i]) + '</option>';
  }
  return html;
}

function _guessCol(headers, patterns) {
  for (var j = 0; j < headers.length; j++) {
    var lc = (headers[j] || '').toLowerCase();
    for (var p = 0; p < patterns.length; p++) { if (lc.indexOf(patterns[p]) !== -1) return j; }
  }
  return -1;
}

function _dnaImportPreview(headers, rows) {
  if (!rows.length) return '<p class="muted">No data rows in file.</p>';
  var html = '<div style="overflow-x:auto;margin-top:.8rem"><table class="dna-table"><thead><tr>';
  for (var i = 0; i < headers.length; i++) html += '<th>' + esc(headers[i]) + '</th>';
  html += '</tr></thead><tbody>';
  for (var r = 0; r < rows.length; r++) {
    html += '<tr>';

async function _dnaImportExecute() {
  var s = _dna.importState;
  var recType = document.getElementById('dna-imp-type').value;
  var body = { temp_id: s.temp_id, ext: s.ext, filename: s.filename, record_type: recType };

  if (recType === 'primer') {
    body.col_name = parseInt(document.getElementById('dna-imp-name').value, 10);
    body.col_sequence = parseInt(document.getElementById('dna-imp-seq').value, 10);
    body.col_use = parseInt(document.getElementById('dna-imp-use').value, 10);
    body.col_box_number = parseInt(document.getElementById('dna-imp-box').value, 10);
    if (body.col_name < 0) { toast('Please select a Name column.'); return; }
    if (body.col_sequence < 0) body.col_sequence = null;
    if (body.col_use < 0) body.col_use = null;
    if (body.col_box_number < 0) body.col_box_number = null;
  } else {
    body.col_name = parseInt(document.getElementById('dna-imp-pl-name').value, 10);
    body.col_use = parseInt(document.getElementById('dna-imp-pl-use').value, 10);
    body.col_box_location = parseInt(document.getElementById('dna-imp-pl-box').value, 10);
    body.col_glycerol_location = parseInt(document.getElementById('dna-imp-pl-gly').value, 10);
    if (body.col_name < 0) { toast('Please select a Name column.'); return; }
    if (body.col_use < 0) body.col_use = null;
    if (body.col_box_location < 0) body.col_box_location = null;
    if (body.col_glycerol_location < 0) body.col_glycerol_location = null;

  } catch(e) { toast('Import failed: ' + (e.message || 'Unknown error')); }
}

// ══════════════════════════════════════════════════════════════════════════════
//  AUTO-LINKING ENGINE
// ══════════════════════════════════════════════════════════════════════════════

function _dnaBuildRegex() {
  var parts = [];
  var pp = (_dna.settings.plasmid_prefix || '').trim();
  var pr = (_dna.settings.primer_prefix || '').trim();
  if (pp && pr && pp.length >= pr.length) { parts.push(_dnaEscRe(pp)); parts.push(_dnaEscRe(pr)); }
  else if (pr && pp) { parts.push(_dnaEscRe(pp)); parts.push(_dnaEscRe(pr)); }
  else if (pp) { parts.push(_dnaEscRe(pp)); }
  else if (pr) { parts.push(_dnaEscRe(pr)); }

  if (!parts.length) { _dna.linkRegex = null; return; }
  _dna.linkRegex = new RegExp('\\b(' + parts.join('|') + ')(\\d+)\\b', 'g');
}

function _dnaEscRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function _dnaLinkifyElement(el) {
  if (!_dna.linkRegex) return;
  if (el.dataset && el.dataset.dnaLinked) return;
  if (el.closest && (el.closest('.dna-manager') || el.closest('.dna-popover') || el.closest('.dna-modal'))) return;
  var tag = (el.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'script' || tag === 'style' || tag === 'code') return;

  var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
    acceptNode: function(n) {
      var p = n.parentElement;
      if (!p) return NodeFilter.FILTER_ACCEPT;
      var pt = p.tagName.toLowerCase();
      if (pt === 'script' || pt === 'style' || pt === 'textarea' || pt === 'input' || pt === 'code') return NodeFilter.FILTER_REJECT;
      if (p.classList && p.classList.contains('dna-link')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  }, false);

  var textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(function(node) {
    var text = node.textContent;
    _dna.linkRegex.lastIndex = 0;
    if (!_dna.linkRegex.test(text)) return;
    _dna.linkRegex.lastIndex = 0;

    var frag = document.createDocumentFragment();
    var lastIdx = 0;
    var match;
    while ((match = _dna.linkRegex.exec(text)) !== null) {
      if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      var a = document.createElement('a');
      a.className = 'dna-link';
      a.href = '#';
      a.dataset.dnaName = match[0];
      a.textContent = match[0];
      frag.appendChild(a);
      lastIdx = match.index + match[0].length;
    }
    if (lastIdx > 0) {
      if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
      node.parentNode.replaceChild(frag, node);
    }
  });

  if (el.dataset) el.dataset.dnaLinked = '1';
}

// ── Scan all existing content for linkification ─────────────────────────────
// This fixes the bug where links only appeared when scrolling through days
// (i.e. only on new mutations) but not on initial view render.

function _dnaLinkifyAll() {
  if (!_dna.linkRegex) return;
  var target = document.getElementById('main') || document.getElementById('content') || document.body;
  // Find all elements that could contain text content to linkify
  var candidates = target.querySelectorAll('.card, .entry, .entry-content, [class*="content"], p, div, td, li, span, h1, h2, h3, h4');
  for (var i = 0; i < candidates.length; i++) {
    _dnaLinkifyElement(candidates[i]);
  }
}

var _dnaObserver = null;

function _dnaStartObserver() {
  if (_dnaObserver) return;
  var target = document.getElementById('main') || document.getElementById('content') || document.body;
  _dnaObserver = new MutationObserver(function(mutations) {
    if (!_dna.linkRegex) return;
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) _dnaLinkifyElement(node);
      });
    });
  });
  _dnaObserver.observe(target, { childList: true, subtree: true });

  // Immediately linkify existing content on the page
  _dnaLinkifyAll();
}

// ── Hook into view changes so we re-linkify after navigation ────────────────
// When setView() is called, the new view renders async content that may not
// be caught by the mutation observer (e.g. if innerHTML is set on an element
// that already exists). We re-scan after a short delay to catch these cases.

var _dnaOrigSetView = null;

function _dnaHookSetView() {
  if (_dnaOrigSetView) return; // already hooked
  if (typeof setView !== 'function') return;
  _dnaOrigSetView = setView;
  setView = function(name) {
    _dnaOrigSetView(name);
    // Re-linkify after the new view has rendered (async content needs time)
    setTimeout(_dnaLinkifyAll, 200);
    setTimeout(_dnaLinkifyAll, 800);
  };
}

//  POPOVER
// ══════════════════════════════════════════════════════════════════════════════

document.addEventListener('click', function(e) {
  var link = e.target.closest('.dna-link');
  if (!link) { _dnaClosePopover(); return; }
  e.preventDefault();
  e.stopPropagation();
  _dnaShowPopover(link);
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') _dnaClosePopover(); });

function _dnaShowPopover(linkEl) {
  var name = linkEl.dataset.dnaName;
  if (!name) return;

  var pp = (_dna.settings.plasmid_prefix || '').trim();
  var pr = (_dna.settings.primer_prefix || '').trim();
  var type = null, item = null;

  if (pp && name.indexOf(pp) === 0) {
    type = 'plasmid';
    item = _dnaFindByName(_dna.plasmids, name);
  } else if (pr && name.indexOf(pr) === 0) {
    type = 'primer';
    item = _dnaFindByName(_dna.primers, name);
  }

  var pop = document.getElementById('dna-popover');
  if (!pop) return;

  var html = '<div class="dna-pop-header">';
  html += '<strong>' + esc(name) + '</strong>';
  html += '<span class="dna-del" onclick="_dnaClosePopover()" style="font-size:1.1rem">\u00d7</span>';
  html += '</div>';

  if (!item) {
    html += '<div class="dna-pop-body"><span class="muted">Not found in database.</span></div>';
  } else if (type === 'primer') {
    html += '<div class="dna-pop-body">';
    html += '<div class="dna-pop-type">PRIMER</div>';
    if (item.sequence) html += '<div class="dna-pop-row"><span class="dna-pop-label">Sequence</span><code class="dna-pop-seq">' + esc(item.sequence) + '</code></div>';
    if (item.use) html += '<div class="dna-pop-row"><span class="dna-pop-label">Use</span>' + esc(item.use) + '</div>';
    if (item.box_number) html += '<div class="dna-pop-row"><span class="dna-pop-label">Box #</span>' + esc(item.box_number) + '</div>';
    if (item.tm) html += '<div class="dna-pop-row"><span class="dna-pop-label">Tm</span>' + Number(item.tm).toFixed(1) + '\u00b0C</div>';
    if (item.gb_file) html += '<div class="dna-pop-row"><a href="/api/primers/' + item.id + '/gb" class="dna-gb-link">\u2b07 ' + esc(item.gb_file) + '</a></div>';
    html += '</div>';
  } else {
    html += '<div class="dna-pop-body">';
    html += '<div class="dna-pop-type">PLASMID</div>';
    if (item.use) html += '<div class="dna-pop-row"><span class="dna-pop-label">Use</span>' + esc(item.use) + '</div>';
    if (item.antibiotic_resistance) html += '<div class="dna-pop-row"><span class="dna-pop-label">Resistance</span>' + esc(item.antibiotic_resistance) + '</div>';
    if (item.box_location) html += '<div class="dna-pop-row"><span class="dna-pop-label">Box</span>' + esc(item.box_location) + '</div>';
    if (item.glycerol_location) html += '<div class="dna-pop-row"><span class="dna-pop-label">Glycerol</span>' + esc(item.glycerol_location) + '</div>';
    if (item.gb_file) html += '<div class="dna-pop-row"><a href="/api/plasmids/' + item.id + '/gb" class="dna-gb-link">\u2b07 ' + esc(item.gb_file) + '</a></div>';
    html += '</div>';
  }

  html += '<div class="dna-pop-footer"><a href="#" onclick="_dnaGoToManager(\'' + esc(type || '') + '\');return false;">View in DNA Manager \u2192</a></div>';

  pop.innerHTML = html;

  var rect = linkEl.getBoundingClientRect();
  pop.style.display = '';
  var popW = pop.offsetWidth || 280;
  var popH = pop.offsetHeight || 200;
  var left = rect.left + window.scrollX;
  var top = rect.bottom + window.scrollY + 6;
  if (left + popW > window.innerWidth - 16) left = window.innerWidth - popW - 16;
  if (left < 8) left = 8;
  if (top + popH > window.innerHeight + window.scrollY - 16) top = rect.top + window.scrollY - popH - 6;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function _dnaClosePopover() {
  var pop = document.getElementById('dna-popover');
  if (pop) pop.style.display = 'none';
}

function _dnaFindByName(arr, name) {
  var lc = name.toLowerCase();
  for (var i = 0; i < arr.length; i++) {
    if ((arr[i].name || '').toLowerCase() === lc) return arr[i];
  }
  return null;
}

function _dnaGoToManager(type) {
  _dnaClosePopover();
  if (type === 'plasmid') _dna.tab = 'plasmids';
  else _dna.tab = 'primers';
  if (typeof setView === 'function') setView('import_data');
}

function _dnaInitLinking() {
  if (typeof api !== 'function') return;
  Promise.all([
    api('GET', '/api/dna/settings').catch(function() { return {}; }),
    api('GET', '/api/primers').catch(function() { return {items:[]}; }),
    api('GET', '/api/plasmids').catch(function() { return {items:[]}; })
  ]).then(function(results) {
    _dna.settings = results[0] || {};
    _dna.primers = (results[1] && results[1].items) || [];
    _dna.plasmids = (results[2] && results[2].items) || [];
    _dnaBuildRegex();
    _dnaStartObserver();
    _dnaHookSetView();
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _dnaInitLinking);
} else {
  setTimeout(_dnaInitLinking, 0);
}

// Register with core
registerView('import_data', renderDnaManager);

/* ── Backup Feature ─────────────────────────────────────────────────────── */

async function renderBackup(el) {
  el.innerHTML = '<div class="bk-loading">Loading…</div>';

  var settings = {};
  var backups   = [];

  try {
    settings = await api('GET', '/api/backup/settings');
  } catch(e) { settings = {}; }
  try {
    var d = await api('GET', '/api/backup/list');
    backups = d.items || [];
  } catch(e) { backups = []; }

  el.innerHTML = buildBackupUI(settings, backups);
  attachBackupHandlers(el, settings, backups);
}

/* ── UI builder ─────────────────────────────────────────────────────────── */

function buildBackupUI(settings, backups) {
  var last = backups.find(function(b){ return b.status === 'ok' || b.status === 'partial'; });
  var lastStr = last ? relTime(last.created) : 'Never';
  var nextStr = settings.daily_enabled
    ? ('Daily at ' + (settings.daily_time || '02:00') + ' UTC')
    : 'Scheduled backup off';

  var totalSize = backups.reduce(function(a,b){ return a + (b.size_bytes||0); }, 0);
  var totalStr  = backups.length + ' backup' + (backups.length === 1 ? '' : 's') +
                  ' · ' + _fmtBytes(totalSize);

  return '<div class="bk-wrap">' +

    /* ── header ── */
    '<div class="bk-header">' +
      '<div class="bk-header-left">' +
        '<div class="bk-title">Backup &amp; Restore</div>' +
        '<div class="bk-subtitle">Protect your lab data across multiple destinations</div>' +
      '</div>' +
      '<button class="bk-btn-primary" id="bk-run-btn">↑ Back Up Now</button>' +
    '</div>' +

    /* ── stat row ── */
    '<div class="bk-stats">' +
      _statCard('Last backup', lastStr, 'bk-stat-icon-time') +
      _statCard('Scheduled', nextStr, 'bk-stat-icon-cal') +
      _statCard('Stored', totalStr, 'bk-stat-icon-db') +
      _statCard('Google Drive', settings.rclone_configured ? '● Connected' : '○ Not linked', 'bk-stat-icon-cloud', settings.rclone_configured ? 'ok' : 'off') +
      _statCard('Network Share', settings.smb_host ? '● Connected' : '○ Not linked', 'bk-stat-icon-smb', settings.smb_host ? 'ok' : 'off') +
    '</div>' +

    /* ── tabs ── */
    '<div class="bk-tabs">' +
      '<button class="bk-tab bk-tab-active" data-tab="history">History</button>' +
      '<button class="bk-tab" data-tab="schedule">Schedule</button>' +
      '<button class="bk-tab" data-tab="gdrive">Google Drive</button>' +
      '<button class="bk-tab" data-tab="smb">Network Share</button>' +

    '<div class="bk-panels">' +
      _panelHistory(backups) +
      _panelSchedule(settings) +
      _panelGdrive(settings) +
      _panelSmb(settings) +

    _runModal(settings) +

    /* ── restore modal ── */
    '<div class="bk-overlay" id="bk-restore-overlay" style="display:none">' +
      '<div class="bk-modal">' +
        '<div class="bk-modal-title">⚠ Restore Backup</div>' +
        '<p class="bk-modal-body">This will <strong>overwrite your current database and all .gb files</strong> with the selected backup. The page will reload after restore.</p>' +
        '<p class="bk-modal-filename" id="bk-restore-filename" style="font-family:\'SF Mono\',Monaco,Consolas,monospace;font-size:.8rem;background:#f0ebe3;padding:6px 10px;border-radius:4px;margin:0 0 20px;word-break:break-all"></p>' +

        '</div>' +
      '</div>' +
    '</div>' +

  '</div>';
}

function _statCard(label, value, iconCls, state) {

function _panelHistory(backups) {
  var rows = '';

  } else {
    rows = '<table class="bk-table"><thead><tr>' +
      '<th>File</th><th>Size</th><th>Destinations</th><th>When</th><th>Status</th><th></th>' +
    '</tr></thead><tbody>';
    backups.forEach(function(b) {
      var dests = (b.destinations || []).map(function(d){
        var icons = {local:'💾', gdrive:'☁', smb:'🖥'};
        return '<span class="bk-dest-tag">' + (icons[d]||'') + ' ' + esc(d) + '</span>';
      }).join('');
      var statusCls = b.status === 'ok' ? 'bk-status-ok' : b.status === 'partial' ? 'bk-status-partial' : 'bk-status-err';
      var statusLabel = b.status === 'ok' ? '✓ OK' : b.status === 'partial' ? '⚠ Partial' : '✗ Error';

      if (b.exists) {
        actions += '<button class="bk-act bk-act-dl" data-id="' + b.id + '" title="Download">↓</button>';

      }
      actions += '<button class="bk-act bk-act-del" data-id="' + b.id + '" title="Delete">✕</button>';

      rows += '<tr class="' + (b.exists?'':'bk-row-missing') + '">' +
        '<td class="bk-cell-file"><span class="bk-filename">' + esc(b.filename) + '</span>' +
          (b.notes ? '<div class="bk-notes">' + esc(b.notes) + '</div>' : '') + '</td>' +
        '<td class="bk-cell-size">' + _fmtBytes(b.size_bytes) + '</td>' +
        '<td>' + dests + '</td>' +

/* ── event handlers ─────────────────────────────────────────────────────── */

function attachBackupHandlers(el, settings, backups) {
  /* tabs */
  el.querySelectorAll('.bk-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      el.querySelectorAll('.bk-tab').forEach(function(t){ t.classList.remove('bk-tab-active'); });
      el.querySelectorAll('.bk-panel').forEach(function(p){ p.classList.remove('bk-panel-active'); });
      tab.classList.add('bk-tab-active');
      var panel = el.querySelector('#bk-panel-' + tab.dataset.tab);
      if (panel) panel.classList.add('bk-panel-active');
    });
  });

  /* Run modal */
  var runOverlay = el.querySelector('#bk-run-overlay');
  el.querySelector('#bk-run-btn').addEventListener('click', function() {
    el.querySelector('#bk-run-label').value = '';
    el.querySelector('#bk-run-status').textContent = '';
    runOverlay.style.display = 'flex';
  });
  el.querySelector('#bk-run-cancel').addEventListener('click', function(){ runOverlay.style.display='none'; });
  runOverlay.addEventListener('click', function(e){ if(e.target===runOverlay) runOverlay.style.display='none'; });

  el.querySelector('#bk-run-confirm').addEventListener('click', async function() {
    var btn   = this;
    var dests = ['local'];
    el.querySelectorAll('input[name="bk-dest"]').forEach(function(cb){
      if (cb.checked && !cb.disabled && cb.value !== 'local') dests.push(cb.value);
    });
    var label = el.querySelector('#bk-run-label').value.trim();
    var st    = el.querySelector('#bk-run-status');
    btn.disabled = true;
    btn.textContent = 'Creating…';
    st.className = 'bk-conn-status';
    st.textContent = '⏳ Creating backup archive…';
    try {
      var result = await api('POST', '/api/backup/run', {destinations: dests, label: label});
      runOverlay.style.display = 'none';
      var destList = result.destinations ? result.destinations.join(', ') : 'local';
      toast('Backup created → ' + destList);
      renderBackup(document.getElementById('content'));
    } catch(e) {
      st.className = 'bk-conn-status bk-status-err';
      st.textContent = '✗ ' + (e.message || 'Backup failed');
      btn.disabled = false;
      btn.textContent = 'Create Backup';
    }
  });

  /* History actions */
  el.querySelectorAll('.bk-act-dl').forEach(function(btn) {
    btn.addEventListener('click', function() {
      window.open('/api/backup/' + btn.dataset.id + '/download', '_blank');
    });
  });

  var restoreOverlay = el.querySelector('#bk-restore-overlay');
  var pendingRestoreId = null;

  el.querySelectorAll('.bk-act-restore').forEach(function(btn) {
    btn.addEventListener('click', function() {
      pendingRestoreId = btn.dataset.id;
      el.querySelector('#bk-restore-filename').textContent = btn.dataset.file;
      restoreOverlay.style.display = 'flex';
    });
  });
  el.querySelector('#bk-restore-cancel').addEventListener('click', function(){ restoreOverlay.style.display='none'; });
  restoreOverlay.addEventListener('click', function(e){ if(e.target===restoreOverlay) restoreOverlay.style.display='none'; });

  el.querySelector('#bk-restore-confirm').addEventListener('click', async function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = 'Restoring…';
    try {
      var r = await api('POST', '/api/backup/' + pendingRestoreId + '/restore', {});
      toast(r.message || 'Restore complete');
      restoreOverlay.style.display = 'none';
      setTimeout(function(){ location.reload(); }, 1500);
    } catch(e) {
      toast('Restore failed: ' + (e.message || 'Unknown error'), true);
      btn.disabled = false;
      btn.textContent = 'Restore This Backup';
    }
  });

  el.querySelectorAll('.bk-act-del').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      if (!confirm('Delete this backup? (local file will be removed)')) return;
      try {

  /* Schedule */

        await api('POST', '/api/backup/settings', {daily_enabled: enabled, daily_time: time});

        renderBackup(document.getElementById('content'));
      } catch(e) {
        toast('Save failed', true);
      }
    });
  }

  /* Google Drive (rclone) */
  var gSave   = el.querySelector('#bk-gdrive-save');
  var gTest   = el.querySelector('#bk-gdrive-test');
  var gStatus = el.querySelector('#bk-gdrive-status');

  if (gSave) {
    gSave.addEventListener('click', async function() {
      var remote = (el.querySelector('#bk-gdrive-remote') || {}).value || 'gdrive';
      var path   = (el.querySelector('#bk-gdrive-path')   || {}).value || 'lab_backups';
      gSave.disabled = true;
      gStatus.className = 'bk-conn-status';
      gStatus.textContent = '⏳ Saving…';
      try {
        await api('POST', '/api/backup/settings', {rclone_remote: remote.trim(), rclone_path: path.trim()});
        gStatus.className = 'bk-conn-status bk-status-ok';
        gStatus.textContent = '✓ Saved';
        setTimeout(function(){ renderBackup(document.getElementById('content')); }, 600);
      } catch(e) {
        gStatus.className = 'bk-conn-status bk-status-err';
        gStatus.textContent = '✗ ' + (e.message || 'Failed');
        gSave.disabled = false;
      }
    });
  }

  if (gTest) {
    gTest.addEventListener('click', async function() {
      gStatus.className = 'bk-conn-status';
      gStatus.textContent = '⏳ Testing rclone connection…';
      try {
        var tr = await api('POST', '/api/backup/test-rclone', {});
        gStatus.className = 'bk-conn-status bk-status-ok';
        gStatus.textContent = '✓ Connected\n' + (tr.info || '');
      } catch(e) {
        gStatus.className = 'bk-conn-status bk-status-err';
        gStatus.textContent = '✗ ' + (e.message || 'Connection failed');
      }
    });
  }

  /* SMB */
  var sSave   = el.querySelector('#bk-smb-save');
  var sTest   = el.querySelector('#bk-smb-test');
  var sClear  = el.querySelector('#bk-smb-clear');

      smb_user:     (el.querySelector('#bk-smb-user')     || {}).value || null,
      smb_password: (el.querySelector('#bk-smb-password') || {}).value || null,
      smb_path:     (el.querySelector('#bk-smb-path')     || {}).value || 'lab_backups',
    };
  }

  if (sSave) {
    sSave.addEventListener('click', async function() {
      var fields = readSmbFields();
      if (!fields.smb_host || !fields.smb_share) {
        sStatus.className='bk-conn-status bk-status-err';
        sStatus.textContent='✗ Host and share name are required';
        return;
      }
      // Don't send "***" placeholders
      var payload = {};
      Object.keys(fields).forEach(function(k){
        if (fields[k] && fields[k] !== '***') payload[k] = fields[k];
      });
      sSave.disabled = true;
      sStatus.className='bk-conn-status'; sStatus.textContent='⏳ Saving…';

      renderBackup(document.getElementById('content'));
    });
  }
}

function _fmtBytes(n) {
  if (!n) return '0 B';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  if (n < 1073741824) return (n/1048576).toFixed(1) + ' MB';
  return (n/1073741824).toFixed(2) + ' GB';
}

// ── Data loading ─────────────────────────────────────────────────────────────

async function _tmLoadData() {
  try { _tm.primers = (await api('GET', '/api/primers')).items || []; } catch(e) { _tm.primers = []; }
  try { _tm.polymerases = (await api('GET', '/api/tm/polymerases')).items || []; } catch(e) { _tm.polymerases = []; }
  try { _tm.history = (await api('GET', '/api/tm/history')).items || []; } catch(e) { _tm.history = []; }
}

// ── Primer selection ─────────────────────────────────────────────────────────

function _tmPrimerSelected(dir) {
  var sel = document.getElementById('tm-' + dir + '-sel');
  var seqInput = document.getElementById('tm-' + dir + '-seq');
  var info = document.getElementById('tm-' + dir + '-info');
  if (!sel || !seqInput) return;

  var val = sel.value;
  if (val === 'custom' || val === '') {
    seqInput.value = '';
    seqInput.disabled = false;
    seqInput.style.display = '';
    if (info) info.innerHTML = '';
    return;
  }

  var id = parseInt(val, 10);
  var primer = null;
  for (var i = 0; i < _tm.primers.length; i++) {
    if (_tm.primers[i].id === id) { primer = _tm.primers[i]; break; }
  }

  if (primer && primer.sequence) {
    seqInput.value = primer.sequence;
    seqInput.disabled = true;
    seqInput.style.display = '';
    if (info) {
      var full = primer.sequence.replace(/[^ACGTacgt]/g, '');
      var anneal = primer.sequence.replace(/[^ACGT]/g, '');
      var overhang = full.length - anneal.length;
      var gc = anneal.length ? (anneal.replace(/[^GC]/g, '').length / anneal.length * 100).toFixed(1) : 0;
      var txt = '<span>' + anneal.length + ' bp annealing</span> <span>GC: ' + gc + '%</span>';
      if (overhang > 0) txt += ' <span class="tm-overhang-tag">' + overhang + ' bp overhang</span>';
      info.innerHTML = txt;
    }
  } else {
    seqInput.value = '';
    seqInput.disabled = false;
    if (info) info.innerHTML = '<span class="muted">No sequence stored for this primer</span>';
  }
}

function _tmPolyChanged() {
  var sel = document.getElementById('tm-poly');
  var notes = document.getElementById('tm-poly-notes');
  if (!sel || !notes) return;
  var id = sel.value;
  for (var i = 0; i < _tm.polymerases.length; i++) {
    if (_tm.polymerases[i].id === id) {
      notes.textContent = _tm.polymerases[i].notes || '';
      return;
    }
  }
  notes.textContent = '';
}

// ── Calculate ────────────────────────────────────────────────────────────────

async function _tmCalculate() {
  var fwdSel = document.getElementById('tm-fwd-sel');
  var revSel = document.getElementById('tm-rev-sel');
  var fwdSeq = (document.getElementById('tm-fwd-seq') || {}).value || '';
  var revSeq = (document.getElementById('tm-rev-seq') || {}).value || '';
  var poly = (document.getElementById('tm-poly') || {}).value || '';
  var primerNm = parseFloat((document.getElementById('tm-primer-nm') || {}).value) || 250;

  if (!fwdSeq.trim() || !revSeq.trim()) { toast('Enter or select both primers.'); return; }

  var body = {
    polymerase: poly,
    primer_nm: primerNm,
    seq_fwd: fwdSeq.trim(),
    seq_rev: revSeq.trim()
  };

  var fwdVal = fwdSel ? fwdSel.value : '';
  var revVal = revSel ? revSel.value : '';
  if (fwdVal && fwdVal !== 'custom') body.primer_fwd_id = parseInt(fwdVal, 10);
  if (revVal && revVal !== 'custom') body.primer_rev_id = parseInt(revVal, 10);

  try {
    var data = await api('POST', '/api/tm/calculate', body);
    _tm.result = data;
    _tmShowResult(data);
    // refresh history
    try { _tm.history = (await api('GET', '/api/tm/history')).items || []; } catch(e) {}
    var hEl = document.getElementById('tm-history');
    if (hEl) hEl.innerHTML = _tmRenderHistory();
  } catch(e) {
    toast('Error: ' + (e.message || 'Calculation failed'));
  }
}

// ── Results display ──────────────────────────────────────────────────────────

function _tmShowResult(r) {
  var el = document.getElementById('tm-results');
  if (!el) return;

  var diffWarn = r.tm_diff > 5;

  var html = '<div class="card tm-result-card">';
  html += '<div class="tm-section-hdr" style="margin-top:0">RESULTS \u2014 ' + esc(r.polymerase.name) + '</div>';

  // big annealing temp
  html += '<div class="tm-ta-box">';
  html += '<div class="tm-ta-label">Recommended Annealing Temperature</div>';
  html += '<div class="tm-ta-value">' + r.ta.toFixed(1) + '\u00b0C</div>';
  html += '<div class="muted" style="font-size:.78rem">' + esc(r.polymerase.notes) + '</div>';
  html += '</div>';

  // primer details side by side
  html += '<div class="tm-primer-results">';

  html += '<div class="tm-primer-result-col">';
  html += '<div class="tm-label">Forward: ' + esc(r.fwd.name) + '</div>';
  html += '<div class="tm-temp">Tm: <strong>' + r.fwd.tm.toFixed(1) + '\u00b0C</strong></div>';
  html += '<div class="tm-detail">' + r.fwd.annealing_len + ' bp annealing \u00b7 ' + r.fwd.gc.toFixed(1) + '% GC';
  if (r.fwd.overhang_len) html += ' \u00b7 <span class="tm-overhang-tag">' + r.fwd.overhang_len + ' bp overhang</span>';
  html += '</div>';
  html += '<div class="tm-seq-display"><code>' + _tmStyledSeq(r.fwd.sequence) + '</code></div>';
  html += '</div>';

  html += '<div class="tm-primer-result-col">';
  html += '<div class="tm-label">Reverse: ' + esc(r.rev.name) + '</div>';
  html += '<div class="tm-temp">Tm: <strong>' + r.rev.tm.toFixed(1) + '\u00b0C</strong></div>';
  html += '<div class="tm-detail">' + r.rev.annealing_len + ' bp annealing \u00b7 ' + r.rev.gc.toFixed(1) + '% GC';
  if (r.rev.overhang_len) html += ' \u00b7 <span class="tm-overhang-tag">' + r.rev.overhang_len + ' bp overhang</span>';
  html += '</div>';
  html += '<div class="tm-seq-display"><code>' + _tmStyledSeq(r.rev.sequence) + '</code></div>';
  html += '</div>';

  html += '</div>';

  // Tm difference warning
  html += '<div class="tm-diff' + (diffWarn ? ' tm-diff-warn' : '') + '">';
  html += '\u0394Tm: ' + r.tm_diff.toFixed(1) + '\u00b0C';
  if (diffWarn) html += ' \u2014 large difference, consider redesigning primers or using a touchdown protocol';
  html += '</div>';

  html += '</div>';
  el.innerHTML = html;
}

// ── History ──────────────────────────────────────────────────────────────────

function _tmRenderHistory() {
  var items = _tm.history || [];
  if (!items.length) return '<div class="muted" style="padding:.5rem 0">No calculations yet.</div>';

  var html = '<div class="tm-table-wrap"><table class="dna-table"><thead><tr>';
  html += '<th>Forward</th><th>Reverse</th><th>Polymerase</th><th>Tm Fwd</th><th>Tm Rev</th><th>Ta</th><th>Date</th><th></th>';
  html += '</tr></thead><tbody>';
  items.forEach(function(c) {
    var pname = c.polymerase;
    html += '<tr>';
    html += '<td class="dna-cell-name">' + esc(c.primer_fwd) + '</td>';
    html += '<td class="dna-cell-name">' + esc(c.primer_rev) + '</td>';
    html += '<td>' + esc(pname) + '</td>';
    html += '<td>' + Number(c.tm_fwd).toFixed(1) + '\u00b0</td>';
    html += '<td>' + Number(c.tm_rev).toFixed(1) + '\u00b0</td>';
    html += '<td><strong>' + Number(c.ta).toFixed(1) + '\u00b0</strong></td>';
    html += '<td class="muted">' + esc((c.created || '').slice(0, 10)) + '</td>';
    html += '<td><span class="dna-del" onclick="_tmDeleteCalc(' + c.id + ')" title="Delete">\u00d7</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function _tmDeleteCalc(id) {
  try {
    await api('DELETE', '/api/tm/history/' + id);
    _tm.history = _tm.history.filter(function(c) { return c.id !== id; });
    var hEl = document.getElementById('tm-history');
    if (hEl) hEl.innerHTML = _tmRenderHistory();
  } catch(e) { toast('Error: ' + e.message); }
}

// ── Sequence styling helper ───────────────────────────────────────────────────

function _tmStyledSeq(seq) {
  // lowercase = overhang (faded), UPPERCASE = annealing (bold)
  var html = '';
  var inOverhang = false;
  for (var i = 0; i < seq.length; i++) {
    var c = seq[i];
    if (!'ACGTacgt'.includes(c)) continue;
    var isLower = c === c.toLowerCase() && c !== c.toUpperCase();
    if (isLower && !inOverhang) {
      html += '<span class="tm-oh">';
      inOverhang = true;
    } else if (!isLower && inOverhang) {
      html += '</span>';
      inOverhang = false;
    }
    html += esc(c);
  }
  if (inOverhang) html += '</span>';
  return html;
}
