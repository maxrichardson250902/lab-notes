function protoDelRow(pid, ri) { var r = _recipeState[pid]; if (!r) return; r.rows.splice(ri, 1); document.getElementById('recipe-body-' + pid).innerHTML = _recipeEditHTML(pid, r); }
function protoAddCol(pid) { var name = prompt('Column name:'); if (!name) return; var r = _recipeState[pid]; if (!r) return; r.columns.push(name); r.rows.forEach(function(row) { row.push(''); }); document.getElementById('recipe-body-' + pid).innerHTML = _recipeEditHTML(pid, r); }
function protoDelCol(pid, ci) { var r = _recipeState[pid]; if (!r || r.columns.length <= 1) { toast('Need at least one column', true); return; } r.columns.splice(ci, 1); r.rows.forEach(function(row) { row.splice(ci, 1); }); document.getElementById('recipe-body-' + pid).innerHTML = _recipeEditHTML(pid, r); }

// ── manual entry helpers ──────────────────────────────────────────────────────
function _manualTableHTML(ti) {
  var t = _manualRecipes[ti];
  var html = '<div class="manual-table-wrap" id="mtw-' + ti + '" style="margin-bottom:14px;border:1px solid #d5cec0;border-radius:6px;overflow:hidden">';
  html += '<div style="display:flex;align-items:center;background:#f0ebe3;padding:6px 10px;gap:8px">';
  html += '<input type="text" value="' + esc(t.name) + '" placeholder="Table name (e.g. PCR Mix)" spellcheck="false" ' +
    'style="flex:1;font-size:12px;font-weight:600;border:none;background:transparent;color:#4a4139;outline:none" ' +
    'oninput="manualTableRename(' + ti + ',this.value)"/>';
  html += '<button class="btn" style="font-size:11px;color:#c0392b" onclick="manualDelTable(' + ti + ')">&#215; Remove table</button>';
  html += '</div>';
  html += '<div style="padding:8px 10px">';
  if (!t.rows.length) {
    html += '<div style="color:#8a7f72;font-size:13px;font-style:italic;margin-bottom:6px">No components yet</div>';
  } else {
    html += '<div style="overflow-x:auto"><table class="recipe-table" style="margin-bottom:6px"><thead><tr>';
    t.columns.forEach(function(c, ci) {
      html += '<th>' + esc(c) + '<button class="del-col" onclick="manualTableDelCol(' + ti + ',' + ci + ')">&#215;</button></th>';
    });
    html += '<th style="width:28px"></th></tr></thead><tbody>';
    t.rows.forEach(function(row, ri) {
      html += '<tr>';
      t.columns.forEach(function(col, ci) {
        if (_isUnitCol(col)) { html += _manualUnitCellHTMLT(ti, ri, ci, row[ci] || ''); }
        else { html += '<td><input type="text" value="' + esc(row[ci] || '') + '" oninput="manualTableCell(' + ti + ',' + ri + ',' + ci + ',this.value)"/></td>'; }
      });
      html += '<td><button class="del-row" onclick="manualTableDelRow(' + ti + ',' + ri + ')">&#215;</button></td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '<div class="recipe-add-row">' +
    '<button class="btn" onclick="manualTableAddRow(' + ti + ')">+ Row</button>' +
    '<button class="btn" onclick="manualTableAddCol(' + ti + ')">+ Column</button>' +
  '</div></div></div>';
  return html;
}

function _manualUnitCellHTMLT(ti, ri, ci, val) {
  var p = _parseAmountUnit(val);
  var unitOpts = _UNITS.map(function(u) { return '<option value="' + u + '"' + (p.unit === u ? ' selected' : '') + '>' + u + '</option>'; }).join('');
  return '<td style="padding:0"><div style="display:flex;align-items:center">' +
    '<input type="number" value="' + esc(p.num) + '" min="0" step="any" placeholder="0" ' +
      'style="width:68px;border:none;background:transparent;padding:6px 4px 6px 8px;font-size:13px;font-family:inherit;color:#4a4139;outline:none" ' +
      'oninput="manualTableCellUnit(' + ti + ',' + ri + ',' + ci + ',this.value,this.nextElementSibling.value)"/>' +
    '<select style="border:none;background:transparent;font-size:12px;color:#8a7f72;font-family:inherit;padding:0 4px 0 0;cursor:pointer;outline:none" ' +
      'onchange="manualTableCellUnit(' + ti + ',' + ri + ',' + ci + ',this.previousElementSibling.value,this.value)">' +
      '<option value="">-</option>' + unitOpts +
    '</select></div></td>';
}

function _refreshManualRecipe() {
  var el = document.getElementById('manual-recipe-body'); if (!el) return;
  if (!_manualRecipes.length) { el.innerHTML = '<div style="color:#8a7f72;font-size:13px;font-style:italic">No tables yet — click + Add table above.</div>'; return; }
  el.innerHTML = _manualRecipes.map(function(_, ti) { return _manualTableHTML(ti); }).join('');
}

function manualAddTable() {
  _manualRecipes.push({ name: 'Table ' + (_manualRecipes.length + 1), columns: ['Component', 'Stock conc.', 'Volume (uL)', 'Final conc.'], rows: [] });
  _refreshManualRecipe();
}
function manualDelTable(ti) { _manualRecipes.splice(ti, 1); _refreshManualRecipe(); }
function manualTableRename(ti, name) { if (_manualRecipes[ti]) _manualRecipes[ti].name = name; }
function manualTableCell(ti, ri, ci, value) { if (_manualRecipes[ti] && _manualRecipes[ti].rows[ri]) _manualRecipes[ti].rows[ri][ci] = value; }
function manualTableCellUnit(ti, ri, ci, num, unit) { var v = (num || '').trim() + (unit ? ' ' + unit : ''); if (_manualRecipes[ti] && _manualRecipes[ti].rows[ri]) _manualRecipes[ti].rows[ri][ci] = v.trim(); }
function manualTableAddRow(ti) { var t = _manualRecipes[ti]; if (!t) return; t.rows.push(t.columns.map(function() { return ''; })); _refreshManualRecipe(); }
function manualTableDelRow(ti, ri) { var t = _manualRecipes[ti]; if (!t) return; t.rows.splice(ri, 1); _refreshManualRecipe(); }
function manualTableAddCol(ti) { var name = prompt('Column name:'); if (!name) return; var t = _manualRecipes[ti]; if (!t) return; t.columns.push(name); t.rows.forEach(function(r) { r.push(''); }); _refreshManualRecipe(); }
function manualTableDelCol(ti, ci) { var t = _manualRecipes[ti]; if (!t || t.columns.length <= 1) { toast('Need at least one column', true); return; } t.columns.splice(ci, 1); t.rows.forEach(function(r) { r.splice(ci, 1); }); _refreshManualRecipe(); }

// keep old single-table functions as no-ops for compatibility
function _manualRecipeState() { return _manualRecipes[0] || JSON.parse(JSON.stringify(DEFAULT_RECIPE)); }
function manualRecipeCell(ri, ci, value) { manualTableCell(0, ri, ci, value); }
function manualRecipeCellUnit(ri, ci, num, unit) { manualTableCellUnit(0, ri, ci, num, unit); }
function manualRecipeAddRow() { manualTableAddRow(0); }
function manualRecipeDelRow(ri) { manualTableDelRow(0, ri); }
function manualRecipeAddCol() { manualTableAddCol(0); }
function manualRecipeDelCol(ci) { manualTableDelCol(0, ci); }

function _manualStepRowHTML(idx, value) {
  return '<div class="manual-step-row" id="msr-' + idx + '">' +
    '<span class="manual-step-num">' + (idx + 1) + '.</span>' +
    '<input type="text" value="' + esc(value || '') + '" placeholder="Describe this step..." spellcheck="false" ' +
      'data-stepidx="' + idx + '" ' +
      'oninput="manualStepUpdate(' + idx + ',this.value)"/>' +
    '<button class="manual-del-step" onclick="manualDelStep(' + idx + ')">&#215;</button>' +
  '</div>';
}

function _manualRecipeHTML() {
  var r = _manualRecipeState();
  if (!r.rows.length) {
    return '<div style="display:flex;gap:6px;align-items:center">' +
      '<span style="color:#8a7f72;font-size:13px;font-style:italic">No components yet</span>' +
      '<button class="btn" onclick="manualRecipeAddRow()">+ Add component</button>' +
      '<button class="btn" onclick="manualRecipeAddCol()">+ Column</button>' +
    '</div>';
  }
  var html = '<div style="overflow-x:auto"><table class="recipe-table" style="margin-bottom:6px"><thead><tr>';
  r.columns.forEach(function(c, ci) { html += '<th>' + esc(c) + '<button class="del-col" onclick="manualRecipeDelCol(' + ci + ')">&#215;</button></th>'; });
  html += '<th style="width:28px"></th></tr></thead><tbody>';
  r.rows.forEach(function(row, ri) {
    html += '<tr>';
    r.columns.forEach(function(col, ci) {
      if (_isUnitCol(col)) { html += _manualUnitCellHTML(ri, ci, row[ci] || ''); }

    });
    html += '<td><button class="del-row" onclick="manualRecipeDelRow(' + ri + ')">&#215;</button></td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<div class="recipe-add-row"><button class="btn" onclick="manualRecipeAddRow()">+ Row</button><button class="btn" onclick="manualRecipeAddCol()">+ Column</button></div>';
  return html;
}

function _attachManualStepListeners() {
  var list = document.getElementById('manual-steps-list'); if (!list) return;
  list.querySelectorAll('input[data-stepidx]').forEach(function(inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); manualAddStep(); }
    });
  });
}

function _refreshManualSteps() {
  var list = document.getElementById('manual-steps-list'); if (!list) return;
  list.innerHTML = _manualSteps.map(function(v, i) { return _manualStepRowHTML(i, v); }).join('');
  _attachManualStepListeners();
  var last = document.querySelector('#msr-' + (_manualSteps.length - 1) + ' input');
  if (last) last.focus();
}


function manualStepUpdate(idx, value) { _manualSteps[idx] = value; }
function manualAddStep() {
  _manualSteps.push('');
  var list = document.getElementById('manual-steps-list'); if (!list) return;
  var idx = _manualSteps.length - 1;
  var wrap = document.createElement('div'); wrap.innerHTML = _manualStepRowHTML(idx, '');
  list.appendChild(wrap.firstChild);
  var inp = document.querySelector('#msr-' + idx + ' input');
  if (inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); manualAddStep(); }
    });
    inp.focus();
  }
}
function manualDelStep(idx) { if (_manualSteps.length <= 1) { _manualSteps[0] = ''; _refreshManualSteps(); return; } _manualSteps.splice(idx, 1); _refreshManualSteps(); }
// single-table compat shims now in multi-table section above

async function protoAddManual() {
  var title = (document.getElementById('proto-title-manual')?.value || '').trim();
  if (!title) { toast('Add a title', true); return; }
  var steps = _manualSteps.filter(function(s) { return s.trim(); });
  if (!steps.length) { toast('Add at least one step', true); return; }
  var recipe = _manualRecipes.length ? JSON.stringify(_manualRecipes) : null;
  var btn = document.querySelector('#pt-manual .btn.primary');
  if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }
  try {
    await api('POST', '/api/protocols/from-manual', { title: title, steps: steps, recipe: recipe, tags: [] });
    _manualSteps = ['']; _manualRecipes = [];
    await loadView(); toast('Protocol saved');
  } catch(e) { toast('Failed: ' + e.message, true); }
  finally { if (btn) { btn.textContent = 'Save Protocol'; btn.disabled = false; } }
}

// ── import actions ─────────────────────────────────────────────────────────────
async function protoAddUrl() {
  var url = document.getElementById('proto-url')?.value.trim();
  var title = document.getElementById('proto-title-url')?.value.trim();
  if (!url) { toast('Paste a URL first', true); return; }

async function protoAddFile() {

  if (!title) { toast('Add a title', true); return; }

// ── protocol link rendering ───────────────────────────────────────────────────
function _renderStepText(text) {
  // render [@Title](proto:ID) as clickable badges, escape everything else
  var parts = text.split(/(\[@[^\]]+\]\(proto:\d+\))/g);
  return parts.map(function(part) {
    var m = part.match(/^\[@([^\]]+)\]\(proto:(\d+)\)$/);
    if (m) {
      return '<span class="proto-link-badge" onclick="protoJumpTo(' + m[2] + ')" title="Open ' + esc(m[1]) + '">&#8599; ' + esc(m[1]) + '</span>';
    }
    return esc(part);
  }).join('');
}

function protoJumpTo(id) {
  // open the card and scroll to it
  var card = document.getElementById('pc-' + id);
  if (!card) return;
  if (!card.classList.contains('open')) protoToggle(id);
  setTimeout(function() { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
}

// ── insert protocol link into manual step ─────────────────────────────────────
function manualLinkProtocol() {
  var protos = (S.protocols || []);
  if (!protos.length) { toast('No protocols to link to yet', true); return; }
  // find which step input is focused, or use last
  var focused = document.querySelector('#manual-steps-list input:focus');
  var targetInput = focused || document.querySelector('#manual-steps-list input:last-of-type');
  var targetIdx = targetInput ? parseInt((targetInput.closest('[id^=msr-]') || {}).id?.replace('msr-','') || '0') : 0;

  // build a simple picker
  var opts = protos.map(function(p) { return '<option value="' + p.id + '">' + esc(p.title) + '</option>'; }).join('');
  var div = document.createElement('div');
  div.id = 'proto-link-picker';
  div.style.cssText = 'position:fixed;inset:0;background:rgba(60,52,42,.35);display:flex;align-items:center;justify-content:center;z-index:2000';
  div.innerHTML = '<div style="background:#faf8f4;border:1px solid #d5cec0;border-radius:8px;padding:20px;min-width:320px;max-width:440px;width:100%">' +
    '<div style="font-weight:600;font-size:14px;margin-bottom:10px">Link to protocol</div>' +
    '<input type="text" id="plp-q" placeholder="Search..." spellcheck="false" style="width:100%;margin-bottom:8px" oninput="plpFilter()"/>' +
    '<select id="plp-sel" size="6" style="width:100%;border:1px solid #d5cec0;border-radius:4px;background:#f0ebe3;font-family:inherit;font-size:13px">' + opts + '</select>' +
    '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">' +
      '<button class="btn" onclick="document.getElementById('proto-link-picker').remove()">Cancel</button>' +
      '<button class="btn primary" onclick="plpInsert(' + targetIdx + ')">Insert link</button>' +
    '</div></div>';
  document.body.appendChild(div);
  document.getElementById('plp-q')?.focus();
}

function plpFilter() {
  var q = (document.getElementById('plp-q')?.value || '').toLowerCase();
  document.querySelectorAll('#plp-sel option').forEach(function(o) { o.style.display = (!q || o.textContent.toLowerCase().includes(q)) ? '' : 'none'; });
}

function plpInsert(stepIdx) {
  var sel = document.getElementById('plp-sel');
  if (!sel || !sel.value) { toast('Select a protocol', true); return; }
  var p = (S.protocols || []).find(function(x) { return x.id === parseInt(sel.value); });
  if (!p) return;
  document.getElementById('proto-link-picker')?.remove();
  var link = '[@' + p.title + '](proto:' + p.id + ')';
  // append link to the target step
  var inp = document.querySelector('#msr-' + stepIdx + ' input');
  if (inp) {
    var cur = inp.value;
    inp.value = cur ? cur + ' ' + link : link;
    manualStepUpdate(stepIdx, inp.value);
  } else {
    // add as new step
    _manualSteps.push(link);
    _refreshManualSteps();
  }
}

// ── inline edit mode ──────────────────────────────────────────────────────────
var _editState = {}; // pid -> {title, steps}

function protoEdit(pid) {
  var p = (S.protocols || []).find(function(x) { return x.id === pid; });
  if (!p) return;
  var card = document.getElementById('pc-' + pid);
  if (!card) return;
  if (!card.classList.contains('open')) protoToggle(pid);

  var steps = [];
  try {
    var parsed = JSON.parse(p.steps || '[]');
    if (Array.isArray(parsed) && parsed.length && typeof parsed[0].text !== 'undefined') steps = parsed;
  } catch(e) {}

  _editState[pid] = { title: p.title, steps: steps.map(function(s) { return s.text; }) };

  var body = document.getElementById('pb-' + pid); if (!body) return;

  // replace title
  var titleEl = card.querySelector('.protocol-title');
  if (titleEl) titleEl.outerHTML = '<input id="pe-title-' + pid + '" type="text" value="' + esc(p.title) + '" ' +
    'style="font-weight:600;font-size:14px;color:#4a4139;border:none;border-bottom:1px solid #5b7a5e;background:transparent;outline:none;width:100%;margin-bottom:4px" ' +
    'oninput="_editState[' + pid + '].title=this.value"/>';

  // replace steps
  var stepsContainer = body.querySelector('ol.steps-list, div.steps-text');
  if (!stepsContainer && !steps.length) {
    // no steps area, insert before recipe section
    var recipeSection = body.querySelector('.recipe-section');
    var placeholder = document.createElement('div');
    placeholder.id = 'pe-steps-' + pid;
    body.insertBefore(placeholder, recipeSection);
  }

  var stepsTarget = stepsContainer || document.getElementById('pe-steps-' + pid);
  if (stepsTarget) {
    var stepsHtml = '<div id="pe-steps-' + pid + '">';
    (_editState[pid].steps.length ? _editState[pid].steps : ['']).forEach(function(text, i) {
      stepsHtml += '<div class="proto-edit-step" id="pes-' + pid + '-' + i + '">' +
        '<span style="font-size:12px;color:#8a7f72;min-width:20px;text-align:right">' + (i+1) + '.</span>' +
        '<input type="text" value="' + esc(text) + '" spellcheck="false" ' +
          'oninput="_editState[' + pid + '].steps[' + i + ']=this.value" ' +
          'data-editpid="' + pid + '" data-editidx="' + i + '"/>' +
        '<button class="link-btn" onclick="protoEditLinkStep(' + pid + ',' + i + ')">&#8599; Link</button>' +
        '<button style="background:none;border:none;cursor:pointer;color:#c0b8b0;font-size:16px;padding:0 4px" onclick="protoEditDelStep(' + pid + ',' + i + ')">&#215;</button>' +
      '</div>';
    });
    stepsHtml += '<div style="margin-top:6px;display:flex;gap:6px">' +
      '<button class="btn" onclick="protoEditAddStep(' + pid + ',-1)">+ Step</button>' +
      '<button class="btn" style="color:#5b7a5e" onclick="protoEditLinkStep(' + pid + ',-1)">&#8599; Link protocol</button>' +
    '</div></div>';
    stepsTarget.outerHTML = stepsHtml;
    _attachEditStepListeners(pid);
  }

  // swap card action buttons
  var actions = card.querySelector('.proto-card-actions');
  if (actions) actions.innerHTML =
    '<button class="btn primary" onclick="event.stopPropagation();protoSaveEdit(' + pid + ')">&#10003; Save</button>' +
    '<button class="btn" onclick="event.stopPropagation();protoCancelEdit(' + pid + ')">Cancel</button>';
}

function protoEditAddStep(pid, afterIdx) {
  var es = _editState[pid]; if (!es) return;
  if (afterIdx < 0) es.steps.push('');
  else es.steps.splice(afterIdx + 1, 0, '');
  _refreshEditSteps(pid);
  setTimeout(function() {
    var idx = afterIdx < 0 ? es.steps.length - 1 : afterIdx + 1;
    document.querySelector('#pes-' + pid + '-' + idx + ' input')?.focus();
  }, 50);
}

function protoEditDelStep(pid, idx) {
  var es = _editState[pid]; if (!es) return;
  if (es.steps.length <= 1) { es.steps[0] = ''; _refreshEditSteps(pid); return; }
  es.steps.splice(idx, 1);
  _refreshEditSteps(pid);
}

function protoEditLinkStep(pid, afterIdx) {
  var protos = (S.protocols || []).filter(function(x) { return x.id !== pid; });
  if (!protos.length) { toast('No other protocols to link to', true); return; }
  var opts = protos.map(function(p) { return '<option value="' + p.id + '">' + esc(p.title) + '</option>'; }).join('');
  var div = document.createElement('div');
  div.id = 'proto-link-picker';
  div.style.cssText = 'position:fixed;inset:0;background:rgba(60,52,42,.35);display:flex;align-items:center;justify-content:center;z-index:2000';
  div.innerHTML = '<div style="background:#faf8f4;border:1px solid #d5cec0;border-radius:8px;padding:20px;min-width:320px;max-width:440px;width:100%">' +
    '<div style="font-weight:600;font-size:14px;margin-bottom:10px">Link to protocol</div>' +
    '<input type="text" id="plp-q" placeholder="Search..." spellcheck="false" style="width:100%;margin-bottom:8px" oninput="plpFilter()"/>' +
    '<select id="plp-sel" size="6" style="width:100%;border:1px solid #d5cec0;border-radius:4px;background:#f0ebe3;font-family:inherit;font-size:13px">' + opts + '</select>' +
    '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">' +
      '<button class="btn" onclick="document.getElementById('proto-link-picker').remove()">Cancel</button>' +
      '<button class="btn primary" onclick="plpEditInsert(' + pid + ',' + afterIdx + ')">Insert link</button>' +
    '</div></div>';
  document.body.appendChild(div);
  document.getElementById('plp-q')?.focus();
}

function plpEditInsert(pid, afterIdx) {
  var sel = document.getElementById('plp-sel');
  if (!sel || !sel.value) { toast('Select a protocol', true); return; }
  var p = (S.protocols || []).find(function(x) { return x.id === parseInt(sel.value); });
  if (!p) return;
  document.getElementById('proto-link-picker')?.remove();
  var link = '[@' + p.title + '](proto:' + p.id + ')';
  var es = _editState[pid]; if (!es) return;
  if (afterIdx < 0) es.steps.push(link);
  else es.steps.splice(afterIdx + 1, 0, link);
  _refreshEditSteps(pid);
}

function _attachEditStepListeners(pid) {
  var container = document.getElementById('pe-steps-' + pid); if (!container) return;
  container.querySelectorAll('input[data-editpid]').forEach(function(inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); protoEditAddStep(parseInt(inp.dataset.editpid), parseInt(inp.dataset.editidx)); }
    });
  });
}

function _refreshEditSteps(pid) {
  var es = _editState[pid]; if (!es) return;
  var container = document.getElementById('pe-steps-' + pid); if (!container) return;
  var stepsHtml = '';
  (es.steps.length ? es.steps : ['']).forEach(function(text, i) {
    stepsHtml += '<div class="proto-edit-step" id="pes-' + pid + '-' + i + '">' +
      '<span style="font-size:12px;color:#8a7f72;min-width:20px;text-align:right">' + (i+1) + '.</span>' +
      '<input type="text" value="' + esc(text) + '" spellcheck="false" ' +
        'oninput="_editState[' + pid + '].steps[' + i + ']=this.value" ' +
        'data-editpid="' + pid + '" data-editidx="' + i + '"/>' +
      '<button class="link-btn" onclick="protoEditLinkStep(' + pid + ',' + i + ')">&#8599; Link</button>' +
      '<button style="background:none;border:none;cursor:pointer;color:#c0b8b0;font-size:16px;padding:0 4px" onclick="protoEditDelStep(' + pid + ',' + i + ')">&#215;</button>' +
    '</div>';
  });
  stepsHtml += '<div style="margin-top:6px;display:flex;gap:6px">' +
    '<button class="btn" onclick="protoEditAddStep(' + pid + ',-1)">+ Step</button>' +
    '<button class="btn" style="color:#5b7a5e" onclick="protoEditLinkStep(' + pid + ',-1)">&#8599; Link protocol</button>' +
  '</div>';
  container.innerHTML = stepsHtml;
  _attachEditStepListeners(pid);
}

async function protoSaveEdit(pid) {
  var es = _editState[pid]; if (!es) return;
  var steps = es.steps.filter(function(s) { return s.trim(); });
  var stepsJson = JSON.stringify(steps.map(function(s) { return { text: s }; }));
  var titleInput = document.getElementById('pe-title-' + pid);
  var title = titleInput ? titleInput.value.trim() : es.title;
  if (!title) { toast('Title cannot be empty', true); return; }
  await api('PUT', '/api/protocols/' + pid, { title: title, steps: stepsJson });
  // update local cache
  var p = (S.protocols || []).find(function(x) { return x.id === pid; });
  if (p) { p.title = title; p.steps = stepsJson; }
  delete _editState[pid];
  await loadView();
  toast('Protocol updated');
}

async function protoCancelEdit(pid) {
  delete _editState[pid];
  await loadView();
}

// ── SUMMARIES ─────────────────────────────────────────────────────────────────
async function renderSummaries(el){
  const data=await api('GET','/api/summaries');
  S.summaries=data.summaries||[];
  if(!S.summaries.length){
    el.innerHTML='<div class="empty"><big>&#128202;</big>No summaries yet — these are generated by the 3090 during nightly enrichment, or trigger enrichment manually from the todo app.</div>';
    return;
  }
  el.innerHTML=S.summaries.map(s=>{
    const steps=JSON.parse(s.next_steps||'[]');
    return '<div class="summary-card">'+
      '<div class="summary-group">'+esc(s.group_name)+'</div>'+
      '<div class="summary-text">'+esc(s.summary)+'</div>'+
      (steps.length?'<div class="next-steps">'+steps.map(step=>'<div class="next-step">'+esc(step)+'</div>').join('')+'</div>':'')+
      '<div class="summary-updated">Updated '+relTime(s.updated)+'</div>'+
    '</div>';
  }).join('');
}

.pl-hint { font-size: .74rem; color: #8a7f72; }
.pl-svg { flex: 1; width: 100%; display: block; cursor: default; user-select: none; }

/* ── SVG elements ── */
.pl-node { cursor: grab; }
.pl-ncm { cursor: crosshair; }

  fill: #faf8f4; stroke: #ccc5bb; stroke-width: 1.5;

  stroke-dasharray: 7,4; pointer-events: none;
  animation: pldash .65s linear infinite;
}
@keyframes pldash { to { stroke-dashoffset: -22; } }
.pl-hdl { fill: #5b7a5e; stroke: #faf8f4; stroke-width: 2.5; cursor: crosshair; }
.pl-hdl:hover { fill: #4a6a4d; }
`;
  document.head.appendChild(_css);
}

/* ═══════════════ STATE ═══════════════ */
var PL = {
  pipelines: [], current: null, protocols: [],
  selectedStep: null, connectMode: false, connectFrom: null,
  editing: null,
  editForm: { name: '', notes: '', protocol_id: '' },
  newForm: { name: '', description: '' },
  showNew: false,
  pan: { x: 40, y: 40 },
  dragging: null,   // { id, ox, oy, sx, sy }
  panning:  null,   // { ox, oy, px, py }
  dragged:  false,
  mouse:    { x: 0, y: 0 },
};

var NW = 164, NH = 62;   // node width / height
var _plEl = null;

/* ═══════════════ HELPERS ═══════════════ */
function plProto(id) {
  return PL.protocols.find(function (p) { return p.id === id; }) || null;
}
function plStep(id) {
  return PL.current
    ? PL.current.steps.find(function (s) { return s.id === id; }) || null
    : null;
}
function trunc(str, n) {
  return str && str.length > n ? str.substring(0, n - 1) + '…' : (str || '');
}
function bezier(from, to) {
  var x1 = from.pos_x + NW, y1 = from.pos_y + NH / 2;
  var x2 = to.pos_x,        y2 = to.pos_y  + NH / 2;
  var cx = Math.max(55, Math.abs(x2 - x1) * 0.44);
  return 'M' + x1 + ',' + y1 +
         ' C' + (x1 + cx) + ',' + y1 +
         ' '  + (x2 - cx) + ',' + y2 +
         ' '  + x2        + ',' + y2;
}
function autoPos() {
  var ss = PL.current ? PL.current.steps : [];
  if (!ss.length) return { x: 80, y: 120 };
  var maxX = Math.max.apply(null, ss.map(function (s) { return s.pos_x; }));
  var avgY = ss.reduce(function (a, s) { return a + s.pos_y; }, 0) / ss.length;
  return { x: maxX + NW + 70, y: Math.round(avgY) };
}
function worldPt(svg, worldEl, e) {
  var pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  return pt.matrixTransform(worldEl.getScreenCTM().inverse());
}

/* ═══════════════ DRAW ═══════════════ */
function plDraw() {
  if (!_plEl) return;
  _plEl.innerHTML = '<div class="pl-root">' + plSidebar() + plCanvas() + '</div>';
  plBind();
}

/* ── sidebar ── */
function plSidebar() {
  return PL.current ? plSbPipeline() : plSbList();
}

function plSbList() {
  var h = '<div class="pl-sb">';
  h += '<div class="pl-sb-head"><span class="pl-sec">Pipelines</span>';
  h += '<button class="pl-btn pl-btn-sm" onclick="plShowNew()">+ New</button></div>';
  if (PL.showNew) {
    h += '<div class="pl-new-form">';
    h += '<input id="pl-nn" class="pl-inp" placeholder="Pipeline name" value="' + esc(PL.newForm.name) + '">';
    h += '<textarea id="pl-nd" class="pl-inp pl-ta" placeholder="Description (optional)">' + esc(PL.newForm.description) + '</textarea>';
    h += '<div class="pl-row-btns">';
    h += '<button class="pl-btn pl-btn-p" onclick="plCreate()">Create</button>';
    h += '<button class="pl-btn" onclick="plHideNew()">Cancel</button>';
    h += '</div></div>';
  }
  if (!PL.pipelines.length) {
    h += '<div class="pl-empty">No pipelines yet.<br>Create one to start mapping<br>your experimental workflows.</div>';
  } else {
    h += '<div class="pl-list">';
    PL.pipelines.forEach(function (p) {
      h += '<div class="pl-pcrd" onclick="plOpen(' + p.id + ')">';
      h += '<div class="pl-pname">' + esc(p.name) + '</div>';
      if (p.description) h += '<div class="pl-pdesc">' + esc(p.description) + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function plSbPipeline() {
  var c = PL.current;
  var h = '<div class="pl-sb">';
  h += '<div class="pl-sb-head">';
  h += '<button class="pl-btn pl-btn-back" onclick="plClose()">← Back</button>';
  h += '</div>';
  h += '<div class="pl-ptitle-wrap">';
  h += '<div contenteditable="true" id="pl-ptitle" class="pl-ptitle" onblur="plSaveTitle(this)">' + esc(c.pipeline.name) + '</div>';
  if (c.pipeline.description) h += '<div class="pl-pdescr">' + esc(c.pipeline.description) + '</div>';
  h += '</div>';
  h += '<div class="pl-step-lh">';
  h += '<span class="pl-sec">Steps</span>';
  h += '<button class="pl-btn pl-btn-sm" onclick="plAddStep()">+ Add</button>';
  h += '</div>';
  if (PL.editing !== null) h += plStepForm();
  h += '<div class="pl-step-scroll">';
  if (!c.steps.length) {
    h += '<div class="pl-empty-sm">No steps yet. Add one to begin.</div>';
  } else {
    c.steps.forEach(function (s) {
      var sel = PL.selectedStep === s.id;
      h += '<div class="pl-scrd' + (sel ? ' pl-scrd-sel' : '') + '" onclick="plSelStep(' + s.id + ')">';
      h += '<div class="pl-sname">' + esc(s.name) + '</div>';
      var pr = plProto(s.protocol_id);
      if (pr) h += '<div class="pl-sproto">⬡ ' + esc(pr.title) + '</div>';
      if (s.notes) h += '<div class="pl-snotes">' + esc(s.notes) + '</div>';
      h += '<div class="pl-sbtns">';
      h += '<button class="pl-ibtn" onclick="event.stopPropagation();plEditStep(' + s.id + ')" title="Edit">✎</button>';
      h += '<button class="pl-ibtn pl-ibtn-d" onclick="event.stopPropagation();plDelStep(' + s.id + ')" title="Delete">✕</button>';
      h += '</div></div>';
    });
  }
  h += '</div>';
  h += '<div class="pl-sb-foot"><button class="pl-btn pl-btn-del" onclick="plDelPipeline()">Delete Pipeline</button></div>';
  h += '</div>';
  return h;
}

function plStepForm() {
  var isNew = PL.editing === 'new';
  var h = '<div class="pl-sform">';
  h += '<div class="pl-ftitle">' + (isNew ? 'New Step' : 'Edit Step') + '</div>';
  h += '<input id="pl-sn" class="pl-inp" placeholder="Step name" value="' + esc(PL.editForm.name) + '">';
  h += '<textarea id="pl-sno" class="pl-inp pl-ta" placeholder="Notes (optional)">' + esc(PL.editForm.notes) + '</textarea>';
  h += '<select id="pl-sp" class="pl-inp pl-sel">';
  h += '<option value="">No protocol linked</option>';
  PL.protocols.forEach(function (p) {
    var sel = String(PL.editForm.protocol_id) === String(p.id) ? ' selected' : '';
    h += '<option value="' + p.id + '"' + sel + '>' + esc(p.title) + '</option>';
  });
  h += '</select>';
  h += '<div class="pl-row-btns">';
  h += '<button class="pl-btn pl-btn-p" onclick="plSaveStep()">Save</button>';
  h += '<button class="pl-btn" onclick="plCancelEdit()">Cancel</button>';
  h += '</div></div>';
  return h;
}

/* ── canvas ── */
function plCanvas() {
  if (!PL.current) {
    return '<div class="pl-cv-empty"><div class="pl-cv-hint">← Select a pipeline to view its graph</div></div>';
  }
  var c = PL.current;
  var h = '<div class="pl-cv">';

  /* toolbar */
  h += '<div class="pl-toolbar">';
  if (PL.connectMode) {
    h += '<button class="pl-btn pl-btn-on" onclick="plTogConn()">✕ Cancel</button>';
    h += '<span class="pl-hint">' + (PL.connectFrom ? 'Now click the destination step' : 'Click the source step') + '</span>';
  } else {
    h += '<button class="pl-btn" onclick="plTogConn()">↝ Connect Steps</button>';
    h += '<span class="pl-hint">Drag nodes to reposition · Click edges to remove</span>';
  }
  h += '</div>';

  /* SVG */
  h += '<svg class="pl-svg" id="pl-svg">';
  h += '<defs>';
  /* normal arrowhead */
  h += '<marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">';
  h += '<path d="M0,0 L0,7 L9,3.5 z" fill="#b5aca0"/></marker>';
  /* highlight arrowhead (preview / hover) */
  h += '<marker id="arr-hi" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">';
  h += '<path d="M0,0 L0,7 L9,3.5 z" fill="#5b7a5e"/></marker>';
  h += '</defs>';

  h += '<g id="pl-world" transform="translate(' + PL.pan.x + ',' + PL.pan.y + ')">';

  /* edges */
  h += '<g id="pl-edges">';
  c.edges.forEach(function (e) {
    var f = plStep(e.from_step), t = plStep(e.to_step);
    if (!f || !t) return;
    h += '<path class="pl-edge" d="' + bezier(f, t) + '" data-eid="' + e.id + '" marker-end="url(#arr)"/>';
  });
  h += '</g>';

  /* preview edge while connecting */
  if (PL.connectMode && PL.connectFrom) {
    var src = plStep(PL.connectFrom);
    if (src) {
      var x1 = src.pos_x + NW, y1 = src.pos_y + NH / 2;
      var x2 = PL.mouse.x,     y2 = PL.mouse.y;
      var cx = Math.max(40, Math.abs(x2 - x1) * 0.4);
      h += '<path class="pl-eprev" d="M' + x1 + ',' + y1 +
           ' C' + (x1 + cx) + ',' + y1 +
           ' ' + (x2 - cx) + ',' + y2 +
           ' ' + x2 + ',' + y2 + '" marker-end="url(#arr-hi)"/>';
    }
  }

  /* nodes */
  h += '<g id="pl-nodes">';
  c.steps.forEach(function (s) {
    var sel  = PL.selectedStep === s.id;
    var csrc = PL.connectFrom  === s.id;
    var cls  = 'pl-node' + (sel ? ' pl-ns' : '') + (csrc ? ' pl-ncs' : '') + (PL.connectMode ? ' pl-ncm' : '');
    h += '<g class="' + cls + '" data-sid="' + s.id + '" transform="translate(' + s.pos_x + ',' + s.pos_y + ')">';
    h += '<rect class="pl-nbg" width="' + NW + '" height="' + NH + '" rx="8"/>';
    h += '<text class="pl-nlbl" x="12" y="26">' + esc(trunc(s.name, 17)) + '</text>';
    var pr = plProto(s.protocol_id);
    if (pr) {
      h += '<text class="pl-nproto" x="12" y="45">⬡ ' + esc(trunc(pr.title, 20)) + '</text>';
    } else if (s.notes) {
      h += '<text class="pl-nnotes" x="12" y="45">' + esc(trunc(s.notes, 22)) + '</text>';
    }
    /* connection handle – only shown when in connect-mode awaiting source pick */
    if (PL.connectMode && !PL.connectFrom) {
      h += '<circle class="pl-hdl" cx="' + NW + '" cy="' + (NH / 2) + '" r="6" data-sid="' + s.id + '"/>';
    }
    h += '</g>';
  });
  h += '</g>';
  h += '</g>'; /* world */
  h += '</svg></div>';
  return h;
}

/* ═══════════════ FAST REDRAW (graph only, no sidebar) ═══════════════ */
function plRedrGraph() {
  var world = document.getElementById('pl-world');
  if (!world || !PL.current) return;

  /* edges */
  var eEl = document.getElementById('pl-edges');
  if (eEl) {
    var eh = '';
    PL.current.edges.forEach(function (e) {
      var f = plStep(e.from_step), t = plStep(e.to_step);
      if (!f || !t) return;
      eh += '<path class="pl-edge" d="' + bezier(f, t) + '" data-eid="' + e.id + '" marker-end="url(#arr)"/>';
    });
    eEl.innerHTML = eh;
  }

  /* preview edge */
  var prev = world.querySelector('.pl-eprev');
  if (prev) prev.remove();
  if (PL.connectMode && PL.connectFrom) {
    var src = plStep(PL.connectFrom);
    if (src) {
      var x1 = src.pos_x + NW, y1 = src.pos_y + NH / 2;
      var x2 = PL.mouse.x, y2 = PL.mouse.y;
      var cx = Math.max(40, Math.abs(x2 - x1) * 0.4);
      var p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('class', 'pl-eprev');
      p.setAttribute('d', 'M' + x1 + ',' + y1 + ' C' + (x1 + cx) + ',' + y1 + ' ' + (x2 - cx) + ',' + y2 + ' ' + x2 + ',' + y2);
      p.setAttribute('marker-end', 'url(#arr-hi)');
      world.insertBefore(p, document.getElementById('pl-nodes'));
    }
  }

  /* nodes */
  var nEl = document.getElementById('pl-nodes');
  if (nEl) {
    var nh = '';
    PL.current.steps.forEach(function (s) {
      var sel  = PL.selectedStep === s.id;
      var csrc = PL.connectFrom  === s.id;
      var cls  = 'pl-node' + (sel ? ' pl-ns' : '') + (csrc ? ' pl-ncs' : '') + (PL.connectMode ? ' pl-ncm' : '');
      nh += '<g class="' + cls + '" data-sid="' + s.id + '" transform="translate(' + s.pos_x + ',' + s.pos_y + ')">';
      nh += '<rect class="pl-nbg" width="' + NW + '" height="' + NH + '" rx="8"/>';
      nh += '<text class="pl-nlbl" x="12" y="26">' + esc(trunc(s.name, 17)) + '</text>';
      var pr = plProto(s.protocol_id);
      if (pr) {
        nh += '<text class="pl-nproto" x="12" y="45">⬡ ' + esc(trunc(pr.title, 20)) + '</text>';
      } else if (s.notes) {
        nh += '<text class="pl-nnotes" x="12" y="45">' + esc(trunc(s.notes, 22)) + '</text>';
      }
      if (PL.connectMode && !PL.connectFrom) {
        nh += '<circle class="pl-hdl" cx="' + NW + '" cy="' + (NH / 2) + '" r="6" data-sid="' + s.id + '"/>';
      }
      nh += '</g>';
    });
    nEl.innerHTML = nh;
  }

  world.setAttribute('transform', 'translate(' + PL.pan.x + ',' + PL.pan.y + ')');
}

/* ═══════════════ EVENT BINDING ═══════════════ */
function plKeydown(e) {
  if (e.key === 'Escape' && PL.connectMode) {
    PL.connectMode = false; PL.connectFrom = null;
    plDraw();
  }
}

function plBind() {
  document.removeEventListener('keydown', plKeydown);
  var svg = document.getElementById('pl-svg');
  if (!svg) return;
  document.addEventListener('keydown', plKeydown);

  /* mousemove: drag node, pan, preview edge */
  svg.addEventListener('mousemove', function (e) {
    var world = document.getElementById('pl-world');
    if (!world) return;
    var wp = worldPt(svg, world, e);
    PL.mouse = { x: wp.x, y: wp.y };

    if (PL.dragging) {
      PL.dragged = true;
      var s = plStep(PL.dragging.id);
      if (s) {
        s.pos_x = PL.dragging.sx + (wp.x - PL.dragging.ox);
        s.pos_y = PL.dragging.sy + (wp.y - PL.dragging.oy);
      }
      plRedrGraph();
    } else if (PL.panning) {
      PL.dragged = true;
      PL.pan.x = PL.panning.px + (e.clientX - PL.panning.ox);
      PL.pan.y = PL.panning.py + (e.clientY - PL.panning.oy);
      var w2 = document.getElementById('pl-world');
      if (w2) w2.setAttribute('transform', 'translate(' + PL.pan.x + ',' + PL.pan.y + ')');
    } else if (PL.connectMode && PL.connectFrom) {
      plRedrGraph();
    }
  });

  /* mouseup: save position after drag */
  svg.addEventListener('mouseup', function () {
    if (PL.dragging) {
      var s = plStep(PL.dragging.id);
      if (s && PL.dragged) {
        var pid = PL.current.pipeline.id;
        api('PATCH', '/api/pipelines/' + pid + '/steps/' + s.id + '/pos',
            { pos_x: s.pos_x, pos_y: s.pos_y }).catch(function () {});
      }
      PL.dragging = null;
    }
    PL.panning = null;
  });
  /* also catch mouseup outside svg */
  document.addEventListener('mouseup', function () {
    if (PL.dragging) { PL.dragging = null; }
    PL.panning = null;
  }, { once: false });

  /* mousedown: start drag or pan */
  svg.addEventListener('mousedown', function (e) {
    PL.dragged = false;
    var hdl  = e.target.closest('.pl-hdl');
    var node = e.target.closest('[data-sid]');
    var world = document.getElementById('pl-world');

    /* handle click in connect mode */
    if (hdl && PL.connectMode && !PL.connectFrom) {
      PL.connectFrom = parseInt(hdl.dataset.sid);
      plRedrGraph();
      e.stopPropagation(); return;
    }

    /* start node drag (not in connect mode) */
    if (node && !PL.connectMode) {
      var sid = parseInt(node.dataset.sid);
      var s = plStep(sid);
      if (!s) return;
      var wp = worldPt(svg, world, e);
      PL.dragging = { id: sid, ox: wp.x, oy: wp.y, sx: s.pos_x, sy: s.pos_y };
      e.preventDefault(); e.stopPropagation(); return;
    }

    /* pan on empty background */
    if (!node) {
      PL.panning = { ox: e.clientX, oy: e.clientY, px: PL.pan.x, py: PL.pan.y };
    }
  });

  /* click: connect / select / delete edge */
  svg.addEventListener('click', function (e) {
    if (PL.dragged) return;

    var node = e.target.closest('[data-sid]');
    var edge = e.target.closest('.pl-edge');

    if (PL.connectMode) {
      if (node) {
        var sid = parseInt(node.dataset.sid);
        if (!PL.connectFrom) {
          PL.connectFrom = sid; plRedrGraph();
        } else if (PL.connectFrom !== sid) {
          var pid = PL.current.pipeline.id;
          api('POST', '/api/pipelines/' + pid + '/edges',
              { from_step: PL.connectFrom, to_step: sid })
            .then(function (edge) {
              var exists = PL.current.edges.find(function (x) { return x.id === edge.id; });
              if (!exists) PL.current.edges.push(edge);
              PL.connectFrom = null; PL.connectMode = false;
              plDraw(); toast('Connection added');
            }).catch(function () { toast('Failed', true); });
        }
      }
      return;
    }

    if (edge) {
      var eid = parseInt(edge.dataset.eid);
      if (confirm('Remove this connection?')) {
        var pid2 = PL.current.pipeline.id;
        api('DELETE', '/api/pipelines/' + pid2 + '/edges/' + eid).then(function () {
          PL.current.edges = PL.current.edges.filter(function (x) { return x.id !== eid; });
          plRedrGraph(); toast('Connection removed');
        });
      }
      return;
    }

    if (node) {
      var sid2 = parseInt(node.dataset.sid);
      PL.selectedStep = PL.selectedStep === sid2 ? null : sid2;
      plDraw(); return;
    }

    /* click on empty canvas — deselect */
    if (PL.selectedStep !== null) {
      PL.selectedStep = null; plDraw();
    }
  });
}

/* ═══════════════ ACTIONS ═══════════════ */
function plShowNew() {
  PL.showNew = true; PL.newForm = { name: '', description: '' };
  plDraw(); setTimeout(function () { var e = document.getElementById('pl-nn'); if (e) e.focus(); }, 0);
}
function plHideNew() { PL.showNew = false; plDraw(); }

async function plCreate() {
  var n = (document.getElementById('pl-nn').value || '').trim();
  var d = (document.getElementById('pl-nd').value || '').trim();
  if (!n) { toast('Name required', true); return; }
  var p = await api('POST', '/api/pipelines', { name: n, description: d });
  PL.pipelines.unshift(p);
  PL.showNew = false;
  await plOpen(p.id);
}

async function plOpen(id) {
  var data = await api('GET', '/api/pipelines/' + id);
  PL.current = data;
  PL.selectedStep = null; PL.connectMode = false; PL.connectFrom = null;
  PL.editing = null; PL.pan = { x: 40, y: 40 };
  plDraw();
}

async function plClose() {
  var d = await api('GET', '/api/pipelines');
  PL.pipelines = d.items || [];
  PL.current = null; PL.selectedStep = null; PL.connectMode = false;
  PL.connectFrom = null; PL.editing = null;
  document.removeEventListener('keydown', plKeydown);
  plDraw();
}

async function plDelPipeline() {
  if (!confirm('Delete this pipeline and all its steps?')) return;
  await api('DELETE', '/api/pipelines/' + PL.current.pipeline.id);
  toast('Pipeline deleted');
  plClose();
}

async function plSaveTitle(el) {
  var n = el.textContent.trim();
  if (!n) { el.textContent = PL.current.pipeline.name; return; }
  if (n === PL.current.pipeline.name) return;
  var p = await api('PUT', '/api/pipelines/' + PL.current.pipeline.id,
    { name: n, description: PL.current.pipeline.description });
  PL.current.pipeline = p;
  var i = PL.pipelines.findIndex(function (x) { return x.id === p.id; });
  if (i !== -1) PL.pipelines[i] = p;
  toast('Saved');
}

function plSelStep(id) {
  PL.selectedStep = PL.selectedStep === id ? null : id;
  plDraw();
}

function plAddStep() {
  PL.editing = 'new'; PL.editForm = { name: '', notes: '', protocol_id: '' };
  plDraw(); setTimeout(function () { var e = document.getElementById('pl-sn'); if (e) e.focus(); }, 0);
}

function plEditStep(id) {
  var s = plStep(id); if (!s) return;
  PL.editing = id; PL.editForm = { name: s.name, notes: s.notes, protocol_id: s.protocol_id || '' };
  plDraw(); setTimeout(function () { var e = document.getElementById('pl-sn'); if (e) e.focus(); }, 0);
}

function plCancelEdit() { PL.editing = null; plDraw(); }

async function plSaveStep() {
  var n  = (document.getElementById('pl-sn').value  || '').trim();
  var no = (document.getElementById('pl-sno').value || '').trim();
  var pv = document.getElementById('pl-sp').value;
  var protoId = pv ? parseInt(pv) : null;
  if (!n) { toast('Name required', true); return; }
  var pid = PL.current.pipeline.id;

  if (PL.editing === 'new') {
    var pos = autoPos();
    var s = await api('POST', '/api/pipelines/' + pid + '/steps',
      { name: n, notes: no, protocol_id: protoId, pos_x: pos.x, pos_y: pos.y });
    PL.current.steps.push(s);
    PL.editing = null; PL.selectedStep = s.id;
    toast('Step added');
  } else {
    var ex = plStep(PL.editing);
    var s2 = await api('PUT', '/api/pipelines/' + pid + '/steps/' + PL.editing,
      { name: n, notes: no, protocol_id: protoId, pos_x: ex.pos_x, pos_y: ex.pos_y });
    var i = PL.current.steps.findIndex(function (x) { return x.id === s2.id; });
    if (i !== -1) PL.current.steps[i] = s2;
    PL.editing = null; toast('Step updated');
  }
  plDraw();
}

async function plDelStep(id) {
  if (!confirm('Delete this step? Its connections will also be removed.')) return;
  var pid = PL.current.pipeline.id;
  await api('DELETE', '/api/pipelines/' + pid + '/steps/' + id);
  PL.current.steps = PL.current.steps.filter(function (s) { return s.id !== id; });
  PL.current.edges = PL.current.edges.filter(function (e) { return e.from_step !== id && e.to_step !== id; });
  if (PL.selectedStep === id) PL.selectedStep = null;
  toast('Step deleted'); plDraw();
}

function plTogConn() {
  PL.connectMode = !PL.connectMode; PL.connectFrom = null;
  plDraw();
}

var _scratchProtoRun = null;
var _RUNS_KEY = 'lab_proto_runs'; // localStorage cache key
var _dbSaveTimer = null;          // debounce timer for DB writes

// ── run persistence: localStorage (fast) + DB (cross-machine) ────────────────

function _getAllRunsLocal() {
  try { return JSON.parse(localStorage.getItem(_RUNS_KEY) || '[]'); } catch(e) { return []; }
}

function _saveLocalOnly(run) {
  if (!run || !run.runId) return;
  var runs = _getAllRunsLocal();
  var idx = -1; runs.forEach(function(r, i) { if (r.runId === run.runId) idx = i; });
  if (idx >= 0) runs[idx] = run; else runs.push(run);
  try { localStorage.setItem(_RUNS_KEY, JSON.stringify(runs)); } catch(e) {}
}

function _removeLocal(runId) {
  try { localStorage.setItem(_RUNS_KEY, JSON.stringify(_getAllRunsLocal().filter(function(r) { return r.runId !== runId; }))); } catch(e) {}
}

function _getRunByIdLocal(runId) {
  return _getAllRunsLocal().find(function(r) { return r.runId === runId; }) || null;
}

// save to localStorage immediately + debounced DB write 800ms later
function _saveRun(run) {
  if (!run || !run.runId) return;
  _saveLocalOnly(run);
  if (_dbSaveTimer) clearTimeout(_dbSaveTimer);
  _dbSaveTimer = setTimeout(function() { _saveRunToDb(run); }, 800);
}

async function _saveRunToDb(run) {
  try {
    await api('PUT', '/api/active-runs/' + encodeURIComponent(run.runId), {
      steps_json:   JSON.stringify(run.steps),
      recipe_json:  JSON.stringify(run.recipe),
      scaling:      run.scaling || false,
      scale_factor: run.scaleFactor || 1.0
    });
  } catch(e) {
    // record may not exist yet - create it
    try {
      await api('POST', '/api/active-runs', {
        run_id:        run.runId,
        protocol_id:   run.protocol.id,
        protocol_json: JSON.stringify(run.protocol),
        steps_json:    JSON.stringify(run.steps),
        recipe_json:   JSON.stringify(run.recipe),
        group_name:    run.group_name || '',
        subgroup:      run.subgroup || '',
        scaling:       run.scaling || false,
        scale_factor:  run.scaleFactor || 1.0,
        started_at:    run.startedAt
      });
    } catch(e2) {}
  }
}

async function _removeRun(runId) {
  _removeLocal(runId);
  try { await api('DELETE', '/api/active-runs/' + encodeURIComponent(runId)); } catch(e) {}
}

// fetch from DB (source of truth), fall back to localStorage
async function _getAllRuns() {
  try {
    var data = await api('GET', '/api/active-runs');
    var dbRuns = (data.runs || []).map(function(r) {
      return {
        runId:       r.run_id,
        protocol:    JSON.parse(r.protocol_json),
        steps:       JSON.parse(r.steps_json || '[]'),
        recipe:      JSON.parse(r.recipe_json || 'null') || _parseRecipeRun(null),
        scaling:     !!r.scaling,
        scaleFactor: r.scale_factor || 1.0,
        group_name:  r.group_name || 'Protocols',
        subgroup:    r.subgroup || '',
        startedAt:   r.started_at
      };
    });
    try { localStorage.setItem(_RUNS_KEY, JSON.stringify(dbRuns)); } catch(e) {}
    return dbRuns;
  } catch(e) {
    return _getAllRunsLocal();
  }
}

// ── recipe helpers ────────────────────────────────────────────────────────────
var _DEFAULT_RECIPE = { columns: ['Component', 'Stock conc.', 'Volume (uL)', 'Final conc.'], rows: [] };

function _parseRecipeRun(raw) {
  if (!raw) return JSON.parse(JSON.stringify(_DEFAULT_RECIPE));
  try {
    var r = JSON.parse(raw);
    if (Array.isArray(r) && r.length && r[0].columns) return r[0];
    if (r && Array.isArray(r.columns) && Array.isArray(r.rows)) return r;
  } catch(e) {}
  return JSON.parse(JSON.stringify(_DEFAULT_RECIPE));
}

function _parseAllRecipesRun(raw) {
  if (!raw) return null;
  try {
    var r = JSON.parse(raw);
    if (Array.isArray(r) && r.length && r[0].columns) return r;
  } catch(e) {}
  return null;
}

function _volColIndex(columns) {
  for (var i = 0; i < columns.length; i++) { if (/vol|µl|ul/i.test(columns[i])) return i; }
  return -1;
}

function _renderSingleTable(recipe, scaling, factor) {
  var volCol = _volColIndex(recipe.columns);
  if (!recipe.rows.length) return '<div style="color:#8a7f72;font-size:13px;font-style:italic">No components defined.</div>';
  var html = '<div class="sp-recipe-wrap"><table class="sp-recipe-table"><thead><tr>';
  recipe.columns.forEach(function(c) { html += '<th>' + esc(c) + '</th>'; });
  html += '</tr></thead><tbody>';
  recipe.rows.forEach(function(row, ri) {
    html += '<tr>';
    recipe.columns.forEach(function(_, ci) {
      var rawVal = row[ci] || '', isVol = (ci === volCol), displayVal = rawVal;
      if (isVol && scaling && factor && rawVal) { var num = parseFloat(rawVal); if (!isNaN(num)) displayVal = (num * factor).toFixed(2).replace(/\.00$/, ''); }
      var cc = isVol ? ' class="vol-cell"' : '';
      if (isVol && scaling) {
        html += '<td' + cc + '><input type="text" value="' + esc(displayVal) + '" readonly/></td>';
      } else {
        html += '<td' + cc + '><input type="text" value="' + esc(displayVal) + '" oninput="spRecipeCell(' + ri + ',' + ci + ',this.value)"/></td>';
      }
    });
    html += '</tr>';
  });
  return html + '</tbody></table></div>';
}

function _renderRunRecipe() {
  var rs = _scratchProtoRun; if (!rs) return '';
  var scaling = rs.scaling, factor = rs.scaleFactor || 1;
  var tables = _parseAllRecipesRun(rs.protocol.recipe);
  var html = '<div class="sp-recipe-section"><div class="sp-recipe-head"><span class="sp-recipe-label">Reaction Recipe</span>';
  html += '<div class="sp-scale-row"><input type="checkbox" id="sp-scale-toggle"' + (scaling ? ' checked' : '') +
    ' onchange="spToggleScale(this.checked)"/> <label for="sp-scale-toggle" style="cursor:pointer">Scale</label>';
  if (scaling) html += '&nbsp;&times;&nbsp;<input type="number" id="sp-scale-factor" value="' + factor + '" min="0.01" step="0.1" style="width:65px" oninput="spUpdateScale(this.value)"/>';
  html += '</div></div>';
  if (tables && tables.length > 1) {
    tables.forEach(function(t, ti) {
      html += '<div style="margin-bottom:12px">';
      if (t.name) html += '<div style="font-size:11px;font-weight:600;color:#8a7f72;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">' + esc(t.name) + '</div>';
      html += _renderSingleTable(ti === 0 ? rs.recipe : t, scaling, factor);
      html += '</div>';
    });
    html += '<div class="sp-recipe-add"><button class="btn" onclick="spAddRecipeRow()">+ Row (table 1)</button><button class="btn" onclick="spAddRecipeCol()">+ Column</button></div>';
  } else {
    html += _renderSingleTable(rs.recipe, scaling, factor);
    html += '<div class="sp-recipe-add"><button class="btn" onclick="spAddRecipeRow()">+ Row</button><button class="btn" onclick="spAddRecipeCol()">+ Column</button></div>';
  }
  return html + '</div>';
}

function spToggleScale(c) { if (!_scratchProtoRun) return; _scratchProtoRun.scaling = c; if (c && !_scratchProtoRun.scaleFactor) _scratchProtoRun.scaleFactor = 1; _saveRun(_scratchProtoRun); document.getElementById('sp-recipe-wrap').innerHTML = _renderRunRecipe(); }
function spUpdateScale(v) { if (!_scratchProtoRun) return; var n = parseFloat(v); _scratchProtoRun.scaleFactor = isNaN(n) ? 1 : n; _saveRun(_scratchProtoRun); document.getElementById('sp-recipe-wrap').innerHTML = _renderRunRecipe(); }
function spRecipeCell(ri, ci, value) { if (_scratchProtoRun && _scratchProtoRun.recipe.rows[ri]) { _scratchProtoRun.recipe.rows[ri][ci] = value; _saveRun(_scratchProtoRun); } }
function spAddRecipeRow() { if (!_scratchProtoRun) return; var r = _scratchProtoRun.recipe; r.rows.push(r.columns.map(function() { return ''; })); _saveRun(_scratchProtoRun); document.getElementById('sp-recipe-wrap').innerHTML = _renderRunRecipe(); }
function spAddRecipeCol() { var name = prompt('Column name:'); if (!name || !_scratchProtoRun) return; var r = _scratchProtoRun.recipe; r.columns.push(name); r.rows.forEach(function(row) { row.push(''); }); _saveRun(_scratchProtoRun); document.getElementById('sp-recipe-wrap').innerHTML = _renderRunRecipe(); }

function spLaunchRun() {

// ── shared launch ─────────────────────────────────────────────────────────────
function spLaunchRunDirect(p, group, subgroup) {
  var steps = [];
  try { var parsed = JSON.parse(p.steps || '[]'); if (Array.isArray(parsed) && parsed.length && typeof parsed[0].text !== 'undefined') steps = parsed; } catch(e) {}
  if (!steps.length) { toast('No structured steps yet', true); return; }

  _scratchProtoRun = {
    runId:       p.id + '_' + Date.now(),
    protocol:    p,
    steps:       steps.map(function(s, i) { return { id: i, text: s.text, done: false, deviation: '' }; }),
    recipe:      JSON.parse(JSON.stringify(_parseRecipeRun(p.recipe))),
    scaling:     false,
    scaleFactor: 1,
    group_name:  group || 'Protocols',
    subgroup:    subgroup || '',
    startedAt:   new Date().toISOString()
  };

  // create in DB immediately (non-blocking)
  api('POST', '/api/active-runs', {
    run_id:        _scratchProtoRun.runId,
    protocol_id:   p.id,
    protocol_json: JSON.stringify(p),
    steps_json:    JSON.stringify(_scratchProtoRun.steps),
    recipe_json:   JSON.stringify(_scratchProtoRun.recipe),
    group_name:    _scratchProtoRun.group_name,
    subgroup:      _scratchProtoRun.subgroup,
    scaling:       false,
    scale_factor:  1.0,
    started_at:    _scratchProtoRun.startedAt
  }).catch(function() {});

  _saveLocalOnly(_scratchProtoRun);

  if (S.view === 'scratch') {
    var el = document.getElementById('content');
    if (el) { _renderProtoRunInScratch(el); return; }
  }
  if (typeof setView === 'function') setView('scratch');
}

// resume by runId — fetches from DB so works across machines
async function spResumeRunById(runId) {
  try {
    var data = await api('GET', '/api/active-runs');
    var dbRun = (data.runs || []).find(function(r) { return r.run_id === runId; });
    if (dbRun) {
      _scratchProtoRun = {
        runId:       dbRun.run_id,
        protocol:    JSON.parse(dbRun.protocol_json),
        steps:       JSON.parse(dbRun.steps_json || '[]'),
        recipe:      JSON.parse(dbRun.recipe_json || 'null') || _parseRecipeRun(null),
        scaling:     !!dbRun.scaling,
        scaleFactor: dbRun.scale_factor || 1.0,
        group_name:  dbRun.group_name || 'Protocols',
        subgroup:    dbRun.subgroup || '',
        startedAt:   dbRun.started_at
      };
      _saveLocalOnly(_scratchProtoRun);
      if (typeof setView === 'function') setView('scratch');
      return;
    }
  } catch(e) {}
  // fallback to localStorage
  var local = _getRunByIdLocal(runId);
  if (local) { _scratchProtoRun = local; if (typeof setView === 'function') setView('scratch'); return; }
  toast('Run not found', true);
}

async function spDiscardRunById(runId) {
  if (!confirm('Discard this run? Progress will be lost.')) return;
  await _removeRun(runId);
  if (_scratchProtoRun && _scratchProtoRun.runId === runId) _scratchProtoRun = null;
  loadView();
}

// ── run view ──────────────────────────────────────────────────────────────────
function _renderProtoRunInScratch(el) {
  var rs = _scratchProtoRun; if (!rs) return;
  var done = rs.steps.filter(function(s) { return s.done; }).length;
  var pct  = Math.round((done / rs.steps.length) * 100);
  var stepsHtml = rs.steps.map(function(step) {
    var hasDev = step.deviation.trim().length > 0;
    return '<div class="sp-step' + (step.done ? ' done' : '') + (hasDev ? ' has-dev' : '') + '" id="sps-' + step.id + '">' +
      '<label class="sp-step-check"><input type="checkbox"' + (step.done ? ' checked' : '') + ' onchange="spToggleStep(' + step.id + ',this.checked)"/>' +
      '<span class="sp-step-text">' + esc(step.text) + '</span></label>' +
      '<button class="sp-dev-btn" onclick="spToggleDev(' + step.id + ')">' + (hasDev ? '&#9998; deviation noted' : '+ deviation note') + '</button>' +
      '<div class="sp-dev-note' + (hasDev ? ' open' : '') + '" id="spd-' + step.id + '"><textarea placeholder="What did you change?" oninput="spUpdateDev(' + step.id + ',this.value)">' + esc(step.deviation) + '</textarea></div>' +
    '</div>';
  }).join('');
  var groupLabel = rs.group_name + (rs.subgroup ? ' / ' + rs.subgroup : '');
  el.innerHTML =
    '<div style="padding:0 0 24px">' +
      '<div class="sp-run-header">' +
        '<div>' +
          '<div class="sp-run-title">&#9654; ' + esc(rs.protocol.title) + '</div>' +
          '<div class="sp-run-meta" id="sp-run-meta">' + done + ' / ' + rs.steps.length + ' steps &nbsp;&#183;&nbsp; started ' + new Date(rs.startedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + '</div>' +
          '<span class="sp-run-group-badge">&#128193; ' + esc(groupLabel) + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
          '<button class="btn" onclick="spSaveAndExit()">&#9632; Save &amp; exit</button>' +
          '<button class="btn" style="color:#c0392b" onclick="spAbandonRun()">&#215; Abandon</button>' +
        '</div>' +
      '</div>' +
      '<div class="sp-progress"><div class="sp-progress-fill" id="sp-pfill" style="width:' + pct + '%"></div></div>' +
      '<div id="sp-recipe-wrap">' + _renderRunRecipe() + '</div>' +
      '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:#8a7f72;margin-bottom:10px">Steps</div>' +
      '<div id="sp-steps-list">' + stepsHtml + '</div>' +
      '<div id="sp-summary-wrap"></div>' +
      '<div class="sp-run-footer">' +
        '<button class="btn" onclick="spShowSummary()">View summary</button>' +
        '<button class="btn" onclick="spSaveAndExit()">&#9632; Save &amp; exit</button>' +
        '<button class="btn primary" onclick="spSaveToEntry()">&#10003; Save to Entry &amp; finish</button>' +
      '</div>' +
    '</div>';
}

function spSaveAndExit() {
  if (_scratchProtoRun) _saveRun(_scratchProtoRun);
  _scratchProtoRun = null;
  if (typeof setView === 'function') setView('protocols'); else loadView();
  toast('Run saved \u2014 resume from any machine via the Protocols page');
}

function spAbandonRun() {
  if (!confirm('Abandon this run? Progress will be lost.')) return;
  if (_scratchProtoRun) _removeRun(_scratchProtoRun.runId);
  _scratchProtoRun = null;
  if (typeof setView === 'function') setView('protocols'); else loadView();
}

function spToggleStep(id, checked) {
  if (!_scratchProtoRun) return;
  var step = _scratchProtoRun.steps.find(function(s) { return s.id === id; }); if (!step) return;
  step.done = checked; _saveRun(_scratchProtoRun);
  document.getElementById('sps-' + id)?.classList.toggle('done', checked);
  var done = _scratchProtoRun.steps.filter(function(s) { return s.done; }).length;
  var fill = document.getElementById('sp-pfill'); if (fill) fill.style.width = Math.round((done / _scratchProtoRun.steps.length) * 100) + '%';
  var meta = document.getElementById('sp-run-meta'); if (meta) meta.textContent = done + ' / ' + _scratchProtoRun.steps.length + ' steps \xb7 started ' + new Date(_scratchProtoRun.startedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function spToggleDev(id) {
  var n = document.getElementById('spd-' + id); if (!n) return;
  if (n.classList.toggle('open')) n.querySelector('textarea')?.focus();
}

function spUpdateDev(id, value) {
  if (!_scratchProtoRun) return;
  var step = _scratchProtoRun.steps.find(function(s) { return s.id === id; }); if (step) step.deviation = value;
  _saveRun(_scratchProtoRun);
  var el = document.getElementById('sps-' + id); if (!el) return;
  el.classList.toggle('has-dev', value.trim().length > 0);
  var btn = el.querySelector('.sp-dev-btn'); if (btn) btn.textContent = value.trim() ? '\u270e deviation noted' : '+ deviation note';
}

function spShowSummary() {
  var wrap = document.getElementById('sp-summary-wrap'); if (!wrap || !_scratchProtoRun) return;
  var rs = _scratchProtoRun;
  var devs = rs.steps.filter(function(s) { return s.deviation.trim(); });
  var inc  = rs.steps.filter(function(s) { return !s.done; });
  var html = '<div class="sp-summary"><div class="sp-summary-head">Run summary</div>';
  if (devs.length) {
    html += '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8a7f72;margin-bottom:6px">Deviations</div><ul class="sp-summary-list">';
    devs.forEach(function(s) { html += '<li><div class="sp-dev-orig"><s>' + esc(s.text) + '</s></div><div class="sp-dev-new">&#8594; ' + esc(s.deviation) + '</div></li>'; });
    html += '</ul>';
  } else { html += '<div class="sp-summary-clean">No deviations.</div>'; }
  if (inc.length) {
    html += '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8a7f72;margin:12px 0 6px">Incomplete</div><ul class="sp-summary-list">';
    inc.forEach(function(s) { html += '<li style="color:#8a7f72">' + esc(s.text) + '</li>'; });
    html += '</ul>';
  }
  html += '</div>';
  wrap.innerHTML = html;
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── save to entry + record completed run ──────────────────────────────────────
async function spSaveRunToEntry(runId) {
  var rs = null;
  if (runId) {
    // fetch from DB first
    try {
      var data = await api('GET', '/api/active-runs');
      var dbRun = (data.runs || []).find(function(r) { return r.run_id === runId; });
      if (dbRun) rs = { runId: dbRun.run_id, protocol: JSON.parse(dbRun.protocol_json), steps: JSON.parse(dbRun.steps_json || '[]'), recipe: JSON.parse(dbRun.recipe_json || 'null') || _parseRecipeRun(null), scaling: !!dbRun.scaling, scaleFactor: dbRun.scale_factor || 1.0, group_name: dbRun.group_name || 'Protocols', subgroup: dbRun.subgroup || '', startedAt: dbRun.started_at };
    } catch(e) {}
    if (!rs) rs = _getRunByIdLocal(runId);
  } else {
    rs = _scratchProtoRun;
  }
  if (!rs) { toast('Run not found', true); return; }

  var done  = rs.steps.filter(function(s) { return s.done; }).length;
  var devs  = rs.steps.filter(function(s) { return s.deviation.trim(); });
  var inc   = rs.steps.filter(function(s) { return !s.done; });
  var today = new Date().toISOString().split('T')[0];
  var volCol = _volColIndex(rs.recipe.columns);

  var lines = ['## Protocol Run: ' + rs.protocol.title, '', '**Date:** ' + new Date(rs.startedAt).toLocaleString(), '**Progress:** ' + done + ' / ' + rs.steps.length + ' steps completed', ''];

  if (rs.recipe.rows.length) {
    lines.push('### Reaction Recipe');
    if (rs.scaling && rs.scaleFactor !== 1) lines.push('_Scale factor: x' + rs.scaleFactor + '_');
    lines.push('| ' + rs.recipe.columns.join(' | ') + ' |');
    lines.push('| ' + rs.recipe.columns.map(function() { return '---'; }).join(' | ') + ' |');
    rs.recipe.rows.forEach(function(row) {
      var cells = rs.recipe.columns.map(function(_, ci) {
        var val = row[ci] || '';
        if (ci === volCol && rs.scaling && rs.scaleFactor && val) { var n = parseFloat(val); if (!isNaN(n)) val = (n * rs.scaleFactor).toFixed(2).replace(/\.00$/, '') + ' (scaled)'; }
        return val;
      });
      lines.push('| ' + cells.join(' | ') + ' |');
    });
    lines.push('');
  }

  lines.push('### Steps');
  rs.steps.forEach(function(step, i) {
    lines.push((i + 1) + '. [' + (step.done ? 'x' : ' ') + '] ' + step.text);
    if (step.deviation) lines.push('   _\u21b3 ' + step.deviation + '_');
  });
  if (devs.length) { lines.push('', '### Deviation Log'); devs.forEach(function(s) { lines.push('- ~~' + s.text + '~~'); lines.push('  \u2192 ' + s.deviation); }); }
  if (inc.length) { lines.push('', '### Not completed'); inc.forEach(function(s) { lines.push('- ' + s.text); }); }

  try {
    var entry = await api('POST', '/api/entries', {
      title: 'Protocol Run: ' + rs.protocol.title,
      date: today, group_name: rs.group_name, subgroup: rs.subgroup || '',
      notes: lines.join('\n'), summary: ''
    });
    await api('POST', '/api/protocol-runs', {
      protocol_id: rs.protocol.id, date: today, group_name: rs.group_name,
      steps_json: JSON.stringify(rs.steps), recipe_json: JSON.stringify(rs.recipe),
      entry_id: entry.id || null
    });
    toast('Saved to ' + rs.group_name + ' \u2713');
    await _removeRun(rs.runId);
    if (_scratchProtoRun && _scratchProtoRun.runId === rs.runId) _scratchProtoRun = null;
    if (typeof setView === 'function') setView('protocols'); else loadView();
  } catch(e) { toast('Save failed: ' + e.message, true); }
}

function spSaveToEntry() { spSaveRunToEntry(null); }

async function renderReminders(el){
  const data=await api('GET','/api/reminders?include_done=false');

  const today=new Date().toISOString().slice(0,10);

  let html='<div id="add-reminder-form" style="display:none;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:16px;margin-bottom:16px">'+
    '<div class="field-grid">'+
      '<div class="field full"><label>Reminder text</label><input type="text" id="rem-text" placeholder="What to remember..." spellcheck="false"/></div>'+

// ── TIMELINE ──────────────────────────────────────────────────────────────────
let _tlExpanded={};  // {groupName: dateStr}

async function renderTimeline(el){
  var data=await api('GET','/api/timeline');
  var projects=data.projects||[];

  if(!projects.length){
    el.innerHTML='<div class="empty"><big>&#9683;</big>No projects with entries yet — import or create some notebook entries first.</div>';
    return;
  }

  var html='';
  projects.forEach(function(proj){
    var g=proj.group_name;
    var days=proj.days||[];
    var expandedDate=_tlExpanded[g]||null;

    html+='<div class="tl-project" id="tl-proj-'+esc(g)+'">';
    html+='<div class="tl-project-hdr">'+
      '<span class="tl-project-name">'+esc(g)+'</span>'+
      '<span class="tl-project-meta">'+proj.entry_count+' entries &middot; '+days.length+' days</span>'+
    '</div>';

    // SVG chain
    if(days.length>0){
      var svgNS='http://www.w3.org/2000/svg';
      var nodeW=90,nodeH=50,gap=16,pad=12;
      var svgW=pad*2+days.length*nodeW+(days.length-1)*gap;
      var svgH=pad*2+nodeH;

      html+='<div class="tl-chain-wrap"><svg width="'+svgW+'" height="'+svgH+'" viewBox="0 0 '+svgW+' '+svgH+'" style="min-width:'+svgW+'px">';

      // Edges
      for(var i=1;i<days.length;i++){
        var x1=pad+(i-1)*(nodeW+gap)+nodeW;
        var x2=pad+i*(nodeW+gap);
        var y=pad+nodeH/2;
        html+='<line class="tl-edge" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/>';
      }

      // Nodes
      days.forEach(function(day,di){
        var x=pad+di*(nodeW+gap);
        var y=pad;
        var isExp=expandedDate===day.date;
        // Color intensity by entry count
        var opacity=Math.min(0.15+day.count*0.1,0.6);
        html+='<g class="tl-day-node'+(isExp?' expanded':'')+'" data-group="'+esc(g)+'" data-date="'+esc(day.date)+'" data-idx="'+di+'">';
        html+='<rect class="tl-day-rect" x="'+x+'" y="'+y+'" width="'+nodeW+'" height="'+nodeH+'" style="fill:rgba(61,107,79,'+opacity+')"/>';
        // Date label
        var dateShort=day.date.slice(5);  // MM-DD
        html+='<text x="'+(x+nodeW/2)+'" y="'+(y+20)+'" text-anchor="middle" fill="var(--text)" font-family="JetBrains Mono,monospace" font-size="11" pointer-events="none">'+dateShort+'</text>';
        // Count
        html+='<text x="'+(x+nodeW/2)+'" y="'+(y+36)+'" text-anchor="middle" fill="var(--muted)" font-family="JetBrains Mono,monospace" font-size="10" pointer-events="none">'+day.count+' entr'+(day.count===1?'y':'ies')+'</text>';
        html+='</g>';
      });

      html+='</svg></div>';
    }

    // Expanded day detail
    if(expandedDate){
      html+='<div class="tl-expanded" id="tl-detail-'+esc(g)+'">';
      html+='<div class="tl-expanded-date">'+formatDate(expandedDate)+'</div>';
      html+='<div id="tl-entries-'+esc(g)+'"><div class="spin" style="margin:10px auto;display:block;width:16px;height:16px"></div></div>';
      html+='</div>';
    }
    html+='</div>';
  });

  // Generate predictions button
  html+='<div style="margin-top:20px;text-align:center">'+
    '<button class="btn primary" onclick="generatePredictions()" style="padding:10px 24px">'+
      '&#9733; Predict next tasks from timelines'+
    '</button>'+
    '<div style="font-size:12px;color:var(--dim);margin-top:6px">Wakes the 3090, reads all project timelines, suggests upcoming tasks</div>'+
  '</div>';

  el.innerHTML=html;

  // Bind node clicks
  setTimeout(function(){
    el.querySelectorAll('.tl-day-node').forEach(function(node){
      node.addEventListener('click',function(){
        var grp=this.dataset.group;
        var date=this.dataset.date;
        if(_tlExpanded[grp]===date) delete _tlExpanded[grp];
        else _tlExpanded[grp]=date;
        renderTimeline(el);
      });
    });
    // Load expanded entry details
    projects.forEach(function(proj){
      var g=proj.group_name;
      if(_tlExpanded[g]) loadTimelineDetail(g,_tlExpanded[g]);
    });
  },50);
}

async function loadTimelineDetail(group,date){
  var container=document.getElementById('tl-entries-'+group);
  if(!container)return;
  try{
    var data=await api('GET','/api/timeline/'+encodeURIComponent(group));
    var dayData=(data.days||[]).find(function(d){return d.date===date;});
    if(!dayData||!dayData.entries.length){
      container.innerHTML='<div style="color:var(--dim);font-size:13px">No entries for this day.</div>';
      return;
    }
    container.innerHTML=dayData.entries.map(function(e){
      return '<div class="tl-expanded-entry">'+
        '<div class="tl-expanded-title">'+esc(e.title)+'</div>'+
        (e.notes?'<div class="tl-expanded-notes">'+esc(e.notes.slice(0,500))+(e.notes.length>500?'...':'')+'</div>':'')+
        (e.results?'<div style="font-size:12px;color:var(--accent);margin-top:4px"><b>Results:</b> '+esc(e.results.slice(0,200))+'</div>':'')+
        (e.issues?'<div style="font-size:12px;color:var(--red);margin-top:4px"><b>Issues:</b> '+esc(e.issues.slice(0,200))+'</div>':'')+
      '</div>';
    }).join('');
  }catch(e){
    container.innerHTML='<div style="color:var(--red)">Failed to load: '+esc(e.message)+'</div>';
  }
}

async function generatePredictions(){
  toast('Waking 3090 — generating predictions...');
  try{
    var resp=await api('POST','/api/predictions/generate');
    if(resp.error){toast(resp.error,true);return;}
    toast('Generated '+resp.count+' predictions');
    await load();
    setView('predictions');
  }catch(e){
    toast('Failed: '+e.message,true);
  }
}

// ── PREDICTIONS ──────────────────────────────────────────────────────────────
let _predEditing={};  // {id: true}

async function renderPredictions(el){
  var data=await api('GET','/api/predictions');
  var preds=data.predictions||[];

  var html='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
    '<span style="font-size:13px;color:var(--muted)">'+(preds.length?preds.length+' pending prediction'+(preds.length>1?'s':''):'No pending predictions')+'</span>'+
    '<button class="btn" onclick="generatePredictions()" style="margin-left:auto">&#9733; Generate new predictions</button>'+
  '</div>';

  if(!preds.length){
    html+='<div class="empty"><big>&#9733;</big>No predicted tasks. Click the button above or use the Timeline view to generate predictions from your project history.</div>';
    el.innerHTML=html;
    return;
  }

  // Group by project
  var byGroup={};
  preds.forEach(function(p){
    byGroup[p.group_name]=byGroup[p.group_name]||[];
    byGroup[p.group_name].push(p);
  });

  Object.entries(byGroup).forEach(function(pair){
    var g=pair[0],items=pair[1];
    html+='<div class="section-label">'+esc(g)+'</div>';
    items.forEach(function(p){
      var isEditing=_predEditing[p.id];
      html+='<div class="pred-card" id="pred-'+p.id+'">'+
        '<div class="pred-group">'+esc(p.group_name)+'</div>';
      if(isEditing){
        html+='<input class="pred-edit-input" id="pred-edit-'+p.id+'" value="'+esc(p.text)+'"/>'+
          '<div class="pred-actions">'+
            '<button class="btn primary" onclick="predSaveEdit('+p.id+')">Save</button>'+
            '<button class="btn" onclick="predCancelEdit('+p.id+')">Cancel</button>'+
          '</div>';
      } else {
        html+='<div class="pred-text">'+esc(p.text)+'</div>'+
          (p.reasoning?'<div class="pred-reasoning">'+esc(p.reasoning)+'</div>':'')+
          '<div class="pred-actions">'+
            '<button class="btn primary" onclick="predApprove('+p.id+')">&#10003; Approve &amp; add to tasks</button>'+
            '<button class="btn" onclick="predEdit('+p.id+')">Edit</button>'+
            '<button class="btn" style="color:var(--red)" onclick="predReject('+p.id+')">&#215; Reject</button>'+
          '</div>';
      }
      html+='</div>';
    });
  });

  el.innerHTML=html;

  // Focus edit inputs
  setTimeout(function(){
    Object.keys(_predEditing).forEach(function(id){
      var inp=document.getElementById('pred-edit-'+id);
      if(inp){
        inp.focus();
        inp.addEventListener('keydown',function(e){
          if(e.key==='Enter') predSaveEdit(parseInt(id));
          if(e.key==='Escape') predCancelEdit(parseInt(id));
        });
      }
    });
  },50);
}

async function predApprove(id){
  try{
    var resp=await api('PUT','/api/predictions/'+id,{action:'approve'});
    if(resp.error){toast(resp.error,true);return;}
    toast('Approved — added to todo app');
    await load();
    await renderPredictions(document.getElementById('content'));
  }catch(e){toast('Failed: '+e.message,true);}
}

async function predReject(id){
  try{
    await api('PUT','/api/predictions/'+id,{action:'reject'});
    toast('Rejected');
    await load();
    await renderPredictions(document.getElementById('content'));
  }catch(e){toast('Failed: '+e.message,true);}
}

function predEdit(id){
  _predEditing[id]=true;
  renderPredictions(document.getElementById('content'));
}

function predCancelEdit(id){
  delete _predEditing[id];
  renderPredictions(document.getElementById('content'));
}

async function predSaveEdit(id){
  var inp=document.getElementById('pred-edit-'+id);
  var text=inp?inp.value.trim():'';
  if(!text){toast('Enter some text',true);return;}
  try{
    await api('PUT','/api/predictions/'+id,{action:'edit',text:text});
    delete _predEditing[id];
    await renderPredictions(document.getElementById('content'));
    toast('Saved');
  }catch(e){toast('Failed: '+e.message,true);}
}
registerView('predictions', renderPredictions);
