<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f2;--surface:#ffffff;--surface2:#f0ede8;
  --border:#e2ddd6;--border2:#cec8be;
  --text:#2c2a27;--muted:#7a7368;--dim:#b0a89e;
  --accent:#3d6b4f;--accent2:#2d5039;
  --amber:#a0622a;--red:#b84040;--blue:#2a5080;
  --tag-bg:#e8f0ec;--tag-color:#3d6b4f;
  --mono:'JetBrains Mono',monospace;
  --serif:'Crimson Pro',Georgia,serif;
  --sans:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

/* Layout */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;transition:width .2s,min-width .2s}
.sidebar.collapsed{width:0;min-width:0;border-right:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* Sidebar */
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.sidebar-logo p{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:10px 0}
.nav-section{padding:6px 18px 4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:var(--mono)}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;font-size:13px;color:var(--muted);transition:background .1s,color .1s;border-left:2px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--tag-bg)}
.nav-item .count{margin-left:auto;font-size:10px;font-family:var(--mono);background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--dim)}
.nav-divider{height:1px;background:var(--border);margin:8px 18px}
.group-nav{display:flex;align-items:center;gap:6px;padding:5px 18px 5px 28px;cursor:pointer;font-size:12px;color:var(--muted);transition:background .1s,color .1s;border-left:2px solid transparent}
.group-nav:hover{background:var(--surface2);color:var(--text)}
.group-nav.active{color:var(--accent);border-left-color:var(--accent)}
.group-nav .count{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--dim)}

/* Header */
header{display:flex;align-items:center;gap:10px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50}
.toggle-sb{background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:12px;padding:4px 9px;cursor:pointer;border-radius:4px;transition:all .15s}
.toggle-sb:hover{border-color:var(--accent);color:var(--accent)}
.page-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--text)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{padding:6px 14px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;border-radius:4px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2)}

/* Content */
.content{flex:1;padding:24px;overflow-y:auto;max-width:1100px}

/* Stats row */
.stats-row{display:flex;gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 18px;flex:1}
.stat-num{font-size:26px;font-weight:600;font-family:var(--serif);color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}

/* Section labels */
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Entry cards */
.entries{display:flex;flex-direction:column;gap:10px}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:pointer}
.entry-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.entry-card.open{border-color:var(--accent)}
.entry-header{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
.entry-date{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;margin-top:2px;min-width:80px}
.entry-main{flex:1;min-width:0}
.entry-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.entry-group{font-size:11px;color:var(--accent);font-family:var(--mono)}
.entry-summary{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;font-style:italic}
.entry-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s;flex-shrink:0}
.entry-card:hover .entry-actions{opacity:1}
.entry-body{display:none;border-top:1px solid var(--border);padding:16px}
.entry-card.open .entry-body{display:block}

/* Notebook book/page layout */
.nb-books{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.nb-book{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.nb-book:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.nb-book::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);border-radius:8px 0 0 8px}
.nb-book-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px;padding-left:8px}
.nb-book-meta{font-family:var(--mono);font-size:11px;color:var(--muted);padding-left:8px}
.nb-book-dates{font-size:12px;color:var(--dim);margin-top:8px;padding-left:8px}
.nb-layout{display:flex;gap:0;min-height:calc(100vh - 140px)}
.nb-page-list{width:220px;min-width:220px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.nb-page-list-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.nb-page-list-hdr button{background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:12px;padding:4px 10px;cursor:pointer;border-radius:4px;transition:all .15s}
.nb-page-list-hdr button:hover{border-color:var(--accent);color:var(--accent)}
.nb-page-list-title{font-family:var(--serif);font-size:14px;font-weight:600;flex:1}
.nb-page-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;border-left:3px solid transparent}
.nb-page-item:hover{background:var(--surface2)}
.nb-page-item.active{background:var(--tag-bg);border-left-color:var(--accent)}
.nb-page-date{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:2px}
.nb-page-titles{font-size:12px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nb-page-count{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:2px}
.nb-editor{flex:1;overflow-y:auto;padding:24px 32px}
.nb-editor-date{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.nb-editor-weekday{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:20px}
.nb-entry{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px 20px;margin-bottom:16px}
.nb-entry-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.nb-entry-sub{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:12px}
.nb-entry textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;padding:12px 14px;border-radius:4px;outline:none;resize:vertical;line-height:1.7;transition:border-color .15s;min-height:120px}
.nb-entry textarea:focus{border-color:var(--accent)}
.nb-entry textarea.big{min-height:200px}
.nb-field-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:5px;margin-top:14px}
.nb-entry-actions{display:flex;gap:8px;margin-top:14px;align-items:center}
.nb-empty-page{text-align:center;padding:60px 20px;color:var(--muted);font-style:italic;font-size:15px}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px}
.dash-card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dash-card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.dash-reminder{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.dash-reminder:last-child{border-bottom:none}
.dash-reminder-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dash-reminder-dot.overdue{background:var(--red)}
.dash-reminder-dot.today{background:var(--accent)}
.dash-reminder-dot.future{background:var(--dim)}
.dash-entry-mini{padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:color .1s}
.dash-entry-mini:hover{color:var(--accent)}
.dash-entry-mini:last-child{border-bottom:none}
.dash-entry-mini-title{font-size:13px;font-weight:500}
.dash-entry-mini-meta{font-size:11px;color:var(--dim);font-family:var(--mono)}
.dash-wf-item{display:flex;gap:8px;padding:4px 0;font-size:13px}
.dash-wf-time{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:40px}
.nb-delete-btn{background:transparent;border:1px solid var(--border2);color:var(--dim);font-family:var(--mono);font-size:10px;padding:3px 8px;cursor:pointer;border-radius:4px;transition:all .15s;letter-spacing:1px;text-transform:uppercase;margin-left:auto}
.nb-delete-btn:hover{border-color:var(--red);color:var(--red)}
/* Dilution calc */
.dil-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px 24px;margin-bottom:16px}
.dil-card h3{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:14px;color:var(--text)}
.dil-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap}
.dil-field{display:flex;flex-direction:column;gap:4px}
.dil-field label{font-size:11px;letter-spacing:1px;color:var(--muted);font-family:var(--mono)}
.dil-field input,.dil-field select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:14px;padding:8px 10px;border-radius:4px;outline:none;width:120px;transition:border-color .15s}
.dil-field input:focus{border-color:var(--accent)}
.dil-result{font-family:var(--mono);font-size:16px;color:var(--accent);font-weight:600;padding:8px 0}
.dil-formula{font-family:var(--mono);font-size:12px;color:var(--muted);padding:4px 0}
.dil-seq-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px;margin-top:12px}
.dil-seq-table th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--muted);padding:6px 8px;border-bottom:2px solid var(--border)}
.dil-seq-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.dil-seq-table tr:hover{background:var(--surface2)}
.dil-seq-table input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:4px 6px;border-radius:3px;outline:none;width:80px}
.dil-seq-table input:focus{border-color:var(--accent)}

/* Entry form fields */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono)}
.field textarea,.field input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;border-radius:4px;outline:none;resize:vertical;transition:border-color .15s}
.field textarea{min-height:80px;line-height:1.6}
.field textarea:focus,.field input:focus{border-color:var(--accent)}
.save-row{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}

/* Protocol cards */
.protocol-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .15s}
.protocol-card:hover{border-color:var(--border2)}
.protocol-card.open{border-color:var(--accent)}
.protocol-header{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer}
.protocol-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text);flex:1}
.protocol-url{font-size:11px;color:var(--blue);font-family:var(--mono);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.protocol-body{display:none;border-top:1px solid var(--border);padding:16px}
.protocol-card.open .protocol-body{display:block}
.steps-text{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:var(--serif)}
.protocol-notes{background:var(--tag-bg);border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;margin-top:12px;font-style:italic}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag{font-size:11px;padding:2px 8px;background:var(--tag-bg);color:var(--tag-color);border:1px solid #c5dace;border-radius:10px;font-family:var(--mono)}
.tag-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0;margin-left:3px;line-height:1}
.tag-del:hover{color:var(--red)}

/* Add form */
.add-form{background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:18px;margin-bottom:16px;display:none}
.add-form.visible{display:block}
.add-form h3{font-family:var(--serif);font-size:16px;margin-bottom:14px;color:var(--text)}

/* URL paste input */
.url-bar{display:flex;gap:8px;margin-bottom:20px}
.url-bar input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 12px;border-radius:4px;outline:none;transition:border-color .15s}
.url-bar input:focus{border-color:var(--accent)}
.url-bar input::placeholder{color:var(--dim)}

/* Project summaries */
.summary-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:16px;margin-bottom:10px}
.summary-group{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.summary-text{font-size:14px;line-height:1.7;color:var(--text);font-family:var(--serif)}
.next-steps{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.next-step{display:flex;align-items:flex-start;gap:6px;font-size:13px;color:var(--muted)}
.next-step::before{content:'→';color:var(--accent);flex-shrink:0;font-family:var(--mono)}
.summary-updated{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:8px}

/* Empty */
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty big{display:block;font-family:var(--serif);font-size:48px;color:var(--border2);margin-bottom:8px}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--bg);padding:9px 16px;font-size:13px;border-radius:4px;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateY(0)}
#toast.err{background:var(--red)}

/* Loading spinner */
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.timeline{display:flex;flex-direction:column;gap:0;position:relative}
.timeline::before{content:'';position:absolute;left:68px;top:0;bottom:0;width:1px;background:var(--border)}
.timeline-entry{display:flex;gap:16px;padding:8px 0;position:relative}
.timeline-time{font-family:var(--mono);font-size:11px;color:var(--muted);width:50px;flex-shrink:0;padding-top:6px;text-align:right}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);border:2px solid var(--bg);flex-shrink:0;margin-top:8px;z-index:1}
.timeline-dot.task{background:var(--accent);box-shadow:0 0 0 3px rgba(61,107,79,.15)}
.timeline-dot.note{background:var(--amber)}
.timeline-body{flex:1;min-width:0}
.timeline-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;transition:border-color .15s}
.timeline-card:hover{border-color:var(--border2)}
.timeline-card.task-card{border-left:3px solid var(--accent)}
.timeline-card.note-card{border-left:3px solid var(--amber)}
.timeline-card-group{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.5px;margin-bottom:3px}
.timeline-card-text{font-size:14px;color:var(--text);line-height:1.4}
.timeline-card-text textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;resize:none;padding:2px 0;line-height:1.5;caret-color:var(--accent)}
.timeline-actions{display:flex;gap:5px;margin-top:6px;opacity:0;transition:opacity .15s}
.timeline-entry:hover .timeline-actions{opacity:1}
.add-inline{display:flex;gap:8px;padding:8px 0 8px 82px}
.add-inline input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px;border-radius:4px;outline:none;transition:border-color .15s}
.add-inline input:focus{border-color:var(--accent)}
.add-inline button{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;transition:background .15s;white-space:nowrap}
.add-inline button:hover{background:var(--accent2)}
.day-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.day-nav button{padding:5px 12px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:12px;border-radius:4px;cursor:pointer;transition:all .15s}
.day-nav button:hover{border-color:var(--accent);color:var(--accent)}
.day-nav .day-label{font-family:var(--serif);font-size:16px;font-weight:600;flex:1;text-align:center}
.day-summary{background:var(--tag-bg);border:1px solid #c5dace;border-radius:6px;padding:14px 16px;margin-bottom:16px;font-family:var(--serif);font-size:14px;line-height:1.7;color:var(--text);font-style:italic}
.scratch-area{display:flex;flex-direction:column;gap:14px}
.scratch-big{width:100%;min-height:120px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:14px;padding:14px;border-radius:6px;outline:none;resize:vertical;line-height:1.7;transition:border-color .15s}
.scratch-big:focus{border-color:var(--accent)}
.scratch-quick{display:flex;gap:8px}
.scratch-quick input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;border-radius:4px;outline:none;transition:border-color .15s}
.scratch-quick input:focus{border-color:var(--accent)}
.scratch-quick button{padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:background .15s;white-space:nowrap}
.scratch-quick button:hover{background:var(--accent2)}
.drop-zone{border:2px dashed var(--border2);border-radius:6px;padding:28px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;background:var(--surface)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--tag-bg);color:var(--accent)}
.drop-zone input[type=file]{display:none}
.scratch-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.scratch-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.scratch-item.has-image{border-left:3px solid var(--blue)}
.scratch-item-content{flex:1;font-size:13px;color:var(--text);line-height:1.5}
.scratch-item-time{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.scratch-thumb{width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0;cursor:pointer}
.reminder-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s}
.reminder-item.done-reminder{opacity:.45}
.reminder-check{width:18px;height:18px;min-width:18px;border:2px solid var(--border2);border-radius:50%;cursor:pointer;margin-top:1px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.reminder-check:hover{border-color:var(--accent)}
.reminder-item.done-reminder .reminder-check{background:var(--accent);border-color:var(--accent);color:#fff}
.reminder-text{flex:1;font-size:14px;color:var(--text);line-height:1.4}
.reminder-due{font-family:var(--mono);font-size:11px;margin-top:3px}
.reminder-due.overdue{color:var(--red)}
.reminder-due.today{color:var(--accent)}
.reminder-due.future{color:var(--muted)}
/* Timeline */
.tl-project{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:14px}
.tl-project-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .1s;user-select:none}
.tl-project-hdr:hover{background:var(--surface2)}
.tl-project-name{font-family:var(--serif);font-size:16px;font-weight:600;flex:1}
.tl-project-meta{font-size:11px;color:var(--dim);font-family:var(--mono)}
.tl-chain-wrap{overflow-x:auto;border-top:1px solid var(--border);padding:16px}
.tl-chain-wrap svg{display:block}
.tl-day-node{cursor:pointer}
.tl-day-rect{fill:var(--surface2);stroke:var(--border);stroke-width:1;rx:4;ry:4;transition:stroke .15s}
.tl-day-node:hover .tl-day-rect{stroke:var(--accent)}
.tl-day-node.expanded .tl-day-rect{stroke:var(--accent);stroke-width:1.5}
.tl-edge{stroke:var(--border2);stroke-width:1.5;fill:none}
.tl-expanded{border-top:1px solid var(--border);padding:14px 16px}
.tl-expanded-date{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:8px}
.tl-expanded-entry{padding:8px 0;border-bottom:1px solid var(--border)}
.tl-expanded-entry:last-child{border-bottom:none}
.tl-expanded-title{font-weight:500;font-size:14px;margin-bottom:3px}
.tl-expanded-notes{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
/* Predictions */
.pred-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.pred-card:hover{border-color:var(--border2)}
.pred-group{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.pred-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.4}
.pred-reasoning{font-size:13px;color:var(--muted);font-style:italic;line-height:1.5;margin-bottom:10px}
.pred-actions{display:flex;gap:8px;align-items:center}
.pred-edit-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;padding:6px 10px;border-radius:4px;outline:none;width:100%;margin-bottom:8px}
.pred-edit-input:focus{border-color:var(--accent)}
/* Import */
.import-dropzone{border:2px dashed var(--border2);border-radius:8px;padding:48px 24px;text-align:center;color:var(--muted);cursor:pointer;transition:all .15s;background:var(--surface);margin-bottom:20px}
.import-dropzone:hover,.import-dropzone.dragover{border-color:var(--accent);background:var(--tag-bg);color:var(--accent)}
.import-dropzone input[type=file]{display:none}
.import-dropzone big{display:block;font-size:36px;margin-bottom:8px}
.import-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.import-table th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);padding:8px 10px;border-bottom:2px solid var(--border);white-space:nowrap}
.import-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.import-table tr:hover{background:var(--surface2)}
.import-table tr.skip-row{opacity:.4}
.import-title-cell{max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.import-preview{font-size:12px;color:var(--muted);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.import-type-sel,.import-group-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:12px;padding:4px 6px;border-radius:4px;outline:none;width:100%}
.import-type-sel:focus,.import-group-inp:focus{border-color:var(--accent)}
.import-date-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:4px 6px;border-radius:4px;outline:none;width:110px}
.import-date-inp:focus{border-color:var(--accent)}
.import-actions{display:flex;gap:10px;align-items:center}
.import-count{font-size:13px;color:var(--muted);flex:1}
.import-count b{color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>Lab Notes</h1>
    <p>notebook + protocols</p>
  </div>
  <div class="sidebar-scroll">
    <div class="nav-section">Views</div>
    <div class="nav-item" id="nav-workflow" onclick="setView('workflow')">
      <span>&#128336;</span><span>Workflow</span>
    </div>
    <div class="nav-item active" id="nav-notebook" onclick="setView('notebook')">
      <span>&#128221;</span><span>Notebook</span><span class="count" id="cnt-entries">0</span>
    </div>
    <div class="nav-item" id="nav-protocols" onclick="setView('protocols')">

    </div>
    <div class="nav-item" id="nav-summaries" onclick="setView('summaries')">

    </div>
    <div class="nav-item" id="nav-pipeline" onclick="setView('pipeline')">

    </div>

    </div>
    <div class="nav-item" id="nav-scratch" onclick="setView('scratch')">
      <span>&#9881;</span><span>Scratch Pad</span><span class="count" id="cnt-scratch">0</span>
    </div>
    <div class="nav-item" id="nav-reminders" onclick="setView('reminders')">
      <span>&#128276;</span><span>Reminders</span><span class="count" id="cnt-reminders">0</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" id="nav-timeline" onclick="setView('timeline')">
      <span>&#9683;</span><span>Timeline</span>
    </div>
    <div class="nav-item" id="nav-predictions" onclick="setView('predictions')">
      <span>&#9733;</span><span>Predictions</span><span class="count" id="cnt-predictions">0</span>
    </div>
    <div class="nav-item" id="nav-cloning" onclick="setView('cloning')">
      <span>&#129516;</span><span>Cloning</span>
    </div>
    <div class="nav-item" id="nav-sanger" onclick="setView('sanger')">
      <span>&#7784;</span><span>Sanger</span>
    </div>
    <div class="nav-item" id="nav-dilution" onclick="setView('dilution')">
      <span>&#9874;</span><span>Dilution Calc</span>
    </div>
    <div class="nav-item" id="nav-tm_calc" onclick="setView('tm_calc')">  
      <span>&#127777;</span><span>Tm Calculator</span>
    </div>
    <div class="nav-item" id="nav-import" onclick="setView('import')">
      <span>&#128229;</span><span>Import</span>
    </div>
    <div class="nav-item" id="nav-backup" onclick="setView('backup')"> 
    <span>&#128190;</span><span>Backup</span>
    </div>
    <div class="nav-divider"></div>
    <!-- Dynamic nav items from features go here -->
    <div id="dynamic-nav"></div>
    <div class="nav-divider"></div>
    <div class="nav-section">Projects</div>
    <div id="group-nav"></div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header>
    <button class="toggle-sb" onclick="toggleSidebar()">&#9776;</button>
    <div class="page-title" id="page-title">Notebook</div>
    <div class="header-right">
      <button id="enrich-btn" title="Wake 3090 — fill entries, summarise, process scratch pad, update summaries" style="background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 12px;cursor:pointer;border-radius:4px;transition:all .15s;display:flex;align-items:center;gap:5px" onclick="triggerEnrichment()">
        <span id="enrich-icon" style="display:inline-block">&#9881;</span><span id="enrich-label">Enrich</span>
      </button>
      <button class="btn primary" id="add-btn" onclick="showAddForm()">+ New entry</button>
    </div>
  </header>
  <div class="content" id="content">
    <div class="empty"><big>&#128221;</big>Loading...</div>
  </div>
</div>
</div>
<div id="toast"></div>

<script>
// ── core.js ──
/*
 * core.js — App shell, API helper, view registry, shared helpers.
 *
 * Feature JS files call registerView('name', renderFn) to plug in.
 * registerNav('name', {label, icon, section, countId}) to add sidebar items.
 */

// ── View registry ────────────────────────────────────────────────────────────
const _views = {};        // name -> async function(el)
const _navItems = [];     // {name, label, icon, section, countId}

function registerView(name, renderFn) {
  _views[name] = renderFn;
}

function registerNav(name, opts) {
  _navItems.push({ name, ...opts });
}

// ── Global state ─────────────────────────────────────────────────────────────
let S = {
  view: 'notebook',
  filterGroup: '',
  entries: [],
  protocols: [],
  summaries: [],
  stats: {},
  sidebarOpen: true,
  nbBook: null,
  nbPage: null,
};

// ── API helper ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  buildSidebarNav();
  await load();
  setInterval(load, 600000);
}

function buildSidebarNav() {
  // Build dynamic nav items from registered features
  const container = document.getElementById('dynamic-nav');
  if (!container) return;

  let currentSection = '';
  for (const item of _navItems) {
    if (item.section && item.section !== currentSection) {
      currentSection = item.section;
      container.innerHTML += `<div class="nav-divider"></div><div class="nav-section">${esc(item.section)}</div>`;
    }
    const countHtml = item.countId ? `<span class="count" id="${item.countId}">0</span>` : '';
    container.innerHTML += `<div class="nav-item" id="nav-${item.name}" onclick="setView('${item.name}')">
      <span>${item.icon}</span><span>${esc(item.label)}</span>${countHtml}
    </div>`;
  }
}

async function load() {
  try {
    const st = await api('GET', '/api/stats');
    S.stats = st;
    const ce = document.getElementById('cnt-entries');
    if (ce) ce.textContent = st.entries || 0;
    const cp = document.getElementById('cnt-protocols');
    if (cp) cp.textContent = st.protocols || 0;

    // Build group nav
    const gnav = document.getElementById('group-nav');
    if (gnav) {
      gnav.innerHTML = (st.groups || []).map(function (g) {
        return '<div class="group-nav ' + (S.filterGroup === g ? 'active' : '') + '" data-group="' + esc(g) + '"><span>' + esc(g) + '</span></div>';
      }).join('');
      gnav.querySelectorAll('.group-nav').forEach(function (el) {
        el.addEventListener('click', function () { setGroup(this.dataset.group); });
      });
    }

    // Scratch and reminder counts
    try {
      const sc = await api('GET', '/api/scratch');
      const cntS = document.getElementById('cnt-scratch');
      if (cntS) cntS.textContent = sc.entries?.length || 0;
      const rc = await api('GET', '/api/reminders');
      const cntR = document.getElementById('cnt-reminders');
      if (cntR) cntR.textContent = rc.reminders?.length || 0;
      try {
        const pc = await api('GET', '/api/predictions');
        const cntP = document.getElementById('cnt-predictions');
        if (cntP) cntP.textContent = pc.predictions?.length || 0;
      } catch {}
    } catch {}

    // Don't re-render if user is typing
    const active = document.activeElement;
    const typing = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
    if (!typing) await loadView();
  } catch (e) { console.error(e); }
}

function setView(v) {
  S.view = v;
  S.filterGroup = '';
  if (v === 'notebook') { S.nbBook = null; S.nbPage = null; }

  document.querySelectorAll('.nav-item').forEach(el => {
    const id = el.id.replace('nav-', '');
    el.classList.toggle('active', id === v);
  });

  const titles = {
    notebook: 'Notebook', protocols: 'Protocol Library', summaries: 'Project Summaries',
    workflow: 'Daily Workflow', scratch: 'Scratch Pad', reminders: 'Reminders',
    'import': 'Import from OneNote', timeline: 'Project Timelines',
    predictions: 'Predicted Tasks', dilution: 'Dilution Calculator',
    DNAmanager: 'DNAmanager',
  };
  document.getElementById('page-title').textContent = titles[v] || v;

  const btn = document.getElementById('add-btn');
  if (v === 'notebook')       { btn.textContent = '+ New entry'; btn.style.display = ''; }
  else if (v === 'protocols') { btn.textContent = '+ Add protocol'; btn.style.display = ''; }
  else if (v === 'reminders') { btn.textContent = '+ Reminder'; btn.style.display = ''; }
  else                        { btn.style.display = 'none'; }

  loadView();
}

function setGroup(g) {
  S.filterGroup = g; S.view = 'notebook'; S.nbBook = g; S.nbPage = null;
  document.querySelectorAll('.group-nav').forEach(el => el.classList.toggle('active', el.textContent.trim() === g));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-notebook').classList.add('active');
  document.getElementById('page-title').textContent = 'Notebook — ' + g;
  document.getElementById('add-btn').textContent = '+ New entry';
  document.getElementById('add-btn').style.display = '';
  loadView();
}

async function loadView() {
  const el = document.getElementById('content');
  if ((S.view === 'notebook' && S.nbBook) || S.view === 'cloning' || S.view === 'pipeline' || S.view === 'sanger') {
    el.style.maxWidth = 'none'; el.style.padding = '0';
  } else {
    el.style.maxWidth = ''; el.style.padding = '';
  }

  const renderer = _views[S.view];
  if (renderer) {
    await renderer(el);
  } else {
    el.innerHTML = '<div class="empty"><big>⚠️</big>View "' + esc(S.view) + '" not loaded.</div>';
  }
}

// ── Shared form: showAddForm delegates to feature ────────────────────────────
function showAddForm() {
  if (S.view === 'reminders' && typeof showAddReminder === 'function') {
    showAddReminder();
  } else if (typeof _showAddForm === 'function') {
    _showAddForm();
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function toggleSidebar() {
  S.sidebarOpen = !S.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !S.sidebarOpen);
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function relTime(iso) {
  const diff = Date.now() - new Date(iso + 'Z').getTime(), m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let tt;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(tt);
  tt = setTimeout(() => el.className = '', 3000);
}


// ── notebook.js ──
// ── NOTEBOOK ──────────────────────────────────────────────────────────────────
async function renderNotebook(el){
  if(S.nbBook){
    await renderNotebookBook(el);
    return;
  }

  // Dashboard + books landing
  var todayData=null;
  try{todayData=await api('GET','/api/today');}catch{}

  var data=await api('GET','/api/entries?limit=500');
  S.entries=data.entries||[];

  var html='';
  var todayStr=new Date().toISOString().slice(0,10);

  // Dashboard cards
  if(todayData){
    var reminders=todayData.reminders||[];
    var todayEntries=todayData.entries_today||[];
    var workflow=todayData.workflow||[];
    var recent=todayData.recent_entries||[];

    html+='<div style="font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:4px">'+formatDate(todayStr)+'</div>';
    html+='<div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:18px">'+
      todayEntries.length+' entries today &middot; '+
      reminders.length+' reminder'+(reminders.length!==1?'s':'')+' &middot; '+
      (todayData.scratch_pending||0)+' scratch pending'+
      (todayData.predictions_pending?' &middot; <span style="color:var(--accent)">'+todayData.predictions_pending+' predictions</span>':'')+
    '</div>';

    html+='<div class="dash-grid">';

    // Reminders card
    html+='<div class="dash-card">';
    html+='<div class="dash-card-title">Reminders</div>';
    if(reminders.length){
      reminders.slice(0,6).forEach(function(r){
        var cls='future';
        if(r.due_date){
          if(r.due_date<todayStr) cls='overdue';
          else if(r.due_date===todayStr) cls='today';
        }
        html+='<div class="dash-reminder">'+
          '<span class="dash-reminder-dot '+cls+'"></span>'+
          '<div style="flex:1"><div>'+esc(r.text)+'</div>'+
          (r.due_date?'<div style="font-size:11px;color:var(--'+(cls==='overdue'?'red':cls==='today'?'accent':'muted')+');font-family:var(--mono)">'+esc(r.due_date)+'</div>':'')+
          '</div></div>';
      });
      if(reminders.length>6) html+='<div style="font-size:12px;color:var(--dim);padding:4px 0">+'+(reminders.length-6)+' more</div>';
    } else {
      html+='<div style="color:var(--dim);font-size:13px;font-style:italic;padding:8px 0">No active reminders</div>';
    }
    html+='</div>';

    // Today's work card
    html+='<div class="dash-card">';
    html+='<div class="dash-card-title">Today</div>';
    if(todayEntries.length){
      todayEntries.slice(0,5).forEach(function(e){
        html+='<div class="dash-entry-mini" data-group="'+esc(e.group_name)+'" data-date="'+esc(e.date)+'">'+
          '<div class="dash-entry-mini-title">'+esc(e.title)+'</div>'+
          '<div class="dash-entry-mini-meta">'+esc(e.group_name)+'</div>'+
        '</div>';
      });
    } else if(workflow.length){
      workflow.slice(0,5).forEach(function(w){
        html+='<div class="dash-wf-item"><span class="dash-wf-time">'+esc(w.time)+'</span><span>'+esc(w.content)+'</span></div>';
      });
    } else {
      html+='<div style="color:var(--dim);font-size:13px;font-style:italic;padding:8px 0">Nothing logged today yet</div>';
    }
    html+='</div>';

    // Recent entries card
    html+='<div class="dash-card" style="grid-column:1/-1">';
    html+='<div class="dash-card-title">Recent (7 days)</div>';
    if(recent.length){
      var byDateR={};
      recent.forEach(function(e){byDateR[e.date]=byDateR[e.date]||[];byDateR[e.date].push(e);});
      Object.entries(byDateR).forEach(function(pair){
        var dt=pair[0],entries=pair[1];
        html+='<div style="display:flex;gap:10px;padding:4px 0;border-bottom:1px solid var(--border)">';
        html+='<span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:70px">'+esc(dt)+'</span>';
        html+='<span style="font-size:13px">'+entries.map(function(e){return esc(e.title);}).join(', ')+'</span>';
        html+='</div>';
      });
    } else {
      html+='<div style="color:var(--dim);font-size:13px;font-style:italic;padding:8px 0">No recent entries</div>';
    }
    html+='</div>';

    html+='</div>';
  }

  // Books section
  html+='<div class="section-label" style="margin-top:8px">Project books</div>';

  if(!S.entries.length){
    html+='<div class="empty"><big>&#128221;</big>No entries yet — import from OneNote, or add manually.</div>';
    el.innerHTML=html;return;
  }

  var projects={};
  S.entries.forEach(function(e){
    var g=e.group_name||'Ungrouped';
    if(!projects[g]) projects[g]={name:g,entries:[],dates:new Set()};
    projects[g].entries.push(e);
    projects[g].dates.add(e.date);
  });

  html+='<div class="nb-books">';
  Object.values(projects).sort(function(a,b){return b.entries.length-a.entries.length;}).forEach(function(proj){
    var dates=Array.from(proj.dates).sort();
    var firstDate=dates[0]||'';
    var lastDate=dates[dates.length-1]||'';
    html+='<div class="nb-book" data-group="'+esc(proj.name)+'">'+
      '<div class="nb-book-title">'+esc(proj.name)+'</div>'+
      '<div class="nb-book-meta">'+proj.entries.length+' entries &middot; '+dates.length+' days</div>'+
      '<div class="nb-book-dates">'+
        (firstDate?esc(firstDate)+' &#8594; '+esc(lastDate):'')+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  el.innerHTML=html;

  setTimeout(function(){
    el.querySelectorAll('.nb-book').forEach(function(book){
      book.addEventListener('click',function(){
        var g=this.dataset.group;
        S.nbBook=g;S.nbPage=null;S.filterGroup=g;
        document.getElementById('page-title').textContent='Notebook — '+g;
        loadView();
      });
    });
    el.querySelectorAll('.dash-entry-mini').forEach(function(item){
      item.addEventListener('click',function(){
        var g=this.dataset.group;
        if(g){S.nbBook=g;S.nbPage=this.dataset.date;S.filterGroup=g;
          document.getElementById('page-title').textContent='Notebook — '+g;loadView();}
      });
    });
  },0);
}

async function renderNotebookBook(el){
  var data=await api('GET','/api/entries?group='+encodeURIComponent(S.nbBook)+'&limit=500');
  var entries=data.entries||[];

  var byDate={};
  entries.forEach(function(e){byDate[e.date]=byDate[e.date]||[];byDate[e.date].push(e);});
  var dates=Object.keys(byDate).sort().reverse();
  if(!S.nbPage&&dates.length) S.nbPage=dates[0];

  var html='<div class="nb-layout">';

  // Page list sidebar
  html+='<div class="nb-page-list">';
  html+='<div class="nb-page-list-hdr">'+
    '<button id="nb-back-btn">&#8592;</button>'+
    '<span class="nb-page-list-title">'+esc(S.nbBook)+'</span>'+
    '<button class="nb-delete-btn" id="nb-del-book-btn">DELETE</button>'+
  '</div>';

  dates.forEach(function(date){
    var dayEntries=byDate[date];
    var active=S.nbPage===date;
    var titles=dayEntries.map(function(e){return e.title;}).join(', ');
    html+='<div class="nb-page-item'+(active?' active':'')+'" data-date="'+esc(date)+'">'+
      '<div class="nb-page-date">'+esc(date)+'</div>'+
      '<div class="nb-page-titles">'+esc(titles)+'</div>'+
      '<div class="nb-page-count">'+dayEntries.length+' entr'+(dayEntries.length===1?'y':'ies')+'</div>'+
    '</div>';
  });

  if(!dates.length){
    html+='<div style="padding:20px 16px;color:var(--muted);font-size:13px;font-style:italic">No entries yet</div>';
  }
  html+='</div>';

  // Editor pane
  html+='<div class="nb-editor">';
  if(S.nbPage&&byDate[S.nbPage]){
    var pageEntries=byDate[S.nbPage];
    var dt=new Date(S.nbPage+'T00:00:00');
    html+='<div class="nb-editor-date">'+dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</div>';
    html+='<div class="nb-editor-weekday">'+dt.toLocaleDateString('en-GB',{weekday:'long'})+' &middot; '+pageEntries.length+' entr'+(pageEntries.length===1?'y':'ies')+'</div>';

    pageEntries.forEach(function(e){
      html+='<div class="nb-entry" id="nbe-'+e.id+'">'+
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;flex-wrap:wrap">'+
          '<input type="text" id="nt-'+e.id+'" value="'+esc(e.title)+'" style="flex:1;min-width:200px;font-family:var(--serif);font-size:17px;font-weight:600;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);padding:2px 0;outline:none" onfocus="this.style.borderBottomColor=\'var(--accent)\'" onblur="this.style.borderBottomColor=\'transparent\'"/>'+
          '<input type="date" id="nd-'+e.id+'" value="'+esc(e.date)+'" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:4px 6px;border-radius:3px;outline:none;width:130px"/>'+
        '</div>'+
        '<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px">'+
          '<input type="text" id="ng-'+e.id+'" value="'+esc(e.group_name)+'" placeholder="group" style="background:var(--surface2);border:1px solid var(--border);color:var(--accent);font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:3px;outline:none;width:100px"/>'+
          '<span style="color:var(--dim)">/</span>'+
          '<input type="text" id="ns-'+e.id+'" value="'+esc(e.subgroup)+'" placeholder="subgroup" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:3px;outline:none;width:100px"/>'+
          (e.summary?'<span style="font-size:11px;color:var(--dim);font-style:italic;margin-left:auto;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.summary)+'</span>':'')+
        '</div>'+
        '<div class="nb-field-label">Notes</div>'+
        '<textarea class="big" id="en-'+e.id+'" placeholder="What was done, observations, details...">'+esc(e.notes)+'</textarea>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
          '<div>'+
            '<div class="nb-field-label">Results</div>'+
            '<textarea id="er-'+e.id+'" placeholder="Outcomes, data, measurements...">'+esc(e.results)+'</textarea>'+
          '</div>'+
          '<div>'+
            '<div class="nb-field-label">Yields / Purity</div>'+
            '<textarea id="ey-'+e.id+'" placeholder="e.g. 2.4 mg/mL, >95% pure...">'+esc(e.yields)+'</textarea>'+
          '</div>'+
        '</div>'+
        '<div class="nb-field-label">Issues / Troubleshooting</div>'+
        '<textarea id="ei-'+e.id+'" placeholder="What went wrong? What to try next...">'+esc(e.issues)+'</textarea>'+
        '<div class="nb-field-label">Images</div>'+
        '<div id="nb-imgs-'+e.id+'" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px"></div>'+
        '<div style="margin-bottom:8px">'+
          '<label class="btn" style="cursor:pointer;display:inline-block">'+
            '+ Add image <input type="file" accept="image/*" style="display:none" data-entry="'+e.id+'" id="nb-img-inp-'+e.id+'"/>'+
          '</label>'+
        '</div>'+
        '<div class="nb-entry-actions">'+
          '<button class="btn primary" onclick="saveEntryFull('+e.id+')">Save all</button>'+
          '<button class="btn" onclick="summariseEntry('+e.id+')">&#128161; Summarise</button>'+
          '<button class="btn" onclick="deleteEntry('+e.id+')" style="color:var(--red);margin-left:auto">Delete entry</button>'+
        '</div>'+
      '</div>';
    });
  } else {
    html+='<div class="nb-empty-page">Select a day from the page list, or create a new entry.</div>';
  }
  html+='</div>';
  html+='</div>';

  el.innerHTML=html;

  // Bind page list clicks and header buttons
  setTimeout(function(){
    var backBtn=document.getElementById('nb-back-btn');
    if(backBtn) backBtn.addEventListener('click',function(){
      S.nbBook=null;S.nbPage=null;S.filterGroup='';
      document.getElementById('page-title').textContent='Notebook';
      loadView();
    });
    var delBtn=document.getElementById('nb-del-book-btn');
    if(delBtn) delBtn.addEventListener('click',function(){
      var bookName=S.nbBook;
      if(!confirm('Delete the entire "'+bookName+'" book?\nThis will remove ALL entries in this project.'))return;
      if(!confirm('Are you sure? This cannot be undone.\n\nType confirms deletion of all entries in "'+bookName+'".'))return;
      api('DELETE','/api/entries/group/'+encodeURIComponent(bookName)).then(function(r){
        toast('Deleted "'+bookName+'" — '+r.count+' entries removed');
        S.nbBook=null;S.nbPage=null;S.filterGroup='';
        document.getElementById('page-title').textContent='Notebook';
        load();
      }).catch(function(e){toast('Failed: '+e.message,true);});
    });
    el.querySelectorAll('.nb-page-item').forEach(function(item){
      item.addEventListener('click',function(){
        S.nbPage=this.dataset.date;
        renderNotebookBook(el);
      });
    });
    // Load images for visible entries
    if(S.nbPage&&byDate[S.nbPage]){
      byDate[S.nbPage].forEach(function(e){
        loadEntryImages(e.id);
        var inp=document.getElementById('nb-img-inp-'+e.id);
        if(inp) inp.addEventListener('change',function(ev){
          if(ev.target.files[0]) uploadEntryImage(e.id,ev.target.files[0]);
        });
      });
    }
  },0);
}

async function loadEntryImages(entryId){
  try{
    var data=await api('GET','/api/entries/'+entryId+'/images');
    var container=document.getElementById('nb-imgs-'+entryId);
    if(!container)return;
    var imgs=data.images||[];
    if(!imgs.length){container.innerHTML='<span style="font-size:12px;color:var(--dim);font-style:italic">No images</span>';return;}
    container.innerHTML=imgs.map(function(img){
      return '<div style="position:relative;display:inline-block">'+
        '<img src="/api/entry-images/'+img.id+'/raw" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid var(--border);cursor:pointer" onclick="window.open(this.src)"/>'+
        '<button onclick="deleteEntryImage('+img.id+','+entryId+')" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;line-height:18px;text-align:center">&times;</button>'+
      '</div>';
    }).join('');
  }catch{}
}

async function uploadEntryImage(entryId,file){
  var fd=new FormData();fd.append('file',file);
  try{
    await fetch('/api/entries/'+entryId+'/images',{method:'POST',body:fd});
    toast('Image uploaded');
    loadEntryImages(entryId);
  }catch(e){toast('Upload failed',true);}
}

async function deleteEntryImage(imageId,entryId){
  if(!confirm('Delete this image?'))return;
  await api('DELETE','/api/entry-images/'+imageId);
  loadEntryImages(entryId);
}

function toggleEntry(id){
  var card=document.getElementById('ec-'+id);
  if(card) card.classList.toggle('open');
}

async function saveEntry(id){
  var notes=document.getElementById('en-'+id)?.value||'';
  var results=document.getElementById('er-'+id)?.value||'';
  var yields=document.getElementById('ey-'+id)?.value||'';
  var issues=document.getElementById('ei-'+id)?.value||'';
  await api('PUT','/api/entries/'+id,{notes,results,yields,issues});
  toast('Saved');
}

async function saveEntryFull(id){
  var title=document.getElementById('nt-'+id)?.value||'';
  var date=document.getElementById('nd-'+id)?.value||'';
  var group=document.getElementById('ng-'+id)?.value||'';
  var sub=document.getElementById('ns-'+id)?.value||'';
  var notes=document.getElementById('en-'+id)?.value||'';
  var results=document.getElementById('er-'+id)?.value||'';
  var yields=document.getElementById('ey-'+id)?.value||'';
  var issues=document.getElementById('ei-'+id)?.value||'';
  await api('PUT','/api/entries/'+id,{title,date,group_name:group,subgroup:sub,notes,results,yields,issues});
  // If date or group changed, refresh the page list
  toast('Saved');
  await loadView();
}

async function summariseEntry(id){
  toast('Summarising...');
  var r=await api('POST','/api/entries/'+id+'/summarise');
  toast('Summary added');
  await loadView();
}

async function deleteEntry(id){
  if(!confirm('Delete this entry? This cannot be undone.'))return;
  await api('DELETE','/api/entries/'+id);
  toast('Entry deleted');
  await load();
  // If we're in a book, refresh book view
  if(S.nbBook) await renderNotebookBook(document.getElementById('content'));
}

// ── workflow.js ──
// ── DAILY WORKFLOW ───────────────────────────────────────────────────────────
var _workflowDate = new Date().toISOString().slice(0, 10);
var _wfNotebookGroups = [];    // cached from /api/entries
var _wfSubgroupMap = {};       // {group: {subgroup: true}}

async function _loadWfNotebookGroups() {
  try {
    var data = await api('GET', '/api/entries');
    var seen = {}, subMap = {};
    (data.entries || []).forEach(function(e) {
      if (e.group_name) {
        seen[e.group_name] = true;
        if (e.subgroup) {
          if (!subMap[e.group_name]) subMap[e.group_name] = {};
          subMap[e.group_name][e.subgroup] = true;
        }
      }
    });
    _wfNotebookGroups = Object.keys(seen).sort();
    _wfSubgroupMap = subMap;
  } catch(ex) { _wfNotebookGroups = []; _wfSubgroupMap = {}; }
}

async function renderWorkflow(el) {
  var data    = await api('GET', '/api/workflow/' + _workflowDate);
  var entries = data.entries || [];
  var today   = new Date().toISOString().slice(0, 10);
  await _loadWfNotebookGroups();

  var html = '<div class="day-nav">' +
    '<button onclick="shiftDay(-1)">&#8592; Prev</button>' +
    '<div class="day-label">' + formatDate(_workflowDate) + '</div>' +
    (_workflowDate < today
      ? '<button onclick="shiftDay(1)">Next &#8594;</button>'
      : '<button disabled style="opacity:.3">Next &#8594;</button>') +
    '<button class="btn" onclick="processWorkflowDay()" title="Send this day\'s notes to the 3090 to format into notebook entries" style="margin-left:10px">&#9881; Process day</button>' +
  '</div>';

  if (data.summary) html += '<div class="day-summary">' + esc(data.summary) + '</div>';

  html += '<div class="timeline" id="workflow-timeline">';
  if (!entries.length) {
    html += '<div style="padding:32px 0 32px 82px;color:var(--muted);font-size:14px;font-style:italic">No entries yet — jot notes below, they get processed into formatted notebook entries.</div>';
  } else {
    // snapshot active runs from localStorage for cross-referencing
    var _activeRunsNow = [];
    try { _activeRunsNow = JSON.parse(localStorage.getItem('lab_proto_runs') || '[]'); } catch(_e) {}

    html += entries.map(function(e) {
      var isTask  = e.type === 'task_done';
      var isProto = e.type === 'protocol_run';

      // for protocol_run entries, extract protocol title from content and find active run
      var protoActions = '';
      if (isProto) {
        // content is "Running protocol: <title>" — extract title
        var protoTitle = e.content.replace(/^Running protocol:\s*/i, '').trim();
        // find matching active run by protocol title
        var activeRun = _activeRunsNow.find(function(r) {
          return r.protocol && r.protocol.title === protoTitle;
        });
        if (activeRun) {
          var done = activeRun.steps.filter(function(s) { return s.done; }).length;
          var pct  = Math.round((done / activeRun.steps.length) * 100);
          protoActions = '<div style="margin-top:6px;padding:6px 8px;background:#e8f0e8;border-radius:4px;display:flex;align-items:center;gap:8px">' +
            '<div style="flex:1">' +
              '<div style="font-size:11px;font-weight:600;color:#5b7a5e">&#9654; In progress &nbsp;&#183;&nbsp; ' + done + '/' + activeRun.steps.length + ' steps (' + pct + '%)</div>' +
              '<div style="height:3px;background:#c8d8c8;border-radius:2px;margin-top:3px"><div style="height:100%;width:' + pct + '%;background:#5b7a5e;border-radius:2px"></div></div>' +
            '</div>' +
            '<button class="btn primary" style="font-size:11px;padding:3px 10px" onclick="wfResumeRun(\x27' + activeRun.runId + '\x27)">Resume</button>' +
          '</div>';
        } else {
          // run completed or not started yet — link to protocol history
          protoActions = '<div style="margin-top:6px">' +
            '<button class="btn" style="font-size:11px;color:#5b7a5e" onclick="wfViewProtocolHistory(\x27' + esc(protoTitle) + '\x27)">&#128196; View protocol history</button>' +
          '</div>';
        }
      }

      return '<div class="timeline-entry" id="we-' + e.id + '">' +
        '<div class="timeline-time">' + esc(e.time || '') + '</div>' +
        '<div class="timeline-dot ' + (isTask ? 'task' : isProto ? 'protocol' : 'note') + '"></div>' +
        '<div class="timeline-body">' +
          '<div class="timeline-card ' + (isTask ? 'task-card' : isProto ? 'protocol-card-tl' : 'note-card') + '">' +
            (e.group_name ? '<div class="timeline-card-group">' + esc(e.group_name) + '</div>' : '') +
            '<div class="timeline-card-text" id="wt-' + e.id + '">' + esc(e.content) + '</div>' +
            protoActions +
            '<div class="timeline-actions">' +
              '<button class="btn" onclick="editWorkflowEntry(' + e.id + ')">Edit</button>' +
              '<button class="btn" onclick="tagWorkflowEntry(' + e.id + ')" title="Set project group">Tag</button>' +
              '<button class="btn" style="color:var(--red)" onclick="deleteWorkflowEntry(' + e.id + ')">&#215;</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  html += '</div>';

  // ── group input — dropdown if groups exist, text if not ───────────────────
  var groupControl;
  if (_wfNotebookGroups.length) {
    var groupOpts = '<option value="">Project (optional)</option>' +
      _wfNotebookGroups.map(function(g) { return '<option value="' + esc(g) + '">' + esc(g) + '</option>'; }).join('');
    groupControl = '<select id="wf-group" ' +
      'style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;border-radius:4px;outline:none">' +
      groupOpts + '</select>';
  } else {
    groupControl = '<input type="text" id="wf-group" placeholder="Project (optional)" spellcheck="false" ' +
      'style="width:140px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;border-radius:4px;outline:none"/>';
  }

  html += '<div style="margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px">' +
    '<div style="display:flex;gap:8px;margin-bottom:8px">' + groupControl + '</div>' +
    '<div class="add-inline" style="padding:0">' +
      '<input type="text" id="wf-input" placeholder="Jot down what you\'re doing..." spellcheck="false"/>' +
      '<button onclick="addWorkflowNote()">Add</button>' +
    '</div>' +
    '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">' +
      '<div id="wf-proto-picker-wrap">' +
        '<button class="btn" style="color:#5b7a5e;font-size:12px" onclick="wfShowProtoPicker()">&#9654; Run a protocol</button>' +
      '</div>' +
    '</div>' +
  '</div>';

  el.innerHTML = html;
  setTimeout(function() {
    var wfInp = document.getElementById('wf-input');
    if (wfInp) {
      wfInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') addWorkflowNote(); });
      wfInp.focus();
    }
  }, 50);
}

  var wrap = document.getElementById('wf-proto-picker-wrap'); if (!wrap) return;
  wrap.innerHTML = '<div style="color:var(--muted);font-size:13px">Loading...</div>';

  var data = await api('GET', '/api/protocols');
  S.protocols = data.protocols || [];
  if (!S.protocols.length) {
    wrap.innerHTML = '<div style="color:var(--muted);font-size:13px;font-style:italic">No protocols saved yet — add one in the Protocols page first.</div>';

        '<button class="btn" onclick="wfHideProtoPicker()">Cancel</button>' +
      '</div>' +
      '<select id="wf-pk-sel" size="4" style="width:100%;border:1px solid #d5cec0;border-radius:4px;background:#faf8f4;font-family:inherit;font-size:13px;margin-bottom:10px">' +
        opts +
      '</select>' +
      '<div style="display:flex;gap:8px;margin-bottom:8px">' +
        '<div style="flex:1">' +
          '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8a7f72;margin-bottom:4px">Notebook group</div>' +
          '<select id="wf-pk-group" style="width:100%;border:1px solid #d5cec0;border-radius:4px;background:#faf8f4;font-family:inherit;font-size:13px;padding:5px 8px" onchange="wfPickerGroupChanged()">' +

          '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8a7f72;margin-bottom:4px">Subgroup <span style="font-weight:400;text-transform:none;font-size:10px">(optional)</span></div>' +
          '<input type="text" id="wf-pk-subgroup" placeholder="e.g. protein expression testing" spellcheck="false" style="width:100%" list="wf-pk-subgroup-dl"/>' +
          '<datalist id="wf-pk-subgroup-dl"></datalist>' +
        '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<button class="btn primary" onclick="wfLaunchProtoRun()">&#9654; Start run</button>' +
      '</div>' +
    '</div>';

  document.getElementById('wf-pk-q')?.focus();
  // pre-populate subgroup suggestions if group already selected
  if (currentGroup) wfPickerGroupChanged();
}

function wfHideProtoPicker() {
  var wrap = document.getElementById('wf-proto-picker-wrap');
  if (wrap) wrap.innerHTML = '<button class="btn" style="color:#5b7a5e;font-size:12px" onclick="wfShowProtoPicker()">&#9654; Run a protocol</button>';
}

function wfPickerFilter() {
  var q = (document.getElementById('wf-pk-q')?.value || '').toLowerCase();
  document.querySelectorAll('#wf-pk-sel option').forEach(function(o) { o.style.display = (!q || o.textContent.toLowerCase().includes(q)) ? '' : 'none'; });
}

function wfPickerGroupChanged() {
  var group    = document.getElementById('wf-pk-group')?.value || '';
  var datalist = document.getElementById('wf-pk-subgroup-dl'); if (!datalist) return;
  var subs = Object.keys(_wfSubgroupMap[group] || {});
  datalist.innerHTML = subs.map(function(s) { return '<option value="' + esc(s) + '">'; }).join('');
}

function wfLaunchProtoRun() {
  var sel      = document.getElementById('wf-pk-sel');
  var group    = (document.getElementById('wf-pk-group')?.value || '').trim();
  var subgroup = (document.getElementById('wf-pk-subgroup')?.value || '').trim();
  if (!sel || !sel.value) { toast('Select a protocol first', true); return; }
  if (!group) { toast('Select a notebook group', true); document.getElementById('wf-pk-group')?.focus(); return; }

  var p = (S.protocols || []).find(function(x) { return x.id === parseInt(sel.value); });
  if (!p) return;

  // log in timeline
  api('POST', '/api/workflow', {
    content:    'Running protocol: ' + p.title,
    type:       'protocol_run',
    group_name: group
  });

  if (typeof spLaunchRunDirect === 'function') {
    spLaunchRunDirect(p, group, subgroup);
  } else {
    toast('scratch.js not loaded', true);
  }
}

// ── workflow helpers ──────────────────────────────────────────────────────────
function shiftDay(d) {
  var dt = new Date(_workflowDate + 'T12:00:00');
  dt.setDate(dt.getDate() + d);
  _workflowDate = dt.toISOString().slice(0, 10);
  loadView();
}

async function addWorkflowNote() {
  var inp    = document.getElementById('wf-input');
  var grpInp = document.getElementById('wf-group');
  var text   = inp?.value.trim(); if (!text) return;
  var group  = grpInp?.value.trim() || null;
  await api('POST', '/api/workflow', { content: text, type: 'note', group_name: group });
  inp.value = '';
  await loadView();
}

function tagWorkflowEntry(id) {
  var group = prompt('Set project group for this entry (leave empty to clear):');
  if (group === null) return;
  api('PUT', '/api/workflow/' + id, { group_name: group || null }).then(function() { loadView(); toast('Tagged'); });
}

async function processWorkflowDay() {
  if (!confirm('Send all notes for ' + _workflowDate + ' to the 3090 for formatting into notebook entries?')) return;
  toast('Processing — waking 3090...');
  try {
    var resp = await api('POST', '/api/workflow/process-day', { date: _workflowDate });
    if (resp.error) { toast(resp.error, true); return; }
    toast('Created ' + resp.count + ' notebook entries from workflow');
    await load();
  } catch(e) { toast('Failed: ' + e.message, true); }
}

function editWorkflowEntry(id) {
  var el = document.getElementById('wt-' + id); if (!el) return;
  var current = el.textContent;
  el.innerHTML = '<textarea id="we-ta-' + id + '" style="min-height:60px;width:100%;background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;resize:none;padding:2px 0">' + esc(current) + '</textarea>';
  var ta = el.querySelector('textarea'); ta.focus();
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveWorkflowEntry(id, this.value); }
    if (e.key === 'Escape') loadView();
  });
}

async function saveWorkflowEntry(id, content) {
  await api('PUT', '/api/workflow/' + id, { content: content });
  await loadView(); toast('Saved');
}

async function deleteWorkflowEntry(id) {
  await api('DELETE', '/api/workflow/' + id);
  await loadView();
}

function wfResumeRun(runId) {
  if (typeof spResumeRunById === 'function') spResumeRunById(runId);
  else toast('Could not resume', true);
}

function wfViewProtocolHistory(protoTitle) {
  // navigate to protocols page and open the matching card
  if (!S.protocols || !S.protocols.length) {
    api('GET', '/api/protocols').then(function(data) {
      S.protocols = data.protocols || [];
      _wfJumpToProtocol(protoTitle);
    });
  } else {
    _wfJumpToProtocol(protoTitle);
  }
}

function _wfJumpToProtocol(title) {
  var p = (S.protocols || []).find(function(x) { return x.title === title; });
  if (!p) { toast('Protocol not found', true); return; }
  if (typeof setView === 'function') {
    setView('protocols');
    // open the card after render
    setTimeout(function() {
      var card = document.getElementById('pc-' + p.id);
      if (card) {
        if (!card.classList.contains('open') && typeof protoToggle === 'function') protoToggle(p.id);
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 300);
  }
}

registerView('workflow', renderWorkflow);
window.processWorkflowDay = processWorkflowDay;

var DEFAULT_RECIPE = { columns: ['Component', 'Stock conc.', 'Volume (uL)', 'Final conc.'], rows: [] };
var _recipeState = {};
var _manualSteps = [''];
var _manualRecipes = []; // array of {name, columns, rows}
var _UNITS = ['uL', 'mL', 'L', 'ng', 'ug', 'mg', 'g', 'nM', 'uM', 'mM', 'M', 'U', 'x', '%', 'units'];

function _parseRecipe(raw) {
  if (!raw) return JSON.parse(JSON.stringify(DEFAULT_RECIPE));
  try {
    var r = JSON.parse(raw);
    // new format: array of tables
    if (Array.isArray(r) && r.length && r[0].columns) return r[0]; // return first for compat
    // old format: single object
    if (r && Array.isArray(r.columns) && Array.isArray(r.rows)) return r;
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_RECIPE));
}

function _parseAllRecipes(raw) {
  if (!raw) return null;
  try {
    var r = JSON.parse(raw);
    if (Array.isArray(r) && r.length && r[0].columns) return r;
    if (r && Array.isArray(r.columns)) return null; // single table, use old display
  } catch(e) {}
  return null;
}

function _isUnitCol(n) { return /vol|amount|conc|stock|final|mass|weight/i.test(n); }

function _parseAmountUnit(val) {
  val = (val || '').trim();
  var m = val.match(/^([\d.,]*)\s*(.*)$/);
  return { num: m ? m[1] : '', unit: m ? m[2].trim() : '' };
}

function _manualUnitCellHTML(ri, ci, val) {
  var p = _parseAmountUnit(val);
  var unitOpts = _UNITS.map(function(u) { return '<option value="' + u + '"' + (p.unit === u ? ' selected' : '') + '>' + u + '</option>'; }).join('');
  return '<td style="padding:0"><div style="display:flex;align-items:center">' +
    '<input type="number" value="' + esc(p.num) + '" min="0" step="any" placeholder="0" ' +
      'style="width:68px;border:none;background:transparent;padding:6px 4px 6px 8px;font-size:13px;font-family:inherit;color:#4a4139;outline:none" ' +
      'oninput="manualRecipeCellUnit(' + ri + ',' + ci + ',this.value,this.nextElementSibling.value)"/>' +
    '<select style="border:none;background:transparent;font-size:12px;color:#8a7f72;font-family:inherit;padding:0 4px 0 0;cursor:pointer;outline:none" ' +
      'onchange="manualRecipeCellUnit(' + ri + ',' + ci + ',this.previousElementSibling.value,this.value)">' +
      '<option value="">-</option>' + unitOpts +
    '</select></div></td>';
}

function _recipeDisplayHTML(raw) {
  var tables = _parseAllRecipes(raw);
  if (tables) {
    // multi-table display
    return tables.map(function(t) {
      return '<div style="margin-bottom:10px">' +
        (t.name ? '<div style="font-size:11px;font-weight:600;color:#8a7f72;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">' + esc(t.name) + '</div>' : '') +
        _recipeReadHTML(t) +
      '</div>';
    }).join('');
  }
  return _recipeReadHTML(_parseRecipe(raw));
}

function _recipeReadHTML(recipe) {
  if (!recipe.rows.length) return '<div style="color:#8a7f72;font-size:13px;font-style:italic">No components yet.</div>';
  var html = '<div class="recipe-wrap"><table class="recipe-table"><thead><tr>';
  recipe.columns.forEach(function(c) { html += '<th>' + esc(c) + '</th>'; });
  html += '</tr></thead><tbody>';
  recipe.rows.forEach(function(row) {
    html += '<tr>';
    recipe.columns.forEach(function(_, ci) { html += '<td style="padding:6px 10px">' + esc(row[ci] || '') + '</td>'; });
    html += '</tr>';
  });
  return html + '</tbody></table></div>';
}

function _recipeEditHTML(pid, recipe) {
  var html = '<div class="recipe-wrap"><table class="recipe-table" id="rtbl-' + pid + '"><thead><tr>';
  recipe.columns.forEach(function(c, ci) { html += '<th>' + esc(c) + '<button class="del-col" onclick="protoDelCol(' + pid + ',' + ci + ')">&#215;</button></th>'; });
  html += '<th style="width:32px"></th></tr></thead><tbody>';
  recipe.rows.forEach(function(row, ri) {
    html += '<tr id="rrow-' + pid + '-' + ri + '">';
    recipe.columns.forEach(function(_, ci) { html += '<td><input type="text" value="' + esc(row[ci] || '') + '" oninput="protoRecipeCell(' + pid + ',' + ri + ',' + ci + ',this.value)"/></td>'; });
    html += '<td><button class="del-row" onclick="protoDelRow(' + pid + ',' + ri + ')">&#215;</button></td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<div class="recipe-add-row"><button class="btn" onclick="protoAddRow(' + pid + ')">+ Row</button><button class="btn" onclick="protoAddCol(' + pid + ')">+ Column</button></div>';
  return html;
}

function _runHistoryRowHTML(run) {
  var pct  = run.steps_total ? Math.round((run.steps_done / run.steps_total) * 100) : 0;
  var date = run.date || run.created.split('T')[0];

  // build step-by-step detail
  var steps = [];
  try { steps = JSON.parse(run.steps_json || '[]'); } catch(e) {}
  var stepsHtml = '';
  if (steps.length) {
    stepsHtml = '<ol class="run-detail-steps">';
    steps.forEach(function(step) {
      stepsHtml += '<li class="' + (step.done ? 'done' : '') + '">' + esc(step.text);
      if (step.deviation && step.deviation.trim()) {
        stepsHtml += ' <span class="run-detail-deviation">&#8594; ' + esc(step.deviation) + '</span>';
      }
      stepsHtml += '</li>';
    });
    stepsHtml += '</ol>';
  }

  // recipe if present
  var recipeHtml = '';
  try {
    var recipe = JSON.parse(run.recipe_json || 'null');
    if (recipe && recipe.rows && recipe.rows.length) {
      recipeHtml = '<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8a7f72;margin:10px 0 6px">Recipe used</div>';
      recipeHtml += '<div style="overflow-x:auto"><table class="recipe-table"><thead><tr>';
      recipe.columns.forEach(function(c) { recipeHtml += '<th>' + esc(c) + '</th>'; });
      recipeHtml += '</tr></thead><tbody>';
      recipe.rows.forEach(function(row) {
        recipeHtml += '<tr>';
        recipe.columns.forEach(function(_, ci) { recipeHtml += '<td style="padding:5px 10px;font-size:12px">' + esc(row[ci] || '') + '</td>'; });
        recipeHtml += '</tr>';
      });
      recipeHtml += '</tbody></table></div>';

function protoFilter() {
  var q = (document.getElementById('proto-search')?.value || '').toLowerCase();

function _protoCard(p) {
  var tags = JSON.parse(p.tags || '[]');
  var steps = [], isStructured = false;
  try {
    var parsed = JSON.parse(p.steps || '[]');
    if (Array.isArray(parsed) && parsed.length && typeof parsed[0].text !== 'undefined') { steps = parsed; isStructured = true; }

  var stepsHtml = '';

    stepsHtml = '<div style="color:#8a7f72;font-size:13px;font-style:italic">No steps yet — click Extract steps to pull from source.</div>';

    stepsHtml = '<ol class="steps-list">' + steps.map(function(s) { return '<li>' + _renderStepText(s.text) + '</li>'; }).join('') + '</ol>';
  } else {
    stepsHtml = '<div class="steps-text">' + esc(p.steps) + '</div>';
  }

  var recipe = _parseRecipe(p.recipe);

      '</div>' +
      '<div class="proto-card-actions">' +
        '<button class="btn" style="color:#5b7a5e" onclick="event.stopPropagation();protoOpenRun(' + p.id + ')">&#9654; Run</button>' +
        '<button class="btn" onclick="event.stopPropagation();protoEdit(' + p.id + ')">&#9998; Edit</button>' +
        (p.source_type !== 'manual' ? '<button class="btn" style="color:#5b7a5e" onclick="event.stopPropagation();protoReExtract(' + p.id + ')">&#10227; Extract steps</button>' : '') +
        (p.url ? '<a class="btn" href="' + esc(p.url) + '" target="_blank" onclick="event.stopPropagation()">&#8599;</a>' : '') +
        '<button class="btn" style="color:#c0392b" onclick="event.stopPropagation();protoDelete(' + p.id + ')">&#128465; Delete</button>' +
      '</div>' +
    '</div>' +
    '<div class="protocol-body" id="pb-' + p.id + '">' +
      stepsHtml +
      '<div class="recipe-section">' +
        '<div class="recipe-section-head"><span>Reaction Recipe</span>' +
          '<div class="recipe-edit-actions" id="recipe-actions-' + p.id + '">' +
            '<button class="btn" onclick="event.stopPropagation();protoRecipeEdit(' + p.id + ')">Edit</button>' +
          '</div>' +
        '</div>' +
        '<div id="recipe-body-' + p.id + '">' + _recipeDisplayHTML(p.recipe) + '</div>' +
      '</div>' +
      '<div class="run-history-section">' +
        '<div class="run-history-head">Run History</div>' +
        '<div id="run-history-' + p.id + '"><div style="color:#8a7f72;font-size:13px;font-style:italic">Loading...</div></div>' +
      '</div>' +
      '<div class="field" style="margin-top:14px">' +

    '</div>' +
  '</div>';
}

function protoToggle(id) {
  var card = document.getElementById('pc-' + id);

async function protoLoadRunHistory(pid) {

function protoRecipeEdit(pid) {

function protoRecipeCancel(pid) {
  var p = (S.protocols || []).find(function(x) { return x.id === pid; }); if (!p) return;

async function protoRecipeSave(pid) {

function protoRecipeCell(pid, ri, ci, value) { if (_recipeState[pid] && _recipeState[pid].rows[ri]) _recipeState[pid].rows[ri][ci] = value; }

function protoAddRow(pid) {
  var r = _recipeState[pid]; if (!r) return;
