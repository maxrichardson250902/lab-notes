    '</table>'+
    '<div style="margin-top:10px;display:flex;gap:8px">'+
      '<button class="btn" onclick="addSeqRow()">+ Add row</button>'+
      '<button class="btn" onclick="clearSeqTable()">Clear</button>'+
    '</div>'+
  '</div>';

  // Serial dilution with unit selector
  html+='<div class="dil-card">'+
    '<h3>Serial dilution</h3>'+
    '<div class="dil-row">'+
      '<div class="dil-field"><label>Stock conc</label><input type="number" id="ser-stock" step="any" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Unit</label><select id="ser-unit" onchange="calcSerial()">'+concOpts+'</select></div>'+
      '<div class="dil-field"><label>Dilution factor</label><input type="number" id="ser-factor" step="any" value="10" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label># steps</label><input type="number" id="ser-steps" value="5" min="1" max="12" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Vol/tube</label><input type="number" id="ser-vol" step="any" value="100" oninput="calcSerial()"/></div>'+
      '<div class="dil-field"><label>Vol unit</label><select id="ser-vol-unit" onchange="calcSerial()">'+volOpts+'</select></div>'+
    '</div>'+
    '<div id="ser-result" style="margin-top:8px"></div>'+
  '</div>';

  el.innerHTML=html;
  setTimeout(function(){renderSeqRows();calcSeqTable();},0);
}

function calcDilution(){
  var c1=parseFloat(document.getElementById('dil-c1')?.value);
  var c2=parseFloat(document.getElementById('dil-c2')?.value);
  var v2=parseFloat(document.getElementById('dil-v2')?.value);
  var cUnit=document.getElementById('dil-c-unit')?.value||'';
  var vUnit=document.getElementById('dil-v-unit')?.value||'';
  var v1El=document.getElementById('dil-v1');
  var wEl=document.getElementById('dil-water');
  if(c1>0&&c2>0&&v2>0){
    var v1=(c2*v2)/c1;
    var water=v2-v1;
    v1El.value=v1.toFixed(2)+' '+vUnit;
    wEl.value=water>0?water.toFixed(2)+' '+vUnit:'\u2014';
    if(v1>v2){v1El.value='C1 too low!';v1El.style.color='var(--red)';wEl.value='\u2014';}
    else{v1El.style.color='var(--accent)';}
  } else {
    v1El.value='\u2014';wEl.value='\u2014';v1El.style.color='var(--accent)';
  }
}

function renderSeqRows(){
  var tbody=document.getElementById('seq-tbody');
  if(!tbody)return;
  tbody.innerHTML=_dilSeqRows.map(function(r,i){
    return '<tr>'+
      '<td><input type="text" id="seq-name-'+i+'" value="'+esc(r.name)+'" placeholder="Sample '+(i+1)+'" style="width:140px" oninput="_dilSeqRows['+i+'].name=this.value"/></td>'+
      '<td><input type="number" id="seq-conc-'+i+'" value="'+(r.conc||'')+'" step="any" placeholder="ng/&mu;L" oninput="_dilSeqRows['+i+'].conc=this.value;calcSeqTable()"/></td>'+
      '<td id="seq-dna-'+i+'" style="font-weight:500;color:var(--accent)">—</td>'+
      '<td id="seq-water-'+i+'" style="color:var(--muted)">—</td>'+
    '</tr>';
  }).join('');
}

function calcSeqTable(){
  var targetConc=parseFloat(document.getElementById('seq-target-conc')?.value)||100;
  var finalVol=parseFloat(document.getElementById('seq-final-vol')?.value)||15;
  _dilSeqRows.forEach(function(r,i){
    var conc=parseFloat(document.getElementById('seq-conc-'+i)?.value||r.conc);
    var dnaEl=document.getElementById('seq-dna-'+i);
    var waterEl=document.getElementById('seq-water-'+i);
    if(!dnaEl||!waterEl)return;
    if(conc>0&&targetConc>0&&finalVol>0){
      var dnaVol=(targetConc*finalVol)/conc;
      var water=finalVol-dnaVol;
      if(dnaVol>finalVol){
        dnaEl.textContent='too dilute';dnaEl.style.color='var(--red)';
        waterEl.textContent='—';
      } else {
        dnaEl.textContent=dnaVol.toFixed(2);dnaEl.style.color='var(--accent)';
        waterEl.textContent=water.toFixed(2);
      }
    } else {
      dnaEl.textContent='—';waterEl.textContent='—';
    }
  });
}

function addSeqRow(){
  _dilSeqRows.push({name:'',conc:'',vol:''});
  renderSeqRows();calcSeqTable();
  // Focus the new name input
  var inp=document.getElementById('seq-name-'+(_dilSeqRows.length-1));
  if(inp)inp.focus();
}

function clearSeqTable(){
  _dilSeqRows=[{name:'',conc:'',vol:''}];
  renderSeqRows();calcSeqTable();
}

function calcSerial(){
  var stock=parseFloat(document.getElementById('ser-stock')?.value);
  var factor=parseFloat(document.getElementById('ser-factor')?.value)||10;
  var steps=parseInt(document.getElementById('ser-steps')?.value)||5;
  var vol=parseFloat(document.getElementById('ser-vol')?.value)||100;
  var cUnit=document.getElementById('ser-unit')?.value||'';
  var vUnit=document.getElementById('ser-vol-unit')?.value||'\u00B5L';
  var el=document.getElementById('ser-result');
  if(!el||!stock||stock<=0){el.innerHTML='';return;}
  var transferVol=vol/factor;
  var diluent=vol-transferVol;
  var html='<div style="font-size:12px;color:var(--muted);margin-bottom:8px">Transfer '+transferVol.toFixed(1)+' '+vUnit+' into '+diluent.toFixed(1)+' '+vUnit+' diluent per step</div>';
  html+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  var conc=stock;
  for(var i=0;i<=steps;i++){
    var label=conc>=1?conc.toFixed(1):conc.toExponential(1);
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 12px;text-align:center;min-width:70px">'+
      '<div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text)">'+label+'</div>'+
      '<div style="font-size:10px;color:var(--dim)">'+esc(cUnit)+'</div>'+
    '</div>';
    if(i<steps) html+='<span style="color:var(--dim)">\u2192</span>';
    conc=conc/factor;
  }
  html+='</div>';
  el.innerHTML=html;
}
registerView('dilution', renderDilution);

// Import Data feature — import CSV/Excel as primers or plasmids

var _importState = { tempId: null, ext: null, filename: null, headers: [], preview: [] };

async function renderImportData(el) {
  el.innerHTML =
    '<h2>Import Data</h2>' +
    '<div id="import-upload-section">' + _renderUploadForm() + '</div>' +
    '<div id="import-mapping-section" style="display:none"></div>' +
    '<div id="import-result-section" style="display:none"></div>' +
    '<hr style="margin:2rem 0">' +
    '<h3>Import History</h3>' +
    '<div id="import-history-section"><span class="muted">Loading…</span></div>';

  _loadImportHistory();

/* ── Upload step ──────────────────────────────────────────────────────────── */

function _renderUploadForm() {
  return (
    '<div class="card" style="margin-bottom:1rem">' +
      '<p>Upload a <strong>.csv</strong>, <strong>.tsv</strong>, or <strong>.xlsx</strong> file containing primers or plasmids.</p>' +
      '<input type="file" id="import-file-input" accept=".csv,.tsv,.xlsx,.xls">' +
      ' <button class="btn" onclick="_handleFileUpload()">Upload &amp; Preview</button>' +
    '</div>'
  );
}

async function _handleFileUpload() {
  var input = document.getElementById('import-file-input');
  if (!input || !input.files.length) { toast('Please select a file first.'); return; }

  var file = input.files[0];
  var formData = new FormData();
  formData.append('file', file);

  try {
    var resp = await fetch('/api/import/upload', { method: 'POST', body: formData });
    if (!resp.ok) {
      var err = await resp.json().catch(function () { return {}; });
      toast(err.detail || 'Upload failed'); return;
    }
    var data = await resp.json();
    _importState.tempId   = data.temp_id;
    _importState.ext      = data.ext;
    _importState.filename = data.filename;
    _importState.headers  = data.headers;
    _importState.preview  = data.preview;
    _showMappingStep();
  } catch (e) {
    toast('Upload error: ' + e.message);
  }
}

/* ── Column-mapping step ──────────────────────────────────────────────────── */

function _showMappingStep() {
  var sec = document.getElementById('import-mapping-section');
  var h = _importState.headers;

  var optionsHtml = '<option value="-1">— skip —</option>';
  for (var i = 0; i < h.length; i++) {
    optionsHtml += '<option value="' + i + '">' + esc(h[i]) + '</option>';
  }

  // Try to auto-detect columns by header name
  var guessName = -1, guessSeq = -1, guessNotes = -1;
  for (var j = 0; j < h.length; j++) {
    var lc = h[j].toLowerCase();
    if (guessName === -1 && lc.match(/name/))                     guessName = j;
    if (guessSeq  === -1 && lc.match(/seq/))                      guessSeq  = j;
    if (guessNotes === -1 && (lc.match(/note/) || lc.match(/desc/) || lc.match(/comment/))) guessNotes = j;
  }

  function sel(opts, chosen) {
    return opts.replace(
      'value="' + chosen + '"',
      'value="' + chosen + '" selected'
    );
  }

  var html =
    '<div class="card">' +
      '<h3>Map Columns — ' + esc(_importState.filename) + '</h3>' +
      '<div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem">' +
        '<label>Type ' +
          '<select id="import-type">' +
            '<option value="primer">Primers</option>' +
            '<option value="plasmid">Plasmids</option>' +
          '</select>' +
        '</label>' +
        '<label>Name column ' +
          '<select id="import-col-name">' + sel(optionsHtml, guessName) + '</select>' +
        '</label>' +
        '<label>Sequence column ' +
          '<select id="import-col-seq">' + sel(optionsHtml, guessSeq) + '</select>' +
        '</label>' +
        '<label>Notes column <small>(optional)</small> ' +
          '<select id="import-col-notes">' + sel(optionsHtml, guessNotes) + '</select>' +
        '</label>' +
      '</div>' +
      _renderPreviewTable() +
      '<div style="margin-top:1rem">' +
        '<button class="btn btn-primary" onclick="_executeImport()">Import</button> ' +
        '<button class="btn" onclick="_resetImport()">Cancel</button>' +
      '</div>' +
    '</div>';

  sec.innerHTML = html;
  sec.style.display = '';
}

function _renderPreviewTable() {
  var h = _importState.headers;
  var rows = _importState.preview;
  if (!rows.length) return '<p class="muted">No data rows found in file.</p>';

  var html = '<div style="overflow-x:auto"><table class="table"><thead><tr>';
  for (var i = 0; i < h.length; i++) {
    html += '<th>' + esc(h[i]) + '</th>';
  }
  html += '</tr></thead><tbody>';
  for (var r = 0; r < rows.length; r++) {
    html += '<tr>';
    for (var c = 0; c < h.length; c++) {
      var val = rows[r][c] !== undefined ? rows[r][c] : '';
      html += '<td>' + esc(val) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  html += '<p class="muted">Showing first ' + rows.length + ' data row(s).</p>';
  return html;
}

/* ── Execute import ───────────────────────────────────────────────────────── */

async function _executeImport() {
  var colName = parseInt(document.getElementById('import-col-name').value, 10);
  var colSeq  = parseInt(document.getElementById('import-col-seq').value, 10);
  var colNotes = parseInt(document.getElementById('import-col-notes').value, 10);
  var recordType = document.getElementById('import-type').value;

  if (colName < 0) { toast('Please select a Name column.'); return; }
  if (colSeq  < 0) { toast('Please select a Sequence column.'); return; }

  var body = {
    temp_id: _importState.tempId,
    ext: _importState.ext,
    record_type: recordType,
    col_name: colName,
    col_sequence: colSeq
  };
  if (colNotes >= 0) body.col_notes = colNotes;

  try {
    var data = await api('POST', '/api/import/execute', body);
    document.getElementById('import-mapping-section').style.display = 'none';

    var rSec = document.getElementById('import-result-section');
    rSec.innerHTML =
      '<div class="card" style="border-left:4px solid var(--accent,#4caf50);padding:1rem">' +
        '<strong>Import complete!</strong> ' +
        esc(String(data.record_count)) + ' ' + esc(data.record_type) + '(s) imported.' +
        ' <button class="btn" onclick="_resetImport()" style="margin-left:1rem">Import Another</button>' +
      '</div>';
    rSec.style.display = '';

    toast(data.record_count + ' ' + data.record_type + '(s) imported.');
    _loadImportHistory();
  } catch (e) {
    toast('Import failed: ' + e.message);
  }
}

/* ── Import history ───────────────────────────────────────────────────────── */

async function _loadImportHistory() {
  var sec = document.getElementById('import-history-section');
  if (!sec) return;
  try {
    var data = await api('GET', '/api/import/history');
    var items = data.items || [];
    if (!items.length) {
      sec.innerHTML = '<div class="muted">No imports yet.</div>';
      return;
    }
    var html = '<table class="table"><thead><tr>' +
      '<th>File</th><th>Type</th><th>Records</th><th>Date</th><th></th>' +
      '</tr></thead><tbody>';
    items.forEach(function (item) {
      html += '<tr>' +
        '<td>' + esc(item.filename) + '</td>' +
        '<td>' + esc(item.record_type) + '</td>' +
        '<td>' + esc(String(item.record_count)) + '</td>' +
        '<td>' + esc(item.created.slice(0, 16).replace('T', ' ')) + '</td>' +
        '<td><button class="btn btn-sm btn-danger" onclick="_deleteImport(' + item.id + ')">Delete</button></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    sec.innerHTML = html;
  } catch (e) {
    sec.innerHTML = '<div class="muted">Could not load history.</div>';
  }
}

async function _deleteImport(id) {
  if (!confirm('Delete this import and all its records?')) return;
  try {
    await api('DELETE', '/api/import/' + id);
    toast('Import deleted.');
    _loadImportHistory();
  } catch (e) {
    toast('Delete failed: ' + e.message);
  }
}

/* ── Reset ────────────────────────────────────────────────────────────────── */

function _resetImport() {
  _importState = { tempId: null, ext: null, filename: null, headers: [], preview: [] };
  var m = document.getElementById('import-mapping-section');
  var r = document.getElementById('import-result-section');
  if (m) { m.innerHTML = ''; m.style.display = 'none'; }
  if (r) { r.innerHTML = ''; r.style.display = 'none'; }
  var u = document.getElementById('import-upload-section');
  if (u) u.innerHTML = _renderUploadForm();
}

registerView('import_data', renderImportData);

// ── IMPORT ────────────────────────────────────────────────────────────────────
let _importPages=[];
let _importExpandedSet=new Set();
let _importBatchId='';

function renderImport(el){
  var html='<div class="import-dropzone" id="import-dz" onclick="document.getElementById(\'import-files\').click()">'+
    '<big>&#128229;</big>'+
    'Drop OneNote <b>.mht</b> exports or a <b>.zip</b> here<br>'+
    '<span style="font-size:12px;color:var(--dim)">Export: File &#8594; Export &#8594; Section/Notebook &#8594; Single File Web Page (.mht)</span>'+
    '<input type="file" id="import-files" multiple accept=".html,.htm,.mht,.mhtml,.zip"/>'+
  '</div>';

  if(_importPages.length){
    var entryCount=_importPages.filter(function(p){return p.content_type==='entry';}).length;
    var protoCount=_importPages.filter(function(p){return p.content_type==='protocol';}).length;
    var skipCount=_importPages.filter(function(p){return p.content_type==='skip';}).length;

    // Batch controls
    html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:14px">'+
      '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:10px">Batch controls</div>'+
      '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'+
        '<span style="font-size:12px;color:var(--muted)">Set group for all:</span>'+
        '<input type="text" id="imp-batch-group" placeholder="e.g. NorV, Protein X..." spellcheck="false" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:12px;padding:5px 10px;border-radius:4px;outline:none;width:180px"/>'+
        '<button class="btn" onclick="importBatchGroup()">Apply to all</button>'+
        '<span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>'+
        '<button class="btn" onclick="importSetAllType(\'entry\')">All &#8594; entries</button>'+
        '<button class="btn" onclick="importSetAllType(\'protocol\')">All &#8594; protocols</button>'+
        '<button class="btn" onclick="importSetAllType(\'skip\')">Skip all</button>'+
      '</div>'+
    '</div>';

    // Summary + import button
    html+='<div class="import-actions" style="margin-bottom:14px">'+
      '<span class="import-count"><b>'+_importPages.length+'</b> pages: <b>'+entryCount+'</b> entries, <b>'+protoCount+'</b> protocols, <b>'+skipCount+'</b> skipped</span>'+
      '<button class="btn primary" onclick="importCommit()" style="padding:8px 20px">Import '+Math.max(0,entryCount+protoCount)+' items</button>'+
    '</div>';

    // Pages list — card-style instead of cramped table
    html+='<div style="display:flex;flex-direction:column;gap:8px">';
    _importPages.forEach(function(p,i){
      var isSkip=p.content_type==='skip';
      var isExpanded=_importExpandedSet.has(i);
      var section=p.source?p.source.replace(/\\/g,'/').split('/').slice(0,-1).join('/'):p.filename||'';

      html+='<div class="'+(isSkip?'skip-row':'')+'" id="imp-row-'+i+'" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:opacity .15s;'+(isSkip?'opacity:.4':'')+'">'+
        // Header row
        '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer" data-idx="'+i+'" id="imp-hdr-'+i+'">'+
          '<span style="color:var(--dim);font-family:var(--mono);font-size:11px;min-width:24px">'+(i+1)+'</span>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-weight:500;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(p.title)+'">'+esc(p.title)+'</div>'+
            '<div style="font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px">'+
              (section?esc(section)+' &middot; ':'')+
              (p.char_count||0)+' chars'+
              (p.image_count?' &middot; '+p.image_count+' img'+(p.image_count>1?'s':''):'')+
              (p.date&&p.date!==new Date().toISOString().slice(0,10)?' &middot; '+esc(p.date):'')+
            '</div>'+
          '</div>'+
          '<select class="import-type-sel" data-idx="'+i+'" id="imp-type-'+i+'" style="width:90px" onclick="event.stopPropagation()">'+
            '<option value="entry"'+(p.content_type==='entry'?' selected':'')+'>Entry</option>'+
            '<option value="protocol"'+(p.content_type==='protocol'?' selected':'')+'>Protocol</option>'+
            '<option value="skip"'+(p.content_type==='skip'?' selected':'')+'>Skip</option>'+
          '</select>'+
          '<input class="import-group-inp" type="text" data-idx="'+i+'" id="imp-group-'+i+'" value="'+esc(p.group_name)+'" placeholder="group..." spellcheck="false" style="width:120px" onclick="event.stopPropagation()"/>'+
          '<input class="import-date-inp" type="date" data-idx="'+i+'" id="imp-date-'+i+'" value="'+esc(p.date||'')+'" onclick="event.stopPropagation()"/>'+
          '<span style="font-size:10px;color:var(--dim)">'+(isExpanded?'&#9660;':'&#9654;')+'</span>'+
        '</div>';

      // Expandable preview
      if(isExpanded){
        html+='<div style="border-top:1px solid var(--border);padding:12px 14px 14px;background:var(--surface2)">'+
          '<pre style="white-space:pre-wrap;word-break:break-word;font-family:var(--sans);font-size:13px;color:var(--text);line-height:1.6;max-height:400px;overflow-y:auto;margin:0">'+esc(p.notes||p.preview||'')+'</pre>'+
        '</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;

  // Bind events
  setTimeout(function(){
    var dz=document.getElementById('import-dz');
    var fi=document.getElementById('import-files');
    if(dz){
      dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
      dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
      dz.addEventListener('drop',function(e){
        e.preventDefault();dz.classList.remove('dragover');
        if(e.dataTransfer.files.length) importUploadFiles(e.dataTransfer.files);
      });
    }
    if(fi){
      fi.addEventListener('change',function(e){
        if(e.target.files.length) importUploadFiles(e.target.files);
      });
    }
    // Bind per-row controls
    _importPages.forEach(function(p,i){
      var hdr=document.getElementById('imp-hdr-'+i);
      if(hdr) hdr.addEventListener('click',function(){
        if(_importExpandedSet.has(i)) _importExpandedSet.delete(i);
        else _importExpandedSet.add(i);
        renderImport(document.getElementById('content'));
      });
      var typeSel=document.getElementById('imp-type-'+i);
      if(typeSel) typeSel.addEventListener('change',function(){
        _importPages[i].content_type=this.value;
        renderImport(document.getElementById('content'));
      });
      var grpInp=document.getElementById('imp-group-'+i);
      if(grpInp) grpInp.addEventListener('input',function(){_importPages[i].group_name=this.value;});
      var dateInp=document.getElementById('imp-date-'+i);
      if(dateInp) dateInp.addEventListener('change',function(){_importPages[i].date=this.value;});
    });
    // Batch group enter key
    var batchInp=document.getElementById('imp-batch-group');
    if(batchInp) batchInp.addEventListener('keydown',function(e){if(e.key==='Enter')importBatchGroup();});
  },50);
}

async function importUploadFiles(fileList){
  var fd=new FormData();
  for(var i=0;i<fileList.length;i++){
    fd.append('files',fileList[i]);
  }
  var dz=document.getElementById('import-dz');
  if(dz){dz.innerHTML='<big>&#9881;</big>Parsing '+fileList.length+' file'+(fileList.length>1?'s':'')+'...';}
  try{
    var resp=await fetch('/api/import/parse',{method:'POST',body:fd});
    if(!resp.ok) throw new Error(await resp.text());
    var data=await resp.json();
    _importPages=data.pages||[];
    _importBatchId=data.batch_id||'';
    toast('Parsed '+_importPages.length+' pages');
    renderImport(document.getElementById('content'));
  }catch(e){
    toast('Parse failed: '+e.message,true);
    if(dz) dz.innerHTML='<big>&#128229;</big>Error — try again';
  }
}

function importSetAllType(type){
  _importPages.forEach(function(p){p.content_type=type;});
  renderImport(document.getElementById('content'));
}

function importBatchGroup(){
  var inp=document.getElementById('imp-batch-group');
  var val=inp?inp.value.trim():'';
  if(!val){toast('Enter a group name first',true);return;}
  _importPages.forEach(function(p){if(p.content_type!=='skip')p.group_name=val;});
  renderImport(document.getElementById('content'));
  toast('Set group "'+val+'" on all items');
}

async function importCommit(){
  // Read current values from the DOM
  var items=_importPages.map(function(p,i){
    return {
      title:p.title,
      content_type:document.getElementById('imp-type-'+i)?.value||p.content_type,
      group_name:document.getElementById('imp-group-'+i)?.value||p.group_name||'',
      subgroup:'Notes',
      date:document.getElementById('imp-date-'+i)?.value||p.date||'',
      notes:p.notes||'',
      results:p.results||'',
      issues:p.issues||'',
      steps:p.steps||'',
    };
  });
  var toImport=items.filter(function(i){return i.content_type!=='skip';});
  if(!toImport.length){toast('Nothing selected to import',true);return;}
  if(!confirm('Import '+toImport.length+' item'+(toImport.length>1?'s':'')+'?'))return;
  try{
    var resp=await api('POST','/api/import/commit',{items:items,batch_id:_importBatchId});
    var imgMsg=resp.created_images?' + '+resp.created_images+' images':'';
    toast('Imported: '+resp.created_entries+' entries, '+resp.created_protocols+' protocols'+imgMsg);
    _importPages=[];_importBatchId='';
    await load();
    renderImport(document.getElementById('content'));
  }catch(e){
    toast('Import failed: '+e.message,true);
  }
}
registerView('import', renderImport);

// ── Enrichment ───────────────────────────────────────────────────────────────
let _enrichPollTimer=null;

async function triggerEnrichment(){
  var btn=document.getElementById('enrich-btn');
  var icon=document.getElementById('enrich-icon');
  var label=document.getElementById('enrich-label');
  try{
    var resp=await fetch('/api/enrich',{method:'POST'});
    if(!resp.ok) throw new Error('Enrich endpoint not available');
    btn.style.borderColor='var(--amber)';
    btn.style.color='var(--amber)';
    icon.style.animation='spin .8s linear infinite';
    label.textContent='Running...';
    toast('3090 waking up — enrichment started');
    if(_enrichPollTimer) clearInterval(_enrichPollTimer);
    _enrichPollTimer=setInterval(async function(){
      try{
        var sr=await fetch('/api/enrich-status');
        if(!sr.ok)return;
        var s=await sr.json();
        var logs=s.recent_log||[];
        if(logs.length) label.textContent=logs[logs.length-1].replace(/^\[[\d:]+\] /,'').slice(0,25)+'...';
        if(!s.enrichment_running){
          clearInterval(_enrichPollTimer);
          _enrichPollTimer=null;
          btn.style.borderColor='var(--accent)';
          btn.style.color='var(--accent)';
          icon.style.animation='';
          icon.innerHTML='&#10003;';
          label.textContent='Done';
          toast('Enrichment complete');
          await load();
          setTimeout(function(){
            btn.style.borderColor='var(--border2)';
            btn.style.color='var(--muted)';
            icon.innerHTML='&#9881;';
            label.textContent='Enrich';
          },3000);
        }
      }catch(e){}
    },5000);
  }catch(e){
    toast('Could not start enrichment: '+e.message,true);
  }
}
